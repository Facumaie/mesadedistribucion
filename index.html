function CampoTab({ usuario, rol, toast, jefesQth = [] }) {
  const [operativos, setOperativos] = useState([]);
  const [opId, setOpId] = useState(null);
  const [asigs, setAsigs] = useState([]);
  const [nomina, setNomina] = useState(null);       // Map o null (cargando)
  const [modal, setModal] = useState(null);          // {puesto, slot} | {asig, puesto}
  const [filtro, setFiltro] = useState('');
  const [secAbiertas, setSecAbiertas] = useState({});
  const [pendientes, setPendientes] = useState([]);  // cola offline (persistida en el teléfono)
  const [rebotados, setRebotados] = useState([]);    // pendientes que perdieron la celda al sincronizar
  const [online, setOnline] = useState(typeof navigator !== 'undefined' ? navigator.onLine : true);
  const [cadena, setCadena] = useState(true);        // carga en cadena (auto-avance)
  const [pdfListo, setPdfListo] = useState(null);    // {blob, nombre} esperando compartir/descargar
  const [vista, setVista] = useState('carga');       // 'carga' | 'previa' (monitor de supervisor)
  const [soloFaltantes, setSoloFaltantes] = useState(false);
  const [ocultarAvisados, setOcultarAvisados] = useState(false);
  const [configCampo, setConfigCampo] = useState({});
  const pendRef = useRef([]);
  const syncRef = useRef(false);
  const { db, collections } = window.firebaseUtils;
  pendRef.current = pendientes;

  // ── Cola offline: persistencia local por operativo ──
  const queueKey = (id) => 'campo-queue-' + id;
  const persistQueue = (id, list) => { try { localStorage.setItem(queueKey(id), JSON.stringify(list)); } catch(e) {} };
  useEffect(() => {
    if (!opId) { setPendientes([]); setRebotados([]); return; }
    try { setPendientes(JSON.parse(localStorage.getItem(queueKey(opId)) || '[]')); } catch(e) { setPendientes([]); }
    setRebotados([]);
    setVista('carga'); setSoloFaltantes(false); setOcultarAvisados(false); setFiltro('');
  }, [opId]);

  const quitarPendiente = (pid, slot) => {
    setPendientes(prev => {
      const n = prev.filter(x => !(x.pid === pid && x.slot === slot));
      if (opId) persistQueue(opId, n);
      return n;
    });
  };
  const encolar = (item) => {
    setPendientes(prev => {
      const n = [...prev.filter(x => !(x.pid === item.pid && x.slot === item.slot)), item];
      if (opId) persistQueue(opId, n);
      return n;
    });
  };

  const withTimeout = (p, ms) => Promise.race([p, new Promise((_, rej) => setTimeout(() => rej(new Error('TIMEOUT')), ms))]);

  const escribirAsignacion = (item) => {
    const ref = db.collection(collections.operativos).doc(item._opId || opId)
      .collection('asignaciones').doc(item.pid + '_s' + item.slot);
    const payload = { ...item };
    delete payload._puestoNombre; delete payload._opId;
    return db.runTransaction(async tx => {
      const snap = await tx.get(ref);
      if (snap.exists) {
        const d = snap.data();
        if (d.lp && item.lp && d.lp === item.lp) return; // ya estaba (reintento duplicado): ok
        throw new Error('OCUPADO:' + (d.cargadoPor ? d.cargadoPor.nombre : ''));
      }
      tx.set(ref, payload);
    });
  };

  // Intento de escritura: online directo, sin señal a la cola
  const asignarEfectivo = async (puesto, slot, ef) => {
    const item = {
      pid: puesto.pid, slot, ...ef,
      cargadoPor: { legajo: usuario.legajo, nombre: usuario.nombre },
      cargadoEn: new Date().toISOString(),
      _puestoNombre: puesto.nombre, _opId: opId,
    };
    if (!navigator.onLine) { encolar(item); return { status: 'pendiente' }; }
    try {
      await withTimeout(escribirAsignacion(item), 8000);
      return { status: 'ok' };
    } catch (err) {
      const msg = String(err.message || '');
      if (msg.startsWith('OCUPADO:')) return { status: 'ocupado', por: msg.slice(8) };
      encolar(item); // timeout / sin conexión / error transitorio → cola
      return { status: 'pendiente' };
    }
  };

  // Sincronización de la cola: al volver la señal y cada 12s
  const syncPendientes = async () => {
    if (syncRef.current || !navigator.onLine || !pendRef.current.length) return;
    syncRef.current = true;
    for (const item of [...pendRef.current]) {
      try {
        await withTimeout(escribirAsignacion(item), 8000);
        quitarPendiente(item.pid, item.slot);
      } catch (err) {
        const msg = String(err.message || '');
        if (msg.startsWith('OCUPADO:')) {
          quitarPendiente(item.pid, item.slot);
          setRebotados(r => [...r, { ...item, ocupadoPor: msg.slice(8) }]);
        } else break; // sigue sin señal: reintenta en el próximo ciclo
      }
    }
    syncRef.current = false;
  };
  useEffect(() => {
    const on = () => { setOnline(true); syncPendientes(); };
    const off = () => setOnline(false);
    window.addEventListener('online', on);
    window.addEventListener('offline', off);
    const t = setInterval(syncPendientes, 12000);
    return () => { window.removeEventListener('online', on); window.removeEventListener('offline', off); clearInterval(t); };
  }, [opId]);

  // Si Firestore ya tiene la celda de un pendiente: sincronizado (mismo LP) o rebotado (otro)
  useEffect(() => {
    if (!pendRef.current.length || !asigs.length) return;
    const enFs = {};
    asigs.forEach(a => { enFs[a.pid + '_s' + a.slot] = a; });
    pendRef.current.forEach(p => {
      const d = enFs[p.pid + '_s' + p.slot];
      if (!d) return;
      quitarPendiente(p.pid, p.slot);
      if (!(d.lp && p.lp && d.lp === p.lp)) setRebotados(r => [...r, { ...p, ocupadoPor: d.cargadoPor ? d.cargadoPor.nombre : '' }]);
    });
  }, [asigs]);

  // Colas huérfanas: cargas pendientes de OTROS operativos (el operador cerró la app
  // sin señal y nunca volvió a entrar a ese operativo). Se sincronizan al abrir la solapa.
  useEffect(() => {
    const syncHuerfanas = async () => {
      if (!navigator.onLine) return;
      const claves = [];
      for (let k = 0; k < localStorage.length; k++) {
        const key = localStorage.key(k);
        if (key && key.startsWith('campo-queue-')) claves.push(key);
      }
      for (const key of claves) {
        if (opId && key === queueKey(opId)) continue; // la del operativo actual la maneja syncPendientes
        let items = [];
        try { items = JSON.parse(localStorage.getItem(key) || '[]'); } catch (e) {}
        if (!items.length) { localStorage.removeItem(key); continue; }
        const restantes = [];
        let subidas = 0, rebot = 0;
        for (const it of items) {
          if (!it._opId) { continue; } // sin destino conocido: se descarta
          try { await withTimeout(escribirAsignacion(it), 8000); subidas++; }
          catch (err) {
            if (String(err.message || '').startsWith('OCUPADO:')) rebot++;
            else restantes.push(it); // sigue sin señal: queda para el próximo intento
          }
        }
        if (restantes.length) localStorage.setItem(key, JSON.stringify(restantes));
        else localStorage.removeItem(key);
        if (subidas) toast(`✓ ${subidas} carga(s) pendiente(s) de otro operativo sincronizadas`, 'success');
        if (rebot) toast(`⚠️ ${rebot} carga(s) de otro operativo rebotaron (la celda ya estaba ocupada)`, 'error');
      }
    };
    syncHuerfanas();
    window.addEventListener('online', syncHuerfanas);
    return () => window.removeEventListener('online', syncHuerfanas);
  }, []);

  // Presencia: latido cada 60s mientras se está dentro del operativo
  const [presencia, setPresencia] = useState([]);
  useEffect(() => {
    if (!opId) { setPresencia([]); return; }
    const ref = db.collection(collections.operativos).doc(opId).collection('presencia');
    const beat = () => ref.doc(String(usuario.legajo)).set({
      legajo: usuario.legajo, nombre: usuario.nombre, rol,
      ultimaVez: new Date().toISOString(),
    }).catch(() => {});
    beat();
    const t = setInterval(beat, 60000);
    const u = ref.onSnapshot(s => setPresencia(s.docs.map(d => d.data())), () => {});
    return () => { clearInterval(t); u(); };
  }, [opId]);

  // Wake lock: que el teléfono no se bloquee mientras se carga
  useEffect(() => {
    if (!opId || !('wakeLock' in navigator)) return;
    let wl = null, activo = true;
    const pedir = () => { navigator.wakeLock.request('screen').then(l => { if (activo) wl = l; else l.release(); }).catch(() => {}); };
    const onVis = () => { if (document.visibilityState === 'visible') pedir(); };
    pedir();
    document.addEventListener('visibilitychange', onVis);
    return () => { activo = false; document.removeEventListener('visibilitychange', onVis); if (wl) wl.release().catch(() => {}); };
  }, [opId]);


  // Operativos publicados
  useEffect(() => {
    const u = db.collection(collections.operativos).orderBy('creadoEn', 'desc').limit(25)
      .onSnapshot(s => setOperativos(s.docs.map(d => ({ id: d.id, ...d.data() }))),
        err => toast('Firebase operativos: ' + err.message, 'error'));
    return u;
  }, []);

  // Preferencias de campo (checklist obligatorio, etc.)
  useEffect(() => {
    const u = db.collection(collections.config).doc('campo')
      .onSnapshot(d => setConfigCampo(d.exists ? d.data() : {}), () => {});
    return u;
  }, []);

  // Nómina (una vez)
  useEffect(() => {
    let vivo = true;
    cargarNomina().then(({ map }) => { if (vivo) setNomina(map); })
      .catch(err => { if (vivo) { setNomina(new Map()); toast('No se pudo cargar la nómina: ' + err.message, 'error'); } });
    return () => { vivo = false; };
  }, []);

  // Asignaciones del operativo elegido (tiempo real)
  useEffect(() => {
    if (!opId) { setAsigs([]); return; }
    const u = db.collection(collections.operativos).doc(opId).collection('asignaciones')
      .onSnapshot(s => setAsigs(s.docs.map(d => d.data())),
        err => toast('Firebase asignaciones: ' + err.message, 'error'));
    return u;
  }, [opId]);

  // Doble afectación: asignaciones de OTROS operativos abiertos del mismo día
  const [asigsOtros, setAsigsOtros] = useState({}); // { opId: [asignaciones] }
  const _opSel = operativos.find(o => o.id === opId);
  const otrosKey = (opId && _opSel)
    ? operativos.filter(o => o.id !== opId && o.estado === 'abierto' && o.fecha === _opSel.fecha).map(o => o.id).sort().join(',')
    : '';
  useEffect(() => {
    setAsigsOtros({});
    if (!otrosKey) return;
    const unsubs = otrosKey.split(',').map(id =>
      db.collection(collections.operativos).doc(id).collection('asignaciones')
        .onSnapshot(s => setAsigsOtros(prev => ({ ...prev, [id]: s.docs.map(d => d.data()) })), () => {})
    );
    return () => unsubs.forEach(u => u());
  }, [opId, otrosKey]);

  const operativo = operativos.find(o => o.id === opId) || null;

  // ── Lista de operativos ──
  if (!operativo) {
    const abiertos = operativos.filter(o => o.estado === 'abierto');
    const cerrados = operativos.filter(o => o.estado !== 'abierto');
    return (
      <div className="campo-wrap">
        <div className="campo-titulo">📱 CARGA OPERATIVA</div>
        {nomina === null && <div className="campo-aviso">⏳ Descargando nómina...</div>}
        {nomina !== null && nomina.size === 0 && <div className="campo-aviso" style={{background:'#fff3e0',color:'#b26a00'}}>⚠️ No hay nómina cargada. El admin debe subirla desde la solapa Admin.</div>}
        {abiertos.length === 0 && <div className="campo-aviso">No hay operativos abiertos. {rol !== 'operador' ? 'Publicá uno desde "Distribución Previa".' : 'Esperá a que la Mesa publique el operativo.'}</div>}
        {abiertos.map(o => {
          const tot = (o.puestos || []).reduce((s, p) => s + (p.celdas || 0), 0);
          return (
            <div key={o.id} className="campo-card" onClick={() => setOpId(o.id)}>
              <div style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}>
                <div>
                  <div style={{fontWeight:'800',fontSize:'15px',color:'#1a3a6b'}}>{o.estadio}</div>
                  <div style={{fontSize:'13px',color:'#444'}}>{o.partido || '—'} · {fmtFecha(o.fecha)}</div>
                  <div style={{fontSize:'11px',color:'#888',marginTop:'2px'}}>{(o.puestos||[]).length} puestos · {tot} celdas</div>
                </div>
                <span className="badge" style={{background:'#2e7d32',color:'#fff'}}>ABIERTO</span>
              </div>
            </div>
          );
        })}
        {cerrados.length > 0 && <div style={{fontSize:'11px',fontWeight:'700',color:'#888',margin:'14px 4px 4px'}}>CERRADOS</div>}
        {cerrados.map(o => (
          <div key={o.id} className="campo-card" style={{opacity:.7}} onClick={() => setOpId(o.id)}>
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}>
              <div>
                <div style={{fontWeight:'800',fontSize:'14px',color:'#555'}}>{o.estadio}</div>
                <div style={{fontSize:'12px',color:'#777'}}>{o.partido || '—'} · {fmtFecha(o.fecha)}</div>
              </div>
              <span className="badge" style={{background:'#9e9e9e',color:'#fff'}}>CERRADO</span>
            </div>
          </div>
        ))}
      </div>
    );
  }

  // ── Vista del operativo ──
  const abierto = operativo.estado === 'abierto';
  const asigPorSlot = {};
  asigs.forEach(a => { asigPorSlot[a.pid + '_s' + a.slot] = a; });
  // Pendientes locales se ven como cargados (en amarillo) hasta sincronizar
  pendientes.forEach(p => {
    const k = p.pid + '_s' + p.slot;
    if (!asigPorSlot[k]) asigPorSlot[k] = { ...p, _pendiente: true };
  });
  const asigsMerged = Object.values(asigPorSlot);
  const puestoPorPid = {};
  (operativo.puestos || []).forEach(p => { puestoPorPid[p.pid] = p; });
  const asigsConPuesto = asigsMerged.map(a => ({ ...a, _puestoNombre: (puestoPorPid[a.pid] || {}).nombre || a._puestoNombre }));
  const lpEnOtros = {};
  Object.entries(asigsOtros).forEach(([oid, arr]) => {
    const op = operativos.find(o => o.id === oid);
    const ppo = {};
    ((op && op.puestos) || []).forEach(p => { ppo[p.pid] = p; });
    (arr || []).forEach(a => {
      if (a.lp && !lpEnOtros[a.lp]) lpEnOtros[a.lp] = { estadio: op ? op.estadio : '', puesto: (ppo[a.pid] || {}).nombre || '' };
    });
  });
  const totalCeldas = (operativo.puestos || []).reduce((s, p) => s + (p.celdas || 0), 0);
  const totalCargados = asigsMerged.length;

  // Próxima celda libre a partir de (pid, slot), con vuelta al principio
  const proximaCeldaLibre = (desdePid, desdeSlot, keyRecienOcupada) => {
    const orden = [];
    (operativo.puestos || []).forEach(p => { for (let i = 0; i < (p.celdas || 0); i++) orden.push({ p, i }); });
    const idx = orden.findIndex(o => o.p.pid === desdePid && o.i === desdeSlot);
    const libre = (o) => { const k = o.p.pid + '_s' + o.i; return !asigPorSlot[k] && k !== keyRecienOcupada; };
    for (let k = idx + 1; k < orden.length; k++) if (libre(orden[k])) return orden[k];
    for (let k = 0; k < idx; k++) if (libre(orden[k])) return orden[k];
    return null;
  };

  const handleConfirmarAsig = async (puesto, slot, ef) => {
    const res = await asignarEfectivo(puesto, slot, ef);
    const key = puesto.pid + '_s' + slot;
    if (res.status === 'ok') toast(`✓ ${ef.apellido} → ${puesto.nombre}`, 'success');
    else if (res.status === 'pendiente') toast(`🕐 ${ef.apellido} en cola — se sube al volver la señal`, 'info');
    else if (res.status === 'ocupado') toast(`Esa celda ya fue cargada por ${res.por || 'otro operador'}.`, 'error');
    if (cadena) {
      const ocupada = res.status === 'ocupado' ? null : key;
      const nxt = proximaCeldaLibre(puesto.pid, slot, ocupada);
      if (nxt) setModal({ tipo: 'asignar', puesto: nxt.p, slot: nxt.i });
      else { setModal(null); toast('🎉 No quedan celdas libres en el operativo', 'success'); }
    } else setModal(null);
  };

  // Checklist del supervisor: marcar a quién ya se le dio su QTH y función
  const toggleAvisado = async (a) => {
    if (a._pendiente) { toast('Esa carga todavía no sincronizó — esperá la señal.', 'error'); return; }
    try {
      const ref = db.collection(collections.operativos).doc(opId)
        .collection('asignaciones').doc(a.pid + '_s' + a.slot);
      await ref.update({
        avisado: a.avisado
          ? firebase.firestore.FieldValue.delete()
          : { legajo: usuario.legajo, nombre: usuario.nombre, ts: new Date().toISOString() },
      });
    } catch (err) { toast('Error: ' + err.message, 'error'); }
  };

  const totalAvisados = asigsMerged.filter(a => a.avisado).length;

  const secciones = [];
  (operativo.puestos || []).forEach(p => { if (!secciones.includes(p.seccion)) secciones.push(p.seccion); });
  // Motorizada siempre al final, también en operativos ya publicados
  const iMot = secciones.indexOf('MOTORIZADA');
  if (iMot !== -1) { secciones.splice(iMot, 1); secciones.push('MOTORIZADA'); }

  const f = filtro.trim().toLowerCase();

  // Presencia y actividad por operador
  const _ahora = Date.now();
  const equipos = presencia
    .map(p => ({ ...p, min: (_ahora - new Date(p.ultimaVez || 0).getTime()) / 60000 }))
    .filter(p => p.min < 720) // ignora presencias de hace más de 12 h
    .map(p => {
      const propias = asigs.filter(a => a.cargadoPor && String(a.cargadoPor.legajo) === String(p.legajo));
      const ultima = propias.reduce((m, a) => (a.cargadoEn && a.cargadoEn > m ? a.cargadoEn : m), '');
      return { ...p, cargas: propias.length, ultimaCarga: ultima,
        minCarga: ultima ? (_ahora - new Date(ultima).getTime()) / 60000 : null };
    })
    .sort((a, b) => a.min - b.min);
  const enLinea = equipos.filter(p => p.min < 3);

  // Búsqueda de EFECTIVOS por apellido o LP (¿dónde está fulano?)
  const normB = (s) => (s || '').toUpperCase().normalize('NFD').replace(/[\u0300-\u036f]/g, '');
  const qEf = filtro.trim();
  let resultadosEf = [];
  let efNoCargado = null;
  if (qEf.length >= 3) {
    const esLp = /^\d+$/.test(qEf);
    const qq = normB(qEf);
    resultadosEf = asigsConPuesto.filter(a => esLp
      ? (a.lp || '').includes(qEf)
      : (normB(a.apellido).includes(qq) || normB((a.apellido || '') + ' ' + (a.nombre || '')).includes(qq))
    ).slice(0, 8);
    if (!resultadosEf.length && esLp) {
      const enNom = nomina ? nomina.get(qEf) : null;
      const otro = lpEnOtros[qEf] || null;
      if (otro || enNom) efNoCargado = { lp: qEf, nom: enNom, otro };
    }
  }
  const matchPuesto = (p) => {
    if (!f) return true;
    if ((p.nombre || '').toLowerCase().includes(f)) return true;
    if ((p.jefeNombre || '').toLowerCase().includes(f)) return true;
    if (/^\d{2,}$/.test(f)) {
      for (let i = 0; i < (p.celdas || 0); i++) {
        const a = asigPorSlot[p.pid + '_s' + i];
        if (a && a.lp && a.lp.includes(f)) return true;
      }
    }
    return false;
  };

  // ── Edición dinámica de puestos en campo ──
  const cambiarCeldas = async (p, delta) => {
    if (!abierto) return;
    if (delta < 0) {
      if ((p.celdas || 1) <= 1) { toast('Mínimo 1 celda. Si querés sacar el puesto entero usá 🗑.', 'error'); return; }
      if (asigPorSlot[p.pid + '_s' + ((p.celdas || 1) - 1)]) { toast('La última celda está ocupada. Quitá primero esa asignación.', 'error'); return; }
    }
    try {
      const ref = db.collection(collections.operativos).doc(opId);
      await db.runTransaction(async tx => {
        const snap = await tx.get(ref);
        if (!snap.exists) throw new Error('Operativo no encontrado.');
        const puestos = (snap.data().puestos || []).slice();
        const i = puestos.findIndex(x => x.pid === p.pid);
        if (i === -1) throw new Error('Puesto no encontrado.');
        const actual = puestos[i].celdas || 1;
        if (delta < 0) {
          if (actual <= 1) throw new Error('Mínimo 1 celda.');
          const aSnap = await tx.get(ref.collection('asignaciones').doc(p.pid + '_s' + (actual - 1)));
          if (aSnap.exists) throw new Error('La última celda está ocupada.');
        }
        puestos[i] = { ...puestos[i], celdas: actual + delta };
        tx.update(ref, { puestos, ultimaModPuestos: { legajo: usuario.legajo, nombre: usuario.nombre, ts: new Date().toISOString() } });
      });
      logOperativo(opId, delta > 0 ? 'celda+' : 'celda-', `${p.nombre}: ${delta > 0 ? '+1 celda' : '−1 celda'}`, usuario);
    } catch (err) { toast('Error: ' + err.message, 'error'); }
  };

  const agregarPuesto = async (seccion, datos) => {
    try {
      const ref = db.collection(collections.operativos).doc(opId);
      await db.runTransaction(async tx => {
        const snap = await tx.get(ref);
        if (!snap.exists) throw new Error('Operativo no encontrado.');
        const puestos = (snap.data().puestos || []).slice();
        const maxOrden = puestos.filter(x => x.seccion === seccion).reduce((m, x) => Math.max(m, x.orden || 0), 0);
        puestos.push({
          pid: 'x' + Date.now().toString(36) + Math.random().toString(36).slice(2, 5),
          seccion, orden: maxOrden + 0.5,
          nombre: datos.nombre, descripcion: datos.descripcion || '',
          celdas: datos.celdas, tipo: datos.tipo || null,
          jefeNombre: null, jefeRango: null, jefeTel: null,
          agregadoEnCampo: { legajo: usuario.legajo, nombre: usuario.nombre, ts: new Date().toISOString() },
        });
        puestos.sort((a, b) => (a.orden || 0) - (b.orden || 0));
        tx.update(ref, { puestos });
      });
      logOperativo(opId, 'puesto+', `${datos.nombre} (${seccion}, ${datos.celdas} celda${datos.celdas > 1 ? 's' : ''})`, usuario);
      toast('✓ Puesto agregado', 'success');
    } catch (err) { toast('Error: ' + err.message, 'error'); }
  };

  const editarJefe = async (p, datos) => {
    try {
      const ref = db.collection(collections.operativos).doc(opId);
      await db.runTransaction(async tx => {
        const snap = await tx.get(ref);
        if (!snap.exists) throw new Error('Operativo no encontrado.');
        const puestos = (snap.data().puestos || []).slice();
        const i = puestos.findIndex(x => x.pid === p.pid);
        if (i === -1) throw new Error('Puesto no encontrado.');
        puestos[i] = { ...puestos[i],
          nombre: datos.nombre || puestos[i].nombre,
          descripcion: datos.descripcion || '',
          jefeRango: datos.jefeRango || null,
          jefeNombre: datos.jefeNombre || null,
          jefeTel: datos.jefeTel || null,
          tipo: datos.tipo || null };
        tx.update(ref, { puestos, ultimaModPuestos: { legajo: usuario.legajo, nombre: usuario.nombre, ts: new Date().toISOString() } });
      });
      const cambios = [];
      if (datos.nombre && datos.nombre !== p.nombre) cambios.push(`QTH "${p.nombre}" → "${datos.nombre}"`);
      const jefeAntes = p.jefeNombre || null, jefeAhora = datos.jefeNombre || null;
      if (jefeAntes !== jefeAhora || (p.jefeRango || null) !== (datos.jefeRango || null))
        cambios.push(`Jefe → ${jefeAhora ? [datos.jefeRango, datos.jefeNombre].filter(Boolean).join(' ') : '(sin jefe)'}`);
      if ((datos.tipo || null) !== (p.tipo || null)) cambios.push(`Tipo → ${datos.tipo || '(sin tipo)'}`);
      if (cambios.length) logOperativo(opId, 'jefe', `${datos.nombre || p.nombre}: ${cambios.join(' · ')}`, usuario);
      toast('✓ Puesto actualizado', 'success');
    } catch (err) { toast('Error: ' + err.message, 'error'); }
  };

  const editarEvento = async (datos) => {
    try {
      const ref = db.collection(collections.operativos).doc(opId);
      await ref.update({
        partido: datos.partido || '',
        fecha: datos.fecha,
        ultimaModEvento: { legajo: usuario.legajo, nombre: usuario.nombre, ts: new Date().toISOString() },
      });
      const cambios = [];
      if ((datos.partido || '') !== (operativo.partido || '')) cambios.push(`Evento → ${datos.partido || '(sin nombre)'}`);
      if (datos.fecha !== operativo.fecha) cambios.push(`Fecha → ${fmtFecha(datos.fecha)}`);
      if (cambios.length) logOperativo(opId, 'evento', cambios.join(' · '), usuario);
      toast('✓ Evento actualizado', 'success');
    } catch (err) { toast('Error: ' + err.message, 'error'); }
  };

  const eliminarPuesto = async (p) => {
    const tieneAsigs = asigs.some(a => a.pid === p.pid);
    if (tieneAsigs) { toast('El puesto tiene efectivos cargados. Quitalos primero.', 'error'); return; }
    if (!confirm(`¿Eliminar el puesto "${p.nombre}"?`)) return;
    try {
      const ref = db.collection(collections.operativos).doc(opId);
      await db.runTransaction(async tx => {
        const snap = await tx.get(ref);
        if (!snap.exists) throw new Error('Operativo no encontrado.');
        const puestos = (snap.data().puestos || []).filter(x => x.pid !== p.pid);
        tx.update(ref, { puestos, ultimaModPuestos: { legajo: usuario.legajo, nombre: usuario.nombre, ts: new Date().toISOString() } });
      });
      logOperativo(opId, 'puesto-', `${p.nombre} (${p.seccion})`, usuario);
      toast('✓ Puesto eliminado', 'success');
    } catch (err) { toast('Error: ' + err.message, 'error'); }
  };

  const finalizar = async () => {
    if (pendientes.length > 0) { toast(`Hay ${pendientes.length} cargas sin sincronizar. Esperá a tener señal antes de cerrar.`, 'error'); return; }
    const faltan = totalCeldas - asigsMerged.length;
    const sinAvisar = totalCargados - totalAvisados;
    if (configCampo.exigirAvisados && sinAvisar > 0) {
      toast(`Checklist incompleto: faltan avisar ${sinAvisar} efectivo${sinAvisar > 1 ? 's' : ''} (✅). Es obligatorio para cerrar (configurable en Admin).`, 'error');
      return;
    }
    const avisoChk = sinAvisar > 0 ? `\n⚠️ ${sinAvisar} efectivo${sinAvisar > 1 ? 's' : ''} sin marcar como avisado${sinAvisar > 1 ? 's' : ''} (✅).` : '';
    if (!confirm(`¿Finalizar la carga y cerrar el operativo?${faltan > 0 ? '\n\n⚠️ Quedan ' + faltan + ' celdas sin cubrir.' : '\n\nCarga completa ✓'}${avisoChk}\n\nSe genera el PDF para difundir.`)) return;
    try {
      const { blob, nombre } = buildCampoPDF(operativo, asigsMerged);
      await db.collection(collections.operativos).doc(opId).update({
        estado: 'cerrado',
        cerradoPor: { legajo: usuario.legajo, nombre: usuario.nombre },
        cerradoEn: new Date().toISOString(),
      });
      setPdfListo({ blob, nombre });
      toast('✓ Operativo cerrado.', 'success');
    } catch (err) { toast('Error: ' + err.message, 'error'); }
  };

  const generarPDF = (compartir) => {
    try {
      const { blob, nombre } = buildCampoPDF(operativo, asigsMerged);
      if (compartir) setPdfListo({ blob, nombre });
      else { downloadBlob(blob, nombre); toast('✓ PDF generado', 'success'); }
    } catch (err) { toast('Error PDF: ' + err.message, 'error'); }
  };

  const compartirListo = async () => {
    if (!pdfListo) return;
    // El PDF ya está generado: el share sale con el gesto del toque fresco, sin demoras previas
    const res = await compartirPDF(pdfListo.blob, pdfListo.nombre);
    if (res.ok) { setPdfListo(null); return; }
    downloadBlob(pdfListo.blob, pdfListo.nombre);
    toast(res.motivo === 'sin-soporte'
      ? 'Este dispositivo no tiene menú de compartir: se descargó el PDF.'
      : `El menú de compartir falló (${res.motivo}): se descargó el PDF.`, 'info');
    setPdfListo(null);
  };

  return (
    <div className="campo-wrap">
      <div className="campo-header-op">
        <button className="campo-btn-back" onClick={() => setOpId(null)}>←</button>
        <div style={{flex:1,minWidth:0}}>
          <div style={{fontWeight:'800',fontSize:'14px',whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis'}}>{operativo.estadio} · {operativo.partido || ''}</div>
          <div style={{fontSize:'11px',opacity:.85}}>{fmtFecha(operativo.fecha)} · {abierto ? '🟢 Abierto' : '⚪ Cerrado'}</div>
        </div>
        {(rol === 'admin' || rol === 'planificador') && (
          <button className="campo-mini-btn" title="Editar nombre y fecha del evento"
            style={{flexShrink:0,background:'rgba(255,255,255,.12)',color:'#fff',border:'1px solid rgba(255,255,255,.3)'}}
            onClick={() => setModal({ tipo:'evento' })}>✏️</button>
        )}
        <div style={{textAlign:'right'}}>
          <div style={{fontWeight:'900',fontSize:'18px'}}>{totalCargados}<span style={{fontSize:'12px',opacity:.8}}>/{totalCeldas}</span></div>
          <div style={{fontSize:'9px',opacity:.8,letterSpacing:'.5px'}}>CARGADOS</div>
        </div>
      </div>
      <div className="campo-barra-prog"><div style={{width: (totalCeldas ? Math.round(totalCargados / totalCeldas * 100) : 0) + '%'}}/></div>

      {enLinea.length > 1 && (
        <div style={{background:'#0f2a52',color:'#bcd3f5',padding:'6px 14px',fontSize:'11.5px',fontWeight:'600',display:'flex',alignItems:'center',gap:'6px',flexWrap:'wrap'}}>
          <span>👥</span>
          <span><b style={{color:'#7fe3a1'}}>{enLinea.length} en línea:</b> {enLinea.map(p => p.nombre).join(', ')}</span>
        </div>
      )}
      {(!online || pendientes.length > 0) && (
        <div style={{background: !online ? '#b71c1c' : '#f9a825', color: !online ? '#fff' : '#3e2c00',
          padding:'7px 14px', fontSize:'12px', fontWeight:'700', display:'flex', alignItems:'center', gap:'8px'}}>
          {!online ? '🔴 SIN SEÑAL — las cargas quedan en este teléfono y se suben solas' : '🟡 Sincronizando...'}
          {pendientes.length > 0 && <span style={{marginLeft:'auto',background:'rgba(0,0,0,.18)',padding:'2px 10px',borderRadius:'10px'}}>{pendientes.length} en cola</span>}
        </div>
      )}
      {rebotados.map((r, i) => (
        <div key={i} style={{background:'#ffebee',color:'#b71c1c',padding:'8px 14px',fontSize:'12px',display:'flex',alignItems:'center',gap:'8px',borderBottom:'1px solid #ffcdd2'}}>
          <span>⚠️ <b>{r.apellido}</b> no entró en <b>{r._puestoNombre}</b>: la celda la ocupó {r.ocupadoPor || 'otro equipo'} mientras no había señal. Reubicalo.</span>
          <button onClick={() => setRebotados(rs => rs.filter((_, j) => j !== i))}
            style={{marginLeft:'auto',background:'none',border:'none',color:'#b71c1c',fontWeight:'900',fontSize:'15px',cursor:'pointer',flexShrink:0}}>✕</button>
        </div>
      ))}

      {resultadosEf.length > 0 && (
        <div style={{margin:'10px 12px 0',background:'#fff',border:'2px solid #1a3a6b',borderRadius:'12px',overflow:'hidden'}}>
          <div style={{background:'#1a3a6b',color:'#fff',padding:'6px 12px',fontSize:'11px',fontWeight:'800',letterSpacing:'.4px'}}>👮 EFECTIVOS ENCONTRADOS ({resultadosEf.length})</div>
          {resultadosEf.map(a => {
            const pp = puestoPorPid[a.pid] || { nombre: a._puestoNombre || '?', seccion: '', celdas: 0 };
            return (
              <button key={a.pid + '_' + a.slot} onClick={() => setModal({ tipo:'detalle', asig:a, puesto:pp })}
                style={{display:'block',width:'100%',textAlign:'left',background:'#fff',border:'none',borderBottom:'1px solid #eef1f6',padding:'9px 12px',cursor:'pointer'}}>
                <span style={{fontWeight:'800',fontSize:'14px',color:'#222'}}>{a.apellido}{a.nombre ? ', ' + a.nombre : ''}</span>
                <span style={{fontSize:'11px',color:'#888'}}> · {a.grado || ''} · LP {a.lp || '—'}</span>
                <div style={{fontSize:'12px',fontWeight:'700',color:'#1a3a6b',marginTop:'2px'}}>
                  📍 {pp.nombre}{pp.seccion ? <span style={{fontWeight:'500',color:'#888'}}> ({pp.seccion})</span> : null}
                  {a.avisado ? ' ✅' : ''}{a._pendiente ? ' 🕐' : ''}
                </div>
              </button>
            );
          })}
        </div>
      )}
      {efNoCargado && (
        <div style={{margin:'10px 12px 0',background:'#fff8e1',border:'1px solid #ffe082',borderRadius:'12px',padding:'10px 12px',fontSize:'12px',color:'#5d4a00'}}>
          {efNoCargado.nom
            ? <><b>{efNoCargado.nom.apellido}, {efNoCargado.nom.nombre}</b> ({efNoCargado.nom.grado} · LP {efNoCargado.lp}) </>
            : <><b>LP {efNoCargado.lp}</b> </>}
          {efNoCargado.otro
            ? <>— 🚨 hoy está afectado en <b>{efNoCargado.otro.estadio}</b>{efNoCargado.otro.puesto ? ' — ' + efNoCargado.otro.puesto : ''}.</>
            : <>— no está cargado en este operativo.</>}
        </div>
      )}

      <div style={{display:'flex',gap:'8px',padding:'10px 12px 4px',alignItems:'stretch'}}>
        <input type="text" placeholder="🔍 Buscar efectivo, LP o puesto..." value={filtro}
          onChange={e => setFiltro(e.target.value)} className="campo-input" style={{margin:0,flex:1}}/>
        {filtro && <button className="campo-btn-sm" style={{background:'#78909c'}} onClick={() => setFiltro('')}>✕</button>}
        {(rol === 'admin' || rol === 'planificador') && <>
          <button className="campo-btn-sm" style={{background: vista === 'previa' ? '#4527a0' : '#455a64'}}
            onClick={() => setVista(v => v === 'carga' ? 'previa' : 'carga')}>
            {vista === 'carga' ? '👁 Vista' : '✏️ Carga'}
          </button>
          <button className="campo-btn-sm" title="Descargar PDF" onClick={() => generarPDF(false)}>📄</button>
          <button className="campo-btn-sm" style={{background:'#1b5e20'}} title="Compartir PDF por WhatsApp" onClick={() => generarPDF(true)}>📤</button>
        </>}
      </div>
      {!abierto && (
        <div className="campo-aviso" style={{margin:'8px 12px',display:'flex',alignItems:'center',gap:'10px',flexWrap:'wrap'}}>
          <span style={{flex:1,minWidth:'180px'}}>Operativo cerrado — solo lectura.</span>
          <button className="campo-btn-sm" style={{minHeight:'34px',background:'#2e7d32'}}
            onClick={async () => {
              if (!confirm('¿Reabrir el operativo para seguir cargando?')) return;
              try {
                await db.collection(collections.operativos).doc(opId).update({
                  estado: 'abierto',
                  reabiertoPor: { legajo: usuario.legajo, nombre: usuario.nombre },
                  reabiertoEn: new Date().toISOString(),
                });
                logOperativo(opId, 'reabrir', 'Operativo reabierto', usuario);
                toast('✓ Operativo reabierto', 'success');
              } catch (err) { toast('Error: ' + err.message, 'error'); }
            }}>▶ Reabrir</button>
        </div>
      )}

      {vista === 'carga' && secciones.map(sec => {
        const pts = (operativo.puestos || []).filter(p => p.seccion === sec).filter(matchPuesto);
        if (!pts.length && f) return null;
        const allPts = (operativo.puestos || []).filter(p => p.seccion === sec);
        const secTot = allPts.reduce((s, p) => s + (p.celdas || 0), 0);
        const secCarg = allPts.reduce((s, p) => { let n = 0; for (let i = 0; i < (p.celdas||0); i++) if (asigPorSlot[p.pid+'_s'+i]) n++; return s + n; }, 0);
        const abiertaSec = secAbiertas[sec] !== false; // abiertas por defecto
        return (
          <div key={sec} style={{margin:'10px 12px'}}>
            <div className="campo-sec-head" onClick={() => setSecAbiertas(s => ({...s, [sec]: !abiertaSec}))}>
              <span>{abiertaSec ? '▾' : '▸'} {sec}</span>
              <span style={{fontWeight:'800',color: secCarg >= secTot ? '#a5d6a7' : '#ffd54f'}}>{secCarg}/{secTot}</span>
            </div>
            {abiertaSec && pts.map(p => {
              const slots = [];
              for (let i = 0; i < (p.celdas || 0); i++) slots.push(asigPorSlot[p.pid + '_s' + i] || null);
              const cubiertos = slots.filter(Boolean).length;
              return (
                <div key={p.pid} className="campo-puesto">
                  <div style={{display:'flex',justifyContent:'space-between',gap:'8px',alignItems:'baseline'}}>
                    <div style={{fontWeight:'700',fontSize:'13px',color:'#1a3a6b'}}>
                      {p.nombre}
                      {p.tipo && <span style={{marginLeft:'6px',fontSize:'9px',fontWeight:'800',color:'#fff',background:tipoColor(p.tipo),padding:'1px 6px',borderRadius:'8px',verticalAlign:'middle'}}>{p.tipo}</span>}
                      {p.agregadoEnCampo && <span style={{marginLeft:'6px',fontSize:'9px',fontWeight:'800',color:'#4527a0',background:'#ede7f6',padding:'1px 6px',borderRadius:'8px',verticalAlign:'middle'}} title={`Agregado en campo por ${p.agregadoEnCampo.nombre}`}>CAMPO</span>}
                    </div>
                    <div style={{display:'flex',alignItems:'center',gap:'6px',flexShrink:0}}>
                      <div style={{fontSize:'11px',fontWeight:'800',color: cubiertos >= slots.length ? '#2e7d32' : '#b26a00'}}>{cubiertos}/{slots.length}</div>
                      {abierto && <>
                        <button className="campo-mini-btn" title="Quitar una celda" onClick={() => cambiarCeldas(p, -1)}>−</button>
                        <button className="campo-mini-btn" title="Agregar una celda" onClick={() => cambiarCeldas(p, 1)}>＋</button>
                        {(rol === 'admin' || rol === 'planificador') && <>
                          <button className="campo-mini-btn" title="Editar puesto (nombre, tipo y jefe)" onClick={() => setModal({ tipo:'jefe', puesto:p })}>✏️</button>
                          <button className="campo-mini-btn" style={{color:'#b71c1c'}} title="Eliminar puesto" onClick={() => eliminarPuesto(p)}>🗑</button>
                        </>}
                      </>}
                    </div>
                  </div>
                  {p.descripcion && <div style={{fontSize:'11px',color:'#888',marginTop:'1px'}}>{p.descripcion}</div>}
                  {p.jefeNombre && <div style={{fontSize:'11px',color:'#555',marginTop:'1px'}}>👤 {[p.jefeRango, p.jefeNombre].filter(Boolean).join(' ')}{p.jefeTel ? ' · ' + p.jefeTel : ''}</div>}
                  <div style={{display:'flex',flexWrap:'wrap',gap:'6px',marginTop:'8px'}}>
                    {slots.map((a, i) => a ? (
                      <button key={i} className={'campo-slot ' + (a._pendiente ? 'pendiente' : 'ocupado')} onClick={() => setModal({ tipo:'detalle', asig:a, puesto:p })}>
                        {a._pendiente && '🕐 '}<span style={{fontWeight:'800'}}>{a.apellido}</span>
                        <span style={{opacity:.8,fontSize:'10px'}}> · {a.lp || a.grado || ''}</span>
                      </button>
                    ) : (
                      <button key={i} className="campo-slot libre" disabled={!abierto}
                        onClick={() => setModal({ tipo:'asignar', puesto:p, slot:i })}>+ Cargar</button>
                    ))}
                  </div>
                </div>
              );
            })}
            {abiertaSec && abierto && (
              <button className="campo-btn-ghost" style={{margin:'6px 4px 0',width:'calc(100% - 8px)',borderStyle:'dashed'}}
                onClick={() => setModal({ tipo:'nuevoPuesto', seccion: sec })}>
                ➕ Agregar puesto en {sec}
              </button>
            )}
          </div>
        );
      })}

      {/* ── VISTA PREVIA EN VIVO (monitor de supervisor) ── */}
      {vista === 'previa' && (() => {
        const hora = (iso) => iso ? new Date(iso).toLocaleTimeString('es-AR', { hour: '2-digit', minute: '2-digit' }) : '';
        const ultimas = asigsMerged.filter(a => a.cargadoEn)
          .sort((a, b) => (b.cargadoEn || '').localeCompare(a.cargadoEn || '')).slice(0, 5);
        return (
          <div style={{margin:'10px 12px'}}>
            <div style={{display:'flex',gap:'16px',flexWrap:'wrap',margin:'0 0 10px',padding:'9px 12px',background:'#fff',border:'1px solid #dde3ee',borderRadius:'10px'}}>
              <label style={{display:'flex',alignItems:'center',gap:'8px',fontSize:'12px',color:'#333',cursor:'pointer',userSelect:'none'}}>
                <input type="checkbox" checked={soloFaltantes} onChange={e => setSoloFaltantes(e.target.checked)} style={{width:'17px',height:'17px'}}/>
                Solo faltantes ({totalCeldas - totalCargados})
              </label>
              <label style={{display:'flex',alignItems:'center',gap:'8px',fontSize:'12px',color:'#333',cursor:'pointer',userSelect:'none'}}>
                <input type="checkbox" checked={ocultarAvisados} onChange={e => setOcultarAvisados(e.target.checked)} style={{width:'17px',height:'17px'}}/>
                Ocultar avisados (✅ {totalAvisados}/{totalCargados})
              </label>
            </div>
            {ultimas.length > 0 && !soloFaltantes && (
              <div style={{background:'#e8f0fe',border:'1px solid #c3d4f5',borderRadius:'10px',padding:'8px 12px',marginBottom:'10px'}}>
                <div style={{fontSize:'10px',fontWeight:'800',color:'#1a3a6b',letterSpacing:'.5px',marginBottom:'4px'}}>⚡ ÚLTIMAS CARGAS</div>
                {ultimas.map(a => (
                  <div key={a.pid + '_' + a.slot} style={{fontSize:'12px',color:'#333',padding:'2px 0'}}>
                    <b>{a.apellido}</b> → {(puestoPorPid[a.pid] || {}).nombre || '?'}
                    <span style={{color:'#888'}}> · {hora(a.cargadoEn)}{a._pendiente ? ' · 🕐' : ''}{a.cargadoPor ? ' · por ' + a.cargadoPor.nombre : ''}</span>
                  </div>
                ))}
              </div>
            )}
            {equipos.length > 0 && !soloFaltantes && (
              <div style={{background:'#fff',border:'1px solid #dde3ee',borderRadius:'10px',padding:'8px 12px',marginBottom:'10px'}}>
                <div style={{fontSize:'10px',fontWeight:'800',color:'#1a3a6b',letterSpacing:'.5px',marginBottom:'5px'}}>👥 EQUIPOS DE CARGA</div>
                {equipos.map(p => {
                  const estado = p.min < 3 ? '🟢' : (p.min < 10 ? '🟡' : '⚪');
                  const inactivo = abierto && p.min < 10 && p.cargas > 0 && p.minCarga !== null && p.minCarga > 20;
                  return (
                    <div key={p.legajo} style={{display:'flex',gap:'8px',alignItems:'baseline',fontSize:'12px',color:'#333',padding:'3px 0',flexWrap:'wrap'}}>
                      <span>{estado}</span>
                      <b style={{color:'#1a3a6b'}}>{p.nombre}</b>
                      <span style={{color:'#888'}}>LP {p.legajo}{p.rol && p.rol !== 'operador' ? ' · ' + p.rol : ''}</span>
                      <span style={{marginLeft:'auto',color:'#555'}}>
                        {p.cargas} carga{p.cargas !== 1 ? 's' : ''}
                        {p.ultimaCarga && <span style={{color:'#999'}}> · última {new Date(p.ultimaCarga).toLocaleTimeString('es-AR',{hour:'2-digit',minute:'2-digit'})}</span>}
                      </span>
                      {inactivo && <span style={{flexBasis:'100%',color:'#b26a00',fontSize:'11px',fontWeight:'700'}}>⚠️ En línea pero sin cargas hace {Math.round(p.minCarga)} min</span>}
                    </div>
                  );
                })}
              </div>
            )}
            {secciones.map(sec => {
              const allPts = (operativo.puestos || []).filter(p => p.seccion === sec);
              const secTot = allPts.reduce((s, p) => s + (p.celdas || 0), 0);
              const secCarg = allPts.reduce((s, p) => { let n = 0; for (let i = 0; i < (p.celdas||0); i++) if (asigPorSlot[p.pid+'_s'+i]) n++; return s + n; }, 0);
              const rowVisible = (a) => {
                if (soloFaltantes && a) return false;
                if (ocultarAvisados && a && a.avisado) return false;
                return true;
              };
              const visBase = allPts.filter(matchPuesto);
              const pts = (soloFaltantes || ocultarAvisados)
                ? visBase.filter(p => { for (let i = 0; i < (p.celdas||0); i++) if (rowVisible(asigPorSlot[p.pid+'_s'+i] || null)) return true; return false; })
                : visBase;
              if ((soloFaltantes || ocultarAvisados || f) && pts.length === 0) return null;
              return (
                <div key={sec} style={{marginBottom:'12px'}}>
                  <div style={{background:'#1a3a6b',color:'#fff',padding:'8px 12px',borderRadius:'10px 10px 0 0',fontSize:'12px',fontWeight:'800',letterSpacing:'.3px',display:'flex',justifyContent:'space-between'}}>
                    <span>{sec}</span>
                    <span style={{color: secCarg >= secTot ? '#a5d6a7' : '#ffd54f'}}>{secCarg}/{secTot}</span>
                  </div>
                  <div style={{background:'#fff',border:'1px solid #dde3ee',borderTop:'none',borderRadius:'0 0 10px 10px',overflow:'hidden'}}>
                    {pts.map(p => (
                      <div key={p.pid} style={{borderBottom:'1px solid #eef1f6'}}>
                        <div style={{background:'#eef2f9',padding:'6px 12px',fontSize:'12px',fontWeight:'800',color:'#1a3a6b',display:'flex',justifyContent:'space-between',gap:'8px',flexWrap:'wrap'}}>
                          <span>{p.nombre}{p.tipo ? '  [' + p.tipo + ']' : ''}</span>
                          {p.jefeNombre && <span style={{fontWeight:'600',color:'#555'}}>👤 {[p.jefeRango, p.jefeNombre].filter(Boolean).join(' ')}</span>}
                        </div>
                        {Array.from({length: p.celdas || 0}, (_, i) => {
                          const a = asigPorSlot[p.pid + '_s' + i];
                          if (a && !rowVisible(a)) return null;
                          return a ? (
                            <div key={i} style={{display:'flex',gap:'8px',padding:'5px 12px',fontSize:'12px',color:'#222',alignItems:'center',background: a._pendiente ? '#fffbea' : (a.avisado ? '#f0f9f0' : '#fff')}}>
                              <button onClick={() => toggleAvisado(a)} title={a.avisado ? `Avisado por ${a.avisado.nombre}` : 'Marcar como avisado'}
                                style={{width:'30px',height:'30px',flexShrink:0,border:'none',background:'transparent',fontSize:'17px',cursor:'pointer',padding:0,opacity: a._pendiente ? .35 : 1}}>
                                {a.avisado ? '✅' : '⭕'}
                              </button>
                              <span style={{color:'#999',width:'16px',flexShrink:0}}>{i + 1}</span>
                              <span style={{fontFamily:'monospace',width:'52px',flexShrink:0}}>{a.lp || '—'}</span>
                              <span style={{flex:1,minWidth:0}}><b>{a.apellido}</b>{a.nombre ? ', ' + a.nombre : ''} <span style={{color:'#888'}}>· {a.grado || ''}</span>{a._pendiente ? ' 🕐' : ''}</span>
                              {a.tel && <span style={{color:'#888',flexShrink:0}}>{a.tel}</span>}
                            </div>
                          ) : (
                            <div key={i} style={{display:'flex',gap:'8px',padding:'5px 12px',fontSize:'12px',alignItems:'baseline',background:'#fff5f5'}}>
                              <span style={{color:'#999',width:'16px',flexShrink:0}}>{i + 1}</span>
                              <span style={{color:'#c62828',fontStyle:'italic',fontWeight:'600'}}>— sin cubrir —</span>
                            </div>
                          );
                        })}
                      </div>
                    ))}
                  </div>
                </div>
              );
            })}
          </div>
        );
      })()}
      {abierto && (rol === 'admin' || rol === 'planificador') && (
        <div style={{padding:'14px 12px 30px'}}>
          <button className="campo-btn-main" style={{background:'#b71c1c'}} onClick={finalizar}>
            🏁 FINALIZAR CARGA Y GENERAR PDF
          </button>
        </div>
      )}

      <div style={{height:'30px'}}/>

      {modal && modal.tipo === 'nuevoPuesto' && (
        <NuevoPuestoModal seccion={modal.seccion}
          onGuardar={async (datos) => { await agregarPuesto(modal.seccion, datos); setModal(null); }}
          onClose={() => setModal(null)} toast={toast}/>
      )}
      {pdfListo && (
        <div className="campo-modal-bg" onClick={e => { if (e.target === e.currentTarget) setPdfListo(null); }}>
          <div className="campo-modal">
            <div className="campo-modal-head">
              <div style={{fontSize:'11px',opacity:.8}}>{Math.round(pdfListo.blob.size / 1024)} KB</div>
              <div style={{fontWeight:'800',fontSize:'15px'}}>📄 PDF listo para difundir</div>
            </div>
            <div style={{padding:'16px'}}>
              <div style={{fontSize:'12px',color:'#555',wordBreak:'break-all'}}>{pdfListo.nombre}</div>
              {puedeCompartirArchivos() ? (
                <button className="campo-btn-main" style={{background:'#1b5e20'}} onClick={compartirListo}>
                  📤 COMPARTIR (WhatsApp)
                </button>
              ) : (
                <div style={{marginTop:'12px',fontSize:'12px',color:'#8a6d00',background:'#fff8e1',padding:'8px 10px',borderRadius:'8px'}}>
                  Este navegador no permite compartir archivos (pasa en <b>Firefox</b>).
                  Usá <b>⬇ Descargar</b> y adjuntalo en WhatsApp a mano — o abrí la app en <b>Chrome</b> para compartir directo.
                </div>
              )}
              <button className="campo-btn-ghost" onClick={() => { downloadBlob(pdfListo.blob, pdfListo.nombre); setPdfListo(null); }}>
                ⬇ Descargar
              </button>
              <button className="campo-btn-ghost" onClick={() => setPdfListo(null)}>Cerrar</button>
            </div>
          </div>
        </div>
      )}
      {modal && modal.tipo === 'evento' && (
        <EditarEventoModal operativo={operativo}
          onGuardar={async (d) => { await editarEvento(d); setModal(null); }}
          onClose={() => setModal(null)} toast={toast}/>
      )}
      {modal && modal.tipo === 'jefe' && (
        <EditarJefeModal puesto={modal.puesto} nomina={nomina || new Map()} jefesQth={jefesQth}
          onGuardar={async (d) => { await editarJefe(modal.puesto, d); setModal(null); }}
          onClose={() => setModal(null)} toast={toast}/>
      )}
      {modal && modal.tipo === 'asignar' && nomina && (
        <AsignarModal puesto={modal.puesto} slot={modal.slot}
          nomina={nomina} asignaciones={asigsConPuesto} lpEnOtros={lpEnOtros}
          cadena={cadena} setCadena={setCadena}
          onConfirmar={(ef) => handleConfirmarAsig(modal.puesto, modal.slot, ef)}
          onClose={() => setModal(null)} toast={toast}/>
      )}
      {modal && modal.tipo === 'detalle' && (
        <DetalleAsigModal asig={modal.asig} puesto={modal.puesto} operativoId={opId}
          usuario={usuario} rol={rol} onQuitarPendiente={quitarPendiente}
          onClose={() => setModal(null)} toast={toast}/>
      )}
    </div>
  );
}

// ── ADMIN: usuarios de campo + nómina + operativos ─────────────
function AdminTab({ usuario, toast }) {
  const [usuarios, setUsuarios] = useState([]);
  const [filtroU, setFiltroU] = useState('');
  const [verFijos, setVerFijos] = useState(false);
  const [config, setConfig] = useState({});
  const [logVer, setLogVer] = useState(null);
  const [logItems, setLogItems] = useState([]);
  const [secAdmin, setSecAdmin] = useState({ operativos: true, nomina: false, usuarios: false, prefs: false });
  const toggleSec = (k) => setSecAdmin(s => ({ ...s, [k]: !s[k] }));
  const [editUserId, setEditUserId] = useState(null);
  const [telCand, setTelCand] = useState(null);   // null = sin buscar, [] = sin resultados
  const [telSel, setTelSel] = useState({});
  const [buscandoTel, setBuscandoTel] = useState(false);
  const [aplicandoTel, setAplicandoTel] = useState(false);
  const [form, setForm] = useState({ legajo:'', nombre:'', jerarquia:'', password:'', rol:'operador' });
  const [nominaMeta, setNominaMeta] = useState(null);
  const [subiendo, setSubiendo] = useState(false);
  const [operativos, setOperativos] = useState([]);
  const { db, collections } = window.firebaseUtils;
  const fileRef = useRef(null);

  useEffect(() => {
    const u1 = db.collection(collections.usuarios).orderBy('creadoEn', 'desc')
      .onSnapshot(s => setUsuarios(s.docs.map(d => ({ id: d.id, ...d.data() }))), () => {});
    const u2 = db.collection(collections.nomina).doc('meta')
      .onSnapshot(d => setNominaMeta(d.exists ? d.data() : null), () => {});
    const u3 = db.collection(collections.operativos).orderBy('creadoEn', 'desc').limit(25)
      .onSnapshot(s => setOperativos(s.docs.map(d => ({ id: d.id, ...d.data() }))), () => {});
    const u4 = db.collection(collections.config).doc('campo')
      .onSnapshot(d => setConfig(d.exists ? d.data() : {}), () => {});
    return () => { u1(); u2(); u3(); u4(); };
  }, []);

  const altaUsuario = async () => {
    const lp = form.legajo.trim();
    if (!lp || !form.nombre.trim() || !form.password.trim()) { toast('Legajo, nombre y clave son obligatorios.', 'error'); return; }
    try {
      if (editUserId) {
        // Edición de un usuario existente
        await db.collection(collections.usuarios).doc(editUserId).update({
          nombre: form.nombre.trim().toUpperCase(), jerarquia: form.jerarquia.trim(),
          password: form.password.trim(), rol: form.rol,
          editadoPor: { legajo: usuario.legajo, nombre: usuario.nombre },
          editadoEn: new Date().toISOString(),
        });
        toast('✓ Usuario actualizado', 'success');
      } else {
        if (USUARIOS_AUTORIZADOS[lp]) { toast('Ese legajo ya existe como usuario de la Mesa. Importalo primero para poder editarlo.', 'error'); return; }
        if (usuarios.find(u => u.legajo === lp)) { toast('Ese legajo ya está dado de alta. Usá el lápiz para editarlo.', 'error'); return; }
        await db.collection(collections.usuarios).doc(lp).set({
          legajo: lp, nombre: form.nombre.trim().toUpperCase(), jerarquia: form.jerarquia.trim(),
          password: form.password.trim(), rol: form.rol, activo: true,
          creadoPor: { legajo: usuario.legajo, nombre: usuario.nombre },
          creadoEn: new Date().toISOString(),
        });
        toast('✓ Usuario creado', 'success');
      }
      setForm({ legajo:'', nombre:'', jerarquia:'', password:'', rol:'operador' });
      setEditUserId(null);
    } catch (err) { toast('Error: ' + err.message, 'error'); }
  };

  const editarUsuario = (u) => {
    setForm({ legajo: u.legajo, nombre: u.nombre || '', jerarquia: u.jerarquia || '',
      password: u.password || '', rol: u.rol || 'operador' });
    setEditUserId(u.id);
  };
  const cancelarEdicion = () => {
    setForm({ legajo:'', nombre:'', jerarquia:'', password:'', rol:'operador' });
    setEditUserId(null);
  };

  const toggleActivo = async (u) => {
    await db.collection(collections.usuarios).doc(u.id).update({ activo: u.activo === false });
  };
  const borrarUsuario = async (u) => {
    if (!confirm(`¿Eliminar al usuario ${u.nombre} (LP ${u.legajo})?`)) return;
    await db.collection(collections.usuarios).doc(u.id).delete();
    toast('Usuario eliminado', 'success');
  };

  const subirNomina = async (file) => {
    setSubiendo(true);
    try {
      const buf = await file.arrayBuffer();
      const wb = XLSX.read(buf, { type: 'array' });
      const rows = parseNominaWorkbook(wb);
      if (!rows.length) { toast('No se encontraron filas válidas en el Excel.', 'error'); setSubiendo(false); return; }
      if (!confirm(`Se van a subir ${rows.length.toLocaleString('es-AR')} efectivos, reemplazando la nómina actual. ¿Continuar?`)) { setSubiendo(false); return; }
      toast('Subiendo nómina...', 'info');
      const res = await subirNominaFirestore(rows, usuario);
      toast(`✓ Nómina actualizada: ${res.count.toLocaleString('es-AR')} efectivos`, 'success');
    } catch (err) { toast('Error nómina: ' + err.message, 'error'); }
    finally { setSubiendo(false); if (fileRef.current) fileRef.current.value = ''; }
  };

  // Teléfonos recolectados en campo → nómina general
  const buscarTelefonos = async () => {
    setBuscandoTel(true);
    try {
      const { map } = await cargarNomina();
      if (!map.size) { toast('Primero subí la nómina general.', 'error'); setBuscandoTel(false); return; }
      const cand = {};
      for (const o of operativos) {
        const snap = await db.collection(collections.operativos).doc(o.id).collection('asignaciones').get();
        snap.docs.forEach(d => {
          const a = d.data();
          const tel = String(a.tel || '').trim();
          if (!a.lp || !tel) return;
          const en = map.get(String(a.lp));
          if (!en || (en.tel && en.tel.trim())) return; // no figura en nómina, o ya tiene teléfono
          const prev = cand[a.lp];
          if (!prev || (a.cargadoEn || '') > (prev.cargadoEn || '')) {
            cand[a.lp] = { lp: String(a.lp), tel, cargadoEn: a.cargadoEn || '',
              apellido: en.apellido, nombre: en.nombre, grado: en.grado,
              origen: `${o.estadio} · ${fmtFecha(o.fecha)}` };
          }
        });
      }
      const lista = Object.values(cand).sort((a, b) => (a.apellido || '').localeCompare(b.apellido || '', 'es'));
      setTelCand(lista);
      const sel = {}; lista.forEach(c => { sel[c.lp] = true; }); setTelSel(sel);
      if (!lista.length) toast('No hay teléfonos nuevos para incorporar.', 'info');
    } catch (err) { toast('Error: ' + err.message, 'error'); }
    finally { setBuscandoTel(false); }
  };

  const aplicarTelefonos = async () => {
    const elegidos = (telCand || []).filter(c => telSel[c.lp]);
    if (!elegidos.length) { toast('No hay teléfonos seleccionados.', 'error'); return; }
    if (!confirm(`Se van a incorporar ${elegidos.length} teléfono(s) a la nómina general.\n\nLa nómina se re-publica y todos los dispositivos la actualizan en su próxima apertura.\n\n¿Continuar?`)) return;
    setAplicandoTel(true);
    try {
      const { map } = await cargarNomina();
      elegidos.forEach(c => { const en = map.get(c.lp); if (en) en.tel = c.tel; });
      const rows = Array.from(map.values()).map(e => [e.lp, e.grado, e.apellido, e.nombre, e.tel]);
      await subirNominaFirestore(rows, usuario);
      toast(`✓ ${elegidos.length} teléfono(s) incorporados a la nómina`, 'success');
      setTelCand(null); setTelSel({});
    } catch (err) { toast('Error: ' + err.message, 'error'); }
    finally { setAplicandoTel(false); }
  };

  const importarFijos = async () => {
    const faltantes = Object.values(USUARIOS_AUTORIZADOS)
      .filter(u => !usuarios.find(x => String(x.legajo) === String(u.legajo)));
    if (!faltantes.length) { toast('Todos los usuarios fijos ya están importados.', 'info'); return; }
    if (!confirm(`Se van a importar ${faltantes.length} usuarios fijos a Firestore.\n\nDespués vas a poder editarlos, deshabilitarlos o cambiarles la clave desde este panel (la copia de Firestore tiene prioridad al ingresar).\n\n¿Continuar?`)) return;
    try {
      const ops = faltantes.map(u => ({ type: 'set', ref: db.collection(collections.usuarios).doc(String(u.legajo)), data: {
        legajo: String(u.legajo), nombre: u.nombre, jerarquia: u.jerarquia || '', password: u.password || '',
        rol: 'planificador', activo: true, origen: 'sistema',
        creadoPor: { legajo: usuario.legajo, nombre: usuario.nombre }, creadoEn: new Date().toISOString(),
      }}));
      await commitInBatches(ops);
      toast(`✓ ${faltantes.length} usuarios fijos importados`, 'success');
    } catch (err) { toast('Error: ' + err.message, 'error'); }
  };

  const toggleExigirAvisados = async () => {
    try {
      await db.collection(collections.config).doc('campo').set({ exigirAvisados: !config.exigirAvisados }, { merge: true });
    } catch (err) { toast('Error: ' + err.message, 'error'); }
  };

  const verLog = async (o) => {
    if (logVer === o.id) { setLogVer(null); setLogItems([]); return; }
    try {
      const snap = await db.collection(collections.operativos).doc(o.id)
        .collection('log').orderBy('ts', 'desc').limit(100).get();
      setLogItems(snap.docs.map(d => d.data()));
      setLogVer(o.id);
    } catch (err) { toast('Error: ' + err.message, 'error'); }
  };

  const toggleOperativo = async (o) => {
    const nuevo = o.estado === 'abierto' ? 'cerrado' : 'abierto';
    await db.collection(collections.operativos).doc(o.id).update({ estado: nuevo });
    toast(`Operativo ${nuevo === 'abierto' ? 'reabierto' : 'cerrado'}`, 'success');
  };
  const borrarOperativo = async (o) => {
    if (!confirm(`¿Eliminar el operativo ${o.estadio} · ${fmtFecha(o.fecha)} y TODAS sus cargas?`)) return;
    try {
      const snap = await db.collection(collections.operativos).doc(o.id).collection('asignaciones').get();
      const ops = snap.docs.map(d => ({ type:'delete', ref: d.ref }));
      await commitInBatches(ops);
      await db.collection(collections.operativos).doc(o.id).delete();
      toast('Operativo eliminado', 'success');
    } catch (err) { toast('Error: ' + err.message, 'error'); }
  };

  const inp = { width:'100%', padding:'9px 11px', border:'1.5px solid #ccd3e0', borderRadius:'8px', fontSize:'13px', boxSizing:'border-box', marginTop:'6px' };
  return (
    <div style={{maxWidth:'860px', margin:'0 auto', padding:'16px 14px 40px'}}>
      {/* OPERATIVOS */}
      <div className="card" style={{marginTop:'16px'}}>
        <div className="card-header" style={{cursor:'pointer',userSelect:'none'}} onClick={() => toggleSec('operativos')}><span>{secAdmin.operativos ? '▾ ' : '▸ '}📡 OPERATIVOS PUBLICADOS</span>
          <span className="counter-pill">{operativos.length}</span>
        </div>
        {secAdmin.operativos && <div className="card-body">
          {operativos.length === 0 && <div className="empty-state">Sin operativos. Publicá uno desde "Distribución Previa".</div>}
          {operativos.map(o => (

function LoginModal({ onLogin }) {
  const [legajo,   setLegajo]   = React.useState('');
  const [password, setPassword] = React.useState('');
  const [step,     setStep]     = React.useState('legajo'); // 'legajo' | 'password'
  const [pendingUser, setPendingUser] = React.useState(null);
  const [error,    setError]    = React.useState('');
  const passRef = React.useRef(null);

  const [buscando, setBuscando] = React.useState(false);

  const handleLegajo = async () => {
    const clean = legajo.trim();
    if (!clean) { setError('Ingresá tu número de legajo.'); return; }
    setBuscando(true);
    let user = null;
    // 1) Firestore: fuente de verdad (permite editar/deshabilitar desde el panel Admin)
    try {
      const d = await Promise.race([
        window.firebaseUtils.db.collection(window.firebaseUtils.collections.usuarios).doc(clean).get(),
        new Promise((_, rej) => setTimeout(() => rej(new Error('TIMEOUT')), 6000)),
      ]);
      if (d.exists) { user = d.data(); cacheUsuarioLocal(user); }
    } catch(e) {
      // 2) Sin señal: cache local del teléfono (guardado en logins anteriores)
      user = leerUsuarioCache(clean);
    }
    // 3) Usuarios fijos del código, como respaldo
    if (!user) user = USUARIOS_AUTORIZADOS[clean] || null;
    setBuscando(false);
    if (!user) { setError('Legajo no autorizado.'); return; }
    if (user.activo === false) { setError('Usuario deshabilitado. Consultá al administrador.'); return; }
    const conRol = { ...user, rol: rolDeUsuario(user) };
    if (user.password) {
      setPendingUser(conRol);
      setStep('password');
      setError('');
      setTimeout(() => passRef.current && passRef.current.focus(), 50);
    } else {
      onLogin(conRol);
    }
  };

  const handlePassword = () => {
    if (!password) { setError('Ingresá tu contraseña.'); return; }
    if (password !== pendingUser.password) {
      setError('Contraseña incorrecta.');
      setPassword('');
      return;
    }
    onLogin(pendingUser);
  };

  const handleBack = () => {
    setStep('legajo');
    setPassword('');
    setPendingUser(null);
    setError('');
  };

  return (
    <div className="login-screen">
      <div className="login-card">
        <div className="login-escudo">
          <img src="escudo.png" alt="DPEM"
            onError={e => { e.target.style.display='none'; e.target.parentNode.textContent='DPEM'; }}/>
        </div>
        <div className="login-title">MESA DE DISTRIBUCIÓN</div>
        <div className="login-sub">DSED · DPEM · POLICÍA DE LA CIUDAD</div>
        <div className="login-gold"/>

        {step === 'legajo' ? (<>
          <label className="login-label">NÚMERO DE LEGAJO</label>
          <input
            type="text" inputMode="numeric" pattern="[0-9]*"
            placeholder="— — — — —" autoFocus autoComplete="off"
            className="login-input"
            value={legajo}
            onChange={e => { setLegajo(e.target.value.replace(/\D/g,'')); setError(''); }}
            onKeyDown={e => e.key === 'Enter' && handleLegajo()}
          />
        </>) : (<>
          <div className="login-chip">
            <div className="login-chip-av">{(pendingUser?.nombre || '?').charAt(0)}</div>
            <div style={{minWidth:0}}>
              <div style={{fontWeight:'800',fontSize:'13px',color:'#12336a',whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis'}}>
                {pendingUser?.jerarquia ? pendingUser.jerarquia + ' ' : ''}{pendingUser?.nombre}
              </div>
              <div style={{fontSize:'11px',color:'#7c93b8',fontWeight:'600'}}>LP {pendingUser?.legajo}</div>
            </div>
            <button className="login-chip-back" onClick={handleBack} title="Cambiar legajo">✕</button>
          </div>
          <label className="login-label">CONTRASEÑA</label>
          <input
            ref={passRef}
            type="password" placeholder="••••••"
            className="login-input"
            value={password}
            onChange={e => { setPassword(e.target.value); setError(''); }}
            onKeyDown={e => e.key === 'Enter' && handlePassword()}
          />
        </>)}

        {error && <div className="login-error">{error}</div>}

        <button className="login-btn" disabled={buscando}
          onClick={step === 'legajo' ? handleLegajo : handlePassword}>
          {step === 'legajo' ? (buscando ? '⏳ VERIFICANDO...' : 'CONTINUAR →') : 'INGRESAR'}
        </button>

        <div className="login-footer">Dirección Prevención en Eventos Masivos<br/>Depto. Seguridad en Eventos Deportivos<br/><span style={{opacity:.7}}>{APP_VERSION}</span></div>
      </div>
    </div>
  );
}

// ── APP ────────────────────────────────────────────────────────
function App() {
  // ── LOGIN ──
  const [usuario, setUsuario] = useState(() => {
    try {
      const saved = sessionStorage.getItem('mesa-dist-usuario');
      return saved ? JSON.parse(saved) : null;
    } catch(e) { return null; }
  });
  const handleLogin = (user) => {
    setUsuario(user);
    try { sessionStorage.setItem('mesa-dist-usuario', JSON.stringify(user)); } catch(e) {}
  };
  // Limpia las colecciones de sesión de Firestore (best-effort, no bloquea)
  const _limpiarColeccionesSesion = async () => {
    try {
      const {db,collections} = window.firebaseUtils;
      const sesionCols = [collections.qths, collections.motos, collections.infanteria, collections.refuerzo, collections.tercerAnillo];
      for (const col of sesionCols) {
        const snap = await db.collection(col).get();
        if (snap.empty) continue;
        const ops = snap.docs.map(d => ({ type:'delete', ref: db.collection(col).doc(d.id) }));
        await commitInBatches(ops);
      }
    } catch(e) { /* silent */ }
  };

  const handleLogout = async () => {
    await _limpiarColeccionesSesion();
    setUsuario(null);
    try { sessionStorage.removeItem('mesa-dist-usuario'); } catch(e) {}
  };

  // En celular la vista predeterminada es Carga Operativa; en escritorio, Distribución Previa
  const [tab,setTab]           = useState(() =>
    (typeof window !== 'undefined' && window.matchMedia && window.matchMedia('(max-width: 899px)').matches)
      ? 'campo' : 'distribucion');
  const [jefes,setJefes]       = useState([]);
  const [qths,setQths]         = useState([]);
  const [motos,setMotos]       = useState([]);
  const [infanteria,setInfanteria] = useState([]);
  const [refuerzo,setRefuerzo]   = useState([]);
  const [tercerAnillo,setTercerAnillo] = useState([]);
  const [historial,setHistorial]= useState([]);
  const [plantillas,setPlantillas]= useState([]);
  const [editingQTH,setEditingQTH] = useState(null);
  const [savingHist,setSavingHist] = useState(false);
  const [cargando,setCargando] = useState(false);
  const [viendoHist,setViendoHist] = useState(null);
  const [evento,setEvento] = useState({estadio:'',otroEstadio:'',fecha:todayISO(),localidad:''});
  const [lastActivity,setLastActivity] = useState(null);
  const lastActivityDismissed = useRef(null);
  const {toasts,toast,dismissToast} = useToast();

  // ── Activity tracker ──
  const _trackActivity = useCallback(async (accion) => {
    if (!usuario) return;

        <strong>{lastActivity.jerarquia} {lastActivity.nombre}</strong> (LP {lastActivity.legajo})
        {' '}{lastActivity.accion || 'modificó la distribución'}
        {' '}— hace {Math.max(1, Math.round((Date.now() - new Date(lastActivity.timestamp).getTime()) / 60000))} min
      </span>
      <button className="dismiss-btn" onClick={() => { lastActivityDismissed.current = lastActivity.timestamp; setLastActivity(a => ({...a})); }}>
        Entendido ✕
      </button>
    </div>
  ) : null;

  if (!usuario) return <LoginModal onLogin={handleLogin}/>;

  if (viendoHist) return (
    <div>
      <Header usuario={usuario} onLogout={handleLogout}/>
      <VistaHistorial h={viendoHist} onVolver={()=>setViendoHist(null)} toast={toast}/>
      <div className="toast-container">{toasts.map(t=><div key={t.id} className={`toast ${t.type}`}>{t.msg}{t.action&&<span className="toast-action" onClick={()=>{t.action.onClick();dismissToast(t.id);}}>{t.action.label}</span>}</div>)}</div>
    </div>
  );

  return (
    <div className="layout">
      <div className="topbar">
        <button className="topbar-burger" onClick={()=>setSbOpen(true)}>☰</button>
        <span className="topbar-title">MESA DE DISTRIBUCIÓN</span>
      </div>
      {sbOpen && <div className="sb-backdrop" onClick={()=>setSbOpen(false)}/>}
      <Sidebar usuario={usuario} rol={rol} tab={tab} onTab={setTab}
        historialCount={historial.length} onLogout={handleLogout}
        open={sbOpen} onClose={()=>setSbOpen(false)}
        dark={darkMode} onToggleDark={()=>setDarkMode(d=>!d)}/>
      <div className="main">
      {hayUpdate && (
        <div onClick={() => window.location.reload()}
          style={{background:'#f2b705',color:'#3a2c00',padding:'10px 16px',fontSize:'13px',fontWeight:'800',
            textAlign:'center',cursor:'pointer',letterSpacing:'.3px'}}>
          🔄 Hay una versión nueva de la app — TOCÁ ACÁ PARA ACTUALIZAR
        </div>
      )}
      {ActivityBanner}

      {tab==='distribucion' && rol!=='operador' &&<>
        <EventoBar evento={evento} onChange={setEvento} onGuardar={handleGuardar}
          onNueva={handleNuevaDistribucion} onGuardarPlantilla={handleGuardarPlantilla}
          qths={qths} saving={savingHist} totalItems={totalItems} totalEfectivos={totalEfectivos}
          infanteria={infanteria} refuerzo={refuerzo} tercerAnillo={tercerAnillo}/>

        {/* ── Banner publicar a campo ── */}
        {totalItems > 0 && (
          <div style={{
            background:'linear-gradient(90deg,#1b5e20,#2e7d32)',
            color:'#fff', padding:'8px 20px',
            display:'flex', alignItems:'center', gap:'12px', flexWrap:'wrap',
            fontSize:'12px',
          }}>
            <span style={{fontSize:'16px'}}>📱</span>
            <span>
              <strong>Carga Operativa:</strong> publicá esta distribución para que los operadores carguen efectivos desde el celular ({totalItems} puestos · {totalEfectivos + motos.length} celdas).
            </span>
            <button
              className="btn btn-sm"
              style={{background:'#66bb6a',color:'#0b2e0d',border:'none',marginLeft:'auto',flexShrink:0,fontWeight:'800'}}
              onClick={handlePublicarCampo}
              disabled={publicando}
            >
              {publicando ? '⏳ Publicando...' : '📡 Publicar a Carga Operativa'}
            </button>
          </div>
        )}

        {/* ── Banner último guardado ── */}
        {ultimoGuardado && (
          <div style={{
            background:'linear-gradient(90deg,#0d3349,#134a6e)',
            color:'#fff', padding:'8px 20px',
            display:'flex', alignItems:'center', gap:'12px', flexWrap:'wrap',
            fontSize:'12px',
          }}>
            <span style={{fontSize:'16px'}}>📋</span>
            <span>
              <strong>Último guardado para {estadioNombre}:</strong>
              {' '}{fmtFecha(ultimoGuardado.fechaEvento)}
              {ultimoGuardado.localidad && ` · ${ultimoGuardado.localidad}`}
              {' '}·{' '}<span style={{opacity:.8}}>{(ultimoGuardado.qths||[]).length} QTHs · {(ultimoGuardado.qths||[]).reduce((s,q)=>s+(q.celdas||0),0)} celdas{(ultimoGuardado.motos||[]).length>0&&` · ${ultimoGuardado.motos.length} motos`}{(ultimoGuardado.tercerAnillo||[]).length>0&&` · ${ultimoGuardado.tercerAnillo.length} 3er anillo`}</span>
            </span>
            <button
              className="btn btn-sm"
              style={{background:'#1e88e5',color:'#fff',border:'none',marginLeft:'auto',flexShrink:0}}
              onClick={handleCargarUltimo}
              disabled={cargando}
            >
              {cargando ? '⏳ Cargando...' : '✏️ Cargar para editar'}
            </button>
            <button
              className="btn btn-sm btn-secondary"
              style={{flexShrink:0}}
              onClick={()=>{ setViendoHist(ultimoGuardado); }}
            >Ver detalle</button>
          </div>
        )}

        {/* ── Banner plantilla disponible ── */}
        {plantillaActual && (
          <div style={{
            background:'linear-gradient(90deg,#311b92,#5e35b1)',
            color:'#fff', padding:'8px 20px',
            display:'flex', alignItems:'center', gap:'12px', flexWrap:'wrap',
            fontSize:'12px',
          }}>
            <span style={{fontSize:'16px'}}>📌</span>
            <span>
              <strong>Plantilla base para {estadioNombre}</strong>
              {' '}·{' '}<span style={{opacity:.8}}>{(plantillaActual.qths||[]).length} QTHs · {(plantillaActual.qths||[]).reduce((s,q)=>s+(q.celdas||0),0)} celdas{(plantillaActual.motos||[]).length>0&&` · ${plantillaActual.motos.length} motos`}</span>
              {' '}·{' '}<span style={{opacity:.6}}>Guardada: {fmtTs(plantillaActual.guardadoEn)}</span>
            </span>
            <button
              className="btn btn-sm"
              style={{background:'#7c4dff',color:'#fff',border:'none',marginLeft:'auto',flexShrink:0}}
              onClick={handleCargarPlantilla}
              disabled={cargando}
            >
              {cargando ? '⏳ Cargando...' : '📥 Cargar plantilla'}
            </button>
            <button
              className="btn btn-sm"
              style={{background:'rgba(255,255,255,.15)',color:'#fff',border:'1px solid rgba(255,255,255,.3)',flexShrink:0}}
              onClick={handleEliminarPlantilla}
            >🗑</button>
          </div>
        )}

        <div style={{maxWidth:'1100px',margin:'0 auto',padding:'14px'}}>
          <FormQTH jefes={jefes} editData={editingQTH} onCancelEdit={()=>setEditingQTH(null)} toast={toast}/>
          <ListaQTHs qths={qths} jefes={jefes} toast={toast} onEdit={q=>setEditingQTH(q)} evento={evento}
            motos={motos} infanteria={infanteria} refuerzo={refuerzo} tercerAnillo={tercerAnillo}/>

          <PanelSeccion
            items={infanteria} jefes={jefes} toast={toast}
            collectionName="infanteria"
            title="CORTES CON INFANTERÍA"
            icon="🚧"
            accentColor="#c62828"
            darkColor="#b71c1c"
            lightBg="#fff5f5"
            lightBorder="#ffcdd2"
            itemLabel="corte"
            addLabel="Agregar corte"
            isRiver={ESTADIOS_RIVER.has(evento.estadio)}
          />

          <PanelMotorizada motos={motos} toast={toast}/>

          {/* 3ER ANILLO — solo para estadios con anillo */}
          {mostrarTercerAnillo && (
            <PanelSeccion
              items={tercerAnillo} jefes={jefes} toast={toast}
              collectionName="tercerAnillo"
              title="3ER ANILLO"
              icon="🔵"
              accentColor="#283593"
              darkColor="#1a237e"
              lightBg="#e8eaf6"
              lightBorder="#c5cae9"
              itemLabel="puesto"
              addLabel="Agregar puesto de 3er Anillo"
            />
          )}
        </div>
      </>}

      {tab==='campo'&&(
        <CampoTab usuario={usuario} rol={rol} toast={toast} jefesQth={jefes}/>
      )}

      {tab==='jefes'&&rol!=='operador'&&(
        <div style={{maxWidth:'760px',margin:'0 auto',padding:'16px 14px'}}>
          <PanelJefes jefes={jefes} toast={toast}/>
        </div>
      )}

      {tab==='admin'&&rol==='admin'&&(
        <AdminTab usuario={usuario} toast={toast}/>
      )}

      {tab==='historial'&&rol!=='operador'&&(
        <HistorialTab
          historial={historial}
          estadioNombre={estadioNombre}
          onCargar={handleCargarParaEditar}
          onVer={setViendoHist}
          onEliminar={handleEliminarHistorial}
          onDuplicar={handleDuplicar}
          onExportWord={handleExportFromHist}
        />
      )}
      </div>

      <div className="toast-container">{toasts.map(t=><div key={t.id} className={`toast ${t.type}`}>{t.msg}{t.action&&<span className="toast-action" onClick={()=>{t.action.onClick();dismissToast(t.id);}}>{t.action.label}</span>}</div>)}</div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
