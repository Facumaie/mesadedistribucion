function HistorialTab({ historial, estadioNombre, onCargar, onVer, onEliminar, onDuplicar, onExportWord }) {
  const [filtroEstadio, setFiltroEstadio] = React.useState(estadioNombre || '');

  const estadiosUnicos = [...new Set(historial.map(h => h.estadio).filter(Boolean))].sort();
  const histFiltrado   = filtroEstadio ? historial.filter(h => h.estadio === filtroEstadio) : historial;

  // Agrupar por estadio (equipo local) para ordenar la tabla
  const [gruposAbiertos, setGruposAbiertos] = React.useState({});
  const grupos = [];
  histFiltrado.forEach(h => {
    const key = h.estadio || 'SIN ESTADIO';
    let g = grupos.find(x => x.estadio === key);
    if (!g) { g = { estadio: key, items: [] }; grupos.push(g); }
    g.items.push(h);
  });

  return (
    <div style={{padding:'14px', maxWidth:'1400px', margin:'0 auto'}}>
      <div className="main-layout" style={{gridTemplateColumns:'380px 1fr',alignItems:'start'}}>
        <PanelHistorial
          historial={historial}
          estadioActual={estadioNombre || ''}
          onCargar={onCargar}
          onVer={onVer}
          onEliminar={onEliminar}
          onDuplicar={onDuplicar}
          onExportWord={onExportWord}
        />
        <div className="card">
          <div className="card-header ch-amber" style={{display:'flex',gap:'10px',alignItems:'center',flexWrap:'wrap'}}>
            <span>📊 TABLA DE HISTORIAL</span>
            {estadiosUnicos.length > 1 && (
              <select
                value={filtroEstadio}
                onChange={e => setFiltroEstadio(e.target.value)}
                style={{fontSize:'11px',padding:'2px 8px',borderRadius:'4px',border:'1px solid #ccc',marginLeft:'auto'}}
              >
                <option value="">Todos los estadios</option>
                {estadiosUnicos.map(e => <option key={e} value={e}>{e}</option>)}
              </select>
            )}
          </div>
          <div className="card-body" style={{padding:0}}>
            {histFiltrado.length === 0
              ? <div className="empty-state" style={{padding:'40px'}}>
                  <div style={{fontSize:'40px'}}>📁</div>
                  <div style={{marginTop:'10px'}}>
                    No hay distribuciones guardadas{filtroEstadio ? ` para ${filtroEstadio}` : ''}.
                  </div>
                  <div style={{marginTop:'4px',fontSize:'11px'}}>
                    Configurá los QTHs y presioná "Guardar en historial".
                  </div>
                </div>
              : <div style={{overflowX:'auto',maxHeight:'calc(100vh - 200px)',overflowY:'auto'}} className="hist-scroll">
                  <table className="tbl tbl-sticky">
                    <thead><tr>
                      <th>EVENTO</th><th>ESTADIO</th><th>FECHA EVENTO</th>
                      <th style={{textAlign:'center'}}>QTHs</th>
                      <th style={{textAlign:'center'}}>CELDAS</th>
                      <th style={{textAlign:'center'}}>EXTRAS</th>
                      <th>GUARDADO</th><th>GUARDADO POR</th><th style={{width:'130px'}}></th>
                    </tr></thead>
                    <tbody>
                      {grupos.map(g => {
                        const abierto = grupos.length === 1 || !!gruposAbiertos[g.estadio];
                        const celdasGrupo = g.items.reduce((s,h) => s + (h.qths||[]).reduce((s2,q) => s2+(q.celdas||0), 0), 0);
                        return (
                        <React.Fragment key={g.estadio}>
                          <tr onClick={() => setGruposAbiertos(s => ({...s, [g.estadio]: !abierto}))}
                            style={{cursor:'pointer',background:'linear-gradient(90deg,#12336a,#1a3a6b)',userSelect:'none'}}>
                            <td colSpan={9} style={{color:'#fff',fontWeight:'800',padding:'9px 12px',fontSize:'12px',letterSpacing:'.3px'}}>
                              {abierto ? '▾' : '▸'} 🏟 {g.estadio}
                              <span style={{opacity:.75,fontWeight:'600',marginLeft:'8px'}}>
                                {g.items.length} evento{g.items.length > 1 ? 's' : ''} · último: {fmtFecha(g.items[0].fechaEvento)}
                              </span>
                              <span style={{float:'right',opacity:.7,fontWeight:'600',fontSize:'11px'}}>{celdasGrupo} celdas acum.</span>
                            </td>
                          </tr>
                          {abierto && g.items.map((h,idx) => {
                        const extras = [];
                        if ((h.motos||[]).length) extras.push(`🏍${h.motos.length}`);
                        if ((h.tercerAnillo||[]).length) extras.push(`🔵${h.tercerAnillo.length}`);
                        if ((h.infanteria||[]).length) extras.push(`🚧${h.infanteria.length}`);
                        if ((h.refuerzo||[]).length) extras.push(`🟢${h.refuerzo.length}`);
                        return (
                        <tr key={h.id} style={{cursor:'pointer',background:idx%2===0?'#fff':'#fafbfd'}} onClick={() => onCargar(h)} title="Cargar para editar">
                          <td>
                            <span style={{background:'#e8edf5',color:'#1a3a6b',borderRadius:'10px',padding:'2px 8px',fontSize:'11px',fontWeight:'700'}}>
                              {h.localidad || '—'}
                            </span>
                          </td>
                          <td style={{fontWeight:'700'}}>
                            {h.estadio}
                          </td>
                          <td>{fmtFecha(h.fechaEvento)}</td>
                          <td style={{textAlign:'center',fontWeight:'600'}}>{(h.qths||[]).length}</td>
                          <td style={{textAlign:'center'}}><span className="badge badge-orange">{(h.qths||[]).reduce((s,q) => s+(q.celdas||0), 0)}</span></td>

                          <td style={{fontSize:'11px',color:'#667',whiteSpace:'nowrap'}}>{fmtTs(h.guardadoEn)}</td>
                          <td style={{fontSize:'11px',color:'#1a3a6b',fontWeight:'600'}}>
                            {h.guardadoPor ? `${h.guardadoPor.jerarquia} ${h.guardadoPor.nombre}` : '—'}
                          </td>
                          <td style={{whiteSpace:'nowrap'}}>
                            <button className="btn btn-sm btn-secondary" style={{marginRight:'3px'}}
                              onClick={e => { e.stopPropagation(); onVer(h); }} title="Ver detalle">👁</button>
                            <button className="btn btn-sm" style={{background:'#e8f5e9',color:'#2e7d32',border:'1px solid #c8e6c9',marginRight:'3px'}}
                              onClick={e => { e.stopPropagation(); onDuplicar(h); }} title="Duplicar como nueva">📋</button>
                            <button className="btn btn-sm" style={{background:'#e3f2fd',color:'#1565c0',border:'1px solid #bbdefb',marginRight:'3px'}}
                              onClick={e => { e.stopPropagation(); onExportWord(h); }} title="Exportar Word">⬇</button>
                            <button className="btn btn-danger btn-sm"
                              onClick={e => { e.stopPropagation(); onEliminar(h.id); }} title="Eliminar">✕</button>
                          </td>

                        );
                      })}
                    </tbody>
                  </table>
                </div>
            }
          </div>
        </div>
      </div>
    </div>
  );
}

function AsignarModal({ puesto, slot, nomina, asignaciones, lpEnOtros = {}, onConfirmar, onClose, cadena, setCadena, toast }) {
  const [lp, setLp] = useState('');
  const [match, setMatch] = useState(null);
  const [resultados, setResultados] = useState([]);
  const [manual, setManual] = useState(false);
  const [mData, setMData] = useState({ grado:'', apellido:'', nombre:'', tel:'' });
  const [guardando, setGuardando] = useState(false);
  const [modoTexto, setModoTexto] = useState(false); // false = teclado numérico (LP), true = letras (apellido)
  const [telExtra, setTelExtra] = useState('');
  useEffect(() => { setTelExtra(''); }, [match ? match.lp : null]);
  const inpRef = useRef(null);

  const alternarTeclado = () => {
    setModoTexto(m => {
      const nuevo = !m;
      if (!nuevo) buscar(lp.replace(/\D/g, '')); // al volver a numérico, limpiar letras
      return nuevo;
    });
    // blur + focus para que Android cambie el teclado
    setTimeout(() => { if (inpRef.current) { inpRef.current.blur(); inpRef.current.focus(); } }, 40);
  };

  // Al avanzar en cadena a otra celda, el modal se resetea y vuelve a enfocar
  useEffect(() => {
    setLp(''); setMatch(null); setResultados([]); setManual(false);
    setMData({ grado:'', apellido:'', nombre:'', tel:'' }); setGuardando(false); setTelExtra('');
    setTimeout(() => inpRef.current && inpRef.current.focus(), 60);
  }, [puesto.pid, slot]);

  const listaNomina = React.useMemo(() => Array.from(nomina.values()), [nomina]);
  const normTxt = (s) => (s||'').toUpperCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'');

  const buscar = (v) => {
    setLp(v);
    const digits = v.replace(/\D/g, '');
    if (digits && digits === v.trim()) {
      setResultados([]);
      setMatch(digits ? (nomina.get(digits) || null) : null);
      return;
    }
    setMatch(null);
    const q = normTxt(v.trim());
    if (q.length < 3) { setResultados([]); return; }
    const empieza = [], contiene = [];
    for (const ef of listaNomina) {
      const ape = normTxt(ef.apellido);
      if (ape.startsWith(q)) { empieza.push(ef); if (empieza.length >= 15) break; }
      else if (contiene.length < 15 && (ape.includes(q) || normTxt(ef.apellido + ' ' + ef.nombre).includes(q))) contiene.push(ef);
    }
    setResultados([...empieza, ...contiene].slice(0, 15));
  };

  const elegir = (ef) => { setMatch(ef); setResultados([]); setLp(ef.apellido); };

  const lpSel = match ? match.lp : (/^\d+$/.test(lp.trim()) ? lp.trim() : '');
  const yaAsignado = lpSel ? asignaciones.find(a => a.lp === lpSel) : null;
  const enOtro = lpSel ? (lpEnOtros[lpSel] || null) : null;

  const confirmar = async () => {
    let ef;
    if (manual) {
      if (!mData.apellido.trim()) { toast('Ingresá al menos el apellido.', 'error'); return; }
      ef = { lp: lp.replace(/\D/g,'') || '', grado: mData.grado.trim(), apellido: mData.apellido.trim().toUpperCase(), nombre: mData.nombre.trim().toUpperCase(), tel: mData.tel.trim(), enNomina: false };
    } else {
      if (!match) { toast('Buscá por legajo o apellido y seleccioná un efectivo, o usá "Carga manual".', 'error'); return; }
      ef = { lp: match.lp, grado: match.grado, apellido: match.apellido, nombre: match.nombre, tel: match.tel || telExtra.trim(), enNomina: true };
    }
    if (yaAsignado && !confirm(`⚠️ El LP ${lpSel} ya está cargado en "${yaAsignado._puestoNombre || 'otro puesto'}".\n\n¿Cargarlo igual acá?`)) return;
    if (enOtro && !confirm(`🚨 DOBLE AFECTACIÓN: el LP ${lpSel} ya está afectado HOY en ${enOtro.estadio}${enOtro.puesto ? ' (' + enOtro.puesto + ')' : ''}.\n\n¿Cargarlo igual acá?`)) return;
    setGuardando(true);
    await onConfirmar(ef); // el padre guarda/encola, avisa y decide el auto-avance
  };

  return (
    <div className="campo-modal-bg" onClick={e => { if (e.target === e.currentTarget) onClose(); }}>
      <div className="campo-modal">
        <div className="campo-modal-head">
          <div style={{fontSize:'11px',opacity:.8}}>{puesto.seccion} · Celda {slot + 1} de {puesto.celdas}</div>
          <div style={{fontWeight:'800',fontSize:'15px'}}>{puesto.nombre}</div>
        </div>
        <div style={{padding:'16px'}}>
          {!manual ? (<>
            <label className="campo-label">{modoTexto ? 'APELLIDO' : 'LEGAJO (LP)'}</label>
            <div style={{display:'flex',gap:'8px',alignItems:'stretch'}}>
              <input ref={inpRef} type="text" autoComplete="off"
                inputMode={modoTexto ? 'text' : 'numeric'}
                pattern={modoTexto ? undefined : '[0-9]*'}
                autoCapitalize={modoTexto ? 'characters' : 'off'}
                placeholder={modoTexto ? 'Ej: GONZÁLEZ' : 'Ej: 21458'}
                value={lp}
                onChange={e => buscar(modoTexto ? e.target.value : e.target.value.replace(/\D/g, ''))}
                onKeyDown={e => e.key === 'Enter' && (resultados.length === 1 ? elegir(resultados[0]) : confirmar())}
                className="campo-input-lp"
                style={modoTexto ? {fontSize:'17px',letterSpacing:'1px',flex:1,minWidth:0} : {flex:1,minWidth:0}}/>
              <button onClick={alternarTeclado} title={modoTexto ? 'Teclado numérico (LP)' : 'Teclado de letras (apellido)'}
                style={{flexShrink:0,width:'58px',border:'1.5px solid #b9c6dd',borderRadius:'10px',
                  background:'#eef4ff',color:'#12336a',fontWeight:'800',fontSize:'13px',cursor:'pointer'}}>
                {modoTexto ? '123' : 'ABC'}
              </button>
            </div>
            {!modoTexto && <div style={{fontSize:'10.5px',color:'#8a99b5',marginTop:'5px'}}>Tocá <b>ABC</b> para buscar por apellido.</div>}
            {resultados.length > 0 && !match && (
              <div style={{marginTop:'8px',border:'1px solid #ccd3e0',borderRadius:'10px',overflow:'hidden',maxHeight:'240px',overflowY:'auto'}}>
                {resultados.map(ef => (
                  <button key={ef.lp} onClick={() => elegir(ef)}
                    style={{display:'block',width:'100%',textAlign:'left',background:'#fff',border:'none',
                      borderBottom:'1px solid #eef1f6',padding:'10px 12px',cursor:'pointer'}}>
                    <span style={{fontWeight:'800',color:'#1a3a6b',fontSize:'14px'}}>{ef.apellido}, {ef.nombre}</span>
                    <div style={{fontSize:'11px',color:'#777'}}>{ef.grado} · LP {ef.lp}{ef.tel ? ' · ' + ef.tel : ''}</div>
                  </button>
                ))}
              </div>
            )}
            {lp.trim().length >= 3 && !match && resultados.length === 0 && (
              <div style={{marginTop:'10px',fontSize:'12px',color:'#b26a00',background:'#fff8e1',padding:'8px 10px',borderRadius:'8px'}}>
                Sin coincidencia en la nómina para <b>{lp}</b>.
              </div>
            )}
            {match && (
              <div style={{marginTop:'10px',background:'#e8f5e9',border:'1px solid #a5d6a7',borderRadius:'10px',padding:'10px 12px'}}>
                <div style={{fontWeight:'800',fontSize:'15px',color:'#1b5e20'}}>{match.apellido}, {match.nombre}</div>
                <div style={{fontSize:'12px',color:'#2e7d32',marginTop:'2px'}}>{match.grado} · LP {match.lp}{match.tel ? ' · Tel ' + match.tel : ''}</div>
              </div>
            )}
            {match && !match.tel && (
              <>
                <label className="campo-label" style={{marginTop:'10px'}}>TELÉFONO — no figura en nómina (opcional)</label>
                <input type="text" inputMode="tel" placeholder="Ej: 1112345678" value={telExtra}
                  onChange={e => setTelExtra(e.target.value)} className="campo-input" style={{marginTop:0}}/>
              </>
            )}
            {yaAsignado && (
              <div style={{marginTop:'8px',fontSize:'12px',color:'#c62828',background:'#ffebee',padding:'8px 10px',borderRadius:'8px'}}>
                ⚠️ Ya cargado en: <b>{yaAsignado._puestoNombre || 'otro puesto'}</b>
              </div>
            )}
            {enOtro && (
              <div style={{marginTop:'8px',fontSize:'12px',color:'#fff',background:'#c62828',padding:'8px 10px',borderRadius:'8px',fontWeight:'700'}}>
                🚨 DOBLE AFECTACIÓN: hoy ya figura en <b>{enOtro.estadio}</b>{enOtro.puesto ? ' — ' + enOtro.puesto : ''}
              </div>
            )}
          </>) : (<>
            <label className="campo-label">CARGA MANUAL (fuera de nómina)</label>
            <input type="text" inputMode="numeric" placeholder="LP (opcional)" value={lp} onChange={e => setLp(e.target.value.replace(/\D/g,''))} className="campo-input"/>
            <input type="text" placeholder="Grado" value={mData.grado} onChange={e => setMData(d => ({...d, grado: e.target.value}))} className="campo-input"/>
            <input type="text" placeholder="Apellido *" value={mData.apellido} onChange={e => setMData(d => ({...d, apellido: e.target.value}))} className="campo-input"/>
            <input type="text" placeholder="Nombre" value={mData.nombre} onChange={e => setMData(d => ({...d, nombre: e.target.value}))} className="campo-input"/>
            <input type="text" inputMode="tel" placeholder="Teléfono" value={mData.tel} onChange={e => setMData(d => ({...d, tel: e.target.value}))} className="campo-input"/>
          </>)}
          <button className="campo-btn-main" disabled={guardando || (!manual && !match)} onClick={confirmar}>
            {guardando ? '⏳ Guardando...' : '✓ CONFIRMAR CARGA'}
          </button>
          <label style={{display:'flex',alignItems:'center',gap:'8px',marginTop:'12px',fontSize:'13px',color:'#333',cursor:'pointer',userSelect:'none'}}>
            <input type="checkbox" checked={cadena} onChange={e => setCadena(e.target.checked)} style={{width:'18px',height:'18px'}}/>
            ⛓️ Carga en cadena (saltar a la próxima celda libre)
          </label>
          <button className="campo-btn-ghost" onClick={() => { setManual(m => !m); setMatch(null); setResultados([]); setLp(''); }}>
            {manual ? '← Volver a búsqueda por legajo' : '✏️ Carga manual (no está en nómina)'}
          </button>
          <button className="campo-btn-ghost" onClick={onClose}>Cancelar</button>
        </div>
      </div>
    </div>
  );
}

function DetalleAsigModal({ asig, puesto, operativoId, usuario, rol, onClose, onQuitarPendiente, toast }) {
  const esPendiente = !!asig._pendiente;
  const [editTel, setEditTel] = useState(false);
  const [telNuevo, setTelNuevo] = useState(asig.tel || '');
  const guardarTel = async () => {
    try {
      const { db, collections } = window.firebaseUtils;
      await db.collection(collections.operativos).doc(operativoId)
        .collection('asignaciones').doc(asig.pid + '_s' + asig.slot).update({ tel: telNuevo.trim() });
      toast('✓ Teléfono actualizado', 'success');
      onClose();
    } catch (err) { toast('Error: ' + err.message, 'error'); }
  };
  const puedeQuitar = esPendiente || rol === 'admin' || rol === 'planificador' ||
    (asig.cargadoPor && String(asig.cargadoPor.legajo) === String(usuario.legajo));
  const quitar = async () => {
    if (esPendiente) {
      if (!confirm(`¿Quitar a ${asig.apellido} de la cola de sincronización?`)) return;
      onQuitarPendiente(asig.pid, asig.slot);
      toast('Carga pendiente descartada', 'success');
      onClose();
      return;
    }
    if (!confirm(`¿Quitar a ${asig.apellido} de ${puesto.nombre}?`)) return;
    try {
      const { db, collections } = window.firebaseUtils;
      await db.collection(collections.operativos).doc(operativoId)
        .collection('asignaciones').doc(asig.pid + '_s' + asig.slot).delete();
      logOperativo(operativoId, 'quitar', `${asig.apellido} (LP ${asig.lp || '—'}) de ${puesto.nombre}`, usuario);
      toast('✓ Asignación quitada', 'success');
      onClose();
    } catch (err) { toast('Error: ' + err.message, 'error'); }
  };
  return (
    <div className="campo-modal-bg" onClick={e => { if (e.target === e.currentTarget) onClose(); }}>
      <div className="campo-modal">
        <div className="campo-modal-head">
          <div style={{fontSize:'11px',opacity:.8}}>{puesto.seccion} · Celda {asig.slot + 1}</div>
          <div style={{fontWeight:'800',fontSize:'15px'}}>{puesto.nombre}</div>
        </div>
        <div style={{padding:'16px'}}>
          <div style={{fontWeight:'800',fontSize:'17px',color:'#1a3a6b'}}>{asig.apellido}{asig.nombre ? ', ' + asig.nombre : ''}</div>
          <div style={{fontSize:'13px',color:'#555',marginTop:'4px'}}>
            {[asig.grado, asig.lp ? 'LP ' + asig.lp : null, asig.tel ? 'Tel ' + asig.tel : null].filter(Boolean).join(' · ')}
            {asig.enNomina === false && <span style={{color:'#b26a00'}}> · fuera de nómina</span>}
          </div>
          {esPendiente && (
            <div style={{marginTop:'10px',fontSize:'12px',color:'#8a6d00',background:'#fff8e1',padding:'8px 10px',borderRadius:'8px'}}>
              🕐 <b>Pendiente de sincronizar</b> — se guardó en este teléfono y se sube solo cuando vuelva la señal.
            </div>
          )}
          {asig.cargadoPor && (
            <div style={{marginTop:'10px',fontSize:'11px',color:'#777',background:'#f4f6fa',padding:'8px 10px',borderRadius:'8px'}}>
              Cargado por <b>{asig.cargadoPor.nombre}</b> (LP {asig.cargadoPor.legajo})
              {asig.cargadoEn && ' · ' + new Date(asig.cargadoEn).toLocaleString('es-AR', {day:'2-digit',month:'2-digit',hour:'2-digit',minute:'2-digit'})}
            </div>
          )}
          {!esPendiente && (editTel ? (
            <div style={{display:'flex',gap:'8px',marginTop:'10px'}}>
              <input type="text" inputMode="tel" placeholder="Ej: 1112345678" value={telNuevo}
                onChange={e => setTelNuevo(e.target.value)} className="campo-input" style={{marginTop:0,flex:1}}
                onKeyDown={e => e.key === 'Enter' && guardarTel()} autoFocus/>
              <button className="campo-btn-sm" style={{minHeight:'40px'}} onClick={guardarTel}>✓</button>
            </div>
          ) : (
            <button className="campo-btn-ghost" style={{marginTop:'10px'}} onClick={() => setEditTel(true)}>
              📞 {asig.tel ? 'Editar teléfono' : 'Agregar teléfono'}
            </button>
          ))}
          {asig.avisado && (
            <div style={{marginTop:'8px',fontSize:'11px',color:'#1b5e20',background:'#e8f5e9',padding:'8px 10px',borderRadius:'8px'}}>
              📢 QTH y función avisados por <b>{asig.avisado.nombre}</b>
              {asig.avisado.ts && ' · ' + new Date(asig.avisado.ts).toLocaleString('es-AR', {day:'2-digit',month:'2-digit',hour:'2-digit',minute:'2-digit'})}
            </div>
          )}
          {puedeQuitar && <button className="campo-btn-danger" onClick={quitar}>🗑 Quitar asignación</button>}
          <button className="campo-btn-ghost" onClick={onClose}>Cerrar</button>
        </div>
      </div>
    </div>
  );
}

function EditarJefeModal({ puesto, nomina, jefesQth = [], onGuardar, onClose, toast }) {
  const [datos, setDatos] = useState({
    nombre: puesto.nombre || '', descripcion: puesto.descripcion || '',
    jefeRango: puesto.jefeRango || '', jefeNombre: puesto.jefeNombre || '', jefeTel: puesto.jefeTel || '',
    tipo: puesto.tipo || '',
  });
  const [lpBusca, setLpBusca] = useState('');
  const [resJefe, setResJefe] = useState({ qth: [], nom: [] });
  const [modoTextoJ, setModoTextoJ] = useState(false);
  const [guardando, setGuardando] = useState(false);
  const inpRef = useRef(null);
  useEffect(() => { setTimeout(() => inpRef.current && inpRef.current.focus(), 60); }, []);

  const listaNomina = React.useMemo(() => Array.from(nomina.values()), [nomina]);
  const normJ = (s) => (s || '').toUpperCase().normalize('NFD').replace(/[\u0300-\u036f]/g, '');
  const [avisoRango, setAvisoRango] = useState('');

  // Jerarquías habilitadas para Jefe de Sector: de Comisario a Oficial Mayor
  const RANGO_JEFE_MAX = ORDEN_JERARQUIAS.indexOf('OFICIAL MAYOR');
  const esAptoJefe = (grado) => rankJerarquia(grado) <= RANGO_JEFE_MAX;

  // ¿Este efectivo figura en el padrón de Jefes de QTH? (ahí están los teléfonos vigentes)
  const buscarEnPadron = (apellido, nombre) => {
    const objetivo = normJ(apellido + ', ' + nombre);
    const objetivo2 = normJ(apellido + ' ' + nombre);
    return jefesQth.find(j => {
      const je = normJ(j.efectivo || '');
      return je === objetivo || je === objetivo2 ||
        (je.includes(normJ(apellido)) && nombre && je.includes(normJ(String(nombre).split(' ')[0])));
    }) || null;
  };

  const aplicarJefe = (ef) => {
    // Si está en Jefes de QTH, el teléfono (vigente) viene de ahí
    const enPadron = buscarEnPadron(ef.apellido, ef.nombre);
    setDatos(d => ({ ...d,
      jefeRango: ef.grado || '',
      jefeNombre: ef.apellido + (ef.nombre ? ', ' + ef.nombre : ''),
      jefeTel: (enPadron && enPadron.telefono) || ef.tel || '' }));
    setResJefe({ qth: [], nom: [] });
    setLpBusca(ef.apellido);
    if (enPadron && enPadron.telefono && enPadron.telefono !== ef.tel)
      toast('Teléfono actualizado desde Jefes de QTH', 'info');
  };

  const aplicarDePadron = (j) => {
    setDatos(d => ({ ...d, jefeRango: j.jerarquia || '', jefeNombre: j.efectivo || '', jefeTel: j.telefono || '' }));
    setResJefe({ qth: [], nom: [] });
    setLpBusca(j.efectivo || '');
  };

  const buscarLp = (v) => {
    setLpBusca(v);
    setAvisoRango('');
    const digits = v.replace(/\D/g, '');
    if (digits && digits === v.trim()) {
      setResJefe({ qth: [], nom: [] });
      const ef = digits ? nomina.get(digits) : null;
      if (ef) {
        if (!esAptoJefe(ef.grado)) { setAvisoRango(`${ef.apellido} es ${ef.grado || 'jerarquía desconocida'} — no habilitada para Jefe de Sector.`); return; }
        aplicarJefe(ef);
      }
      return;
    }
    const q = normJ(v.trim());
    if (q.length < 3) { setResJefe({ qth: [], nom: [] }); return; }
    // Fuente 1: padrón de Jefes de QTH (teléfonos vigentes)
    const deQth = jefesQth.filter(j => normJ(j.efectivo || '').includes(q)).slice(0, 8);
    // Fuente 2: nómina general, solo jerarquías habilitadas
    const empieza = [], contiene = [];
    for (const ef of listaNomina) {
      if (!esAptoJefe(ef.grado)) continue;
      const ape = normJ(ef.apellido);
      if (ape.startsWith(q)) { empieza.push(ef); if (empieza.length >= 8) break; }
      else if (contiene.length < 8 && (ape.includes(q) || normJ(ef.apellido + ' ' + ef.nombre).includes(q))) contiene.push(ef);
    }
    setResJefe({ qth: deQth, nom: [...empieza, ...contiene].slice(0, 8) });
  };

  const alternarTecladoJ = () => {
    setModoTextoJ(m => !m);
    setTimeout(() => { if (inpRef.current) { inpRef.current.blur(); inpRef.current.focus(); } }, 40);
  };

  const guardar = async () => {
    if (!datos.nombre.trim()) { toast('El nombre del puesto/QTH no puede quedar vacío.', 'error'); return; }
    setGuardando(true);
    await onGuardar({
      nombre: datos.nombre.trim(), descripcion: datos.descripcion.trim(),
      jefeRango: datos.jefeRango.trim(), jefeNombre: datos.jefeNombre.trim(), jefeTel: datos.jefeTel.trim(),
      tipo: datos.tipo || '',
    });
    setGuardando(false);
  };

  return (
    <div className="campo-modal-bg" onClick={e => { if (e.target === e.currentTarget) onClose(); }}>
      <div className="campo-modal">
        <div className="campo-modal-head">
          <div style={{fontSize:'11px',opacity:.8}}>{puesto.seccion}</div>
          <div style={{fontWeight:'800',fontSize:'15px'}}>✏️ Editar puesto — {puesto.nombre}</div>
        </div>
        <div style={{padding:'16px'}}>
          <label className="campo-label">NOMBRE / QTH *</label>
          <input type="text" value={datos.nombre} placeholder="Ej: Av. Monroe y Húsares"
            onChange={e => setDatos(d => ({...d, nombre: e.target.value}))} className="campo-input" style={{marginTop:0}}/>
          <input type="text" value={datos.descripcion} placeholder="Descripción (opcional)"
            onChange={e => setDatos(d => ({...d, descripcion: e.target.value}))} className="campo-input"/>
          <label className="campo-label" style={{marginTop:'12px'}}>TIPO DE PUESTO</label>
          <select value={datos.tipo} onChange={e => setDatos(d => ({...d, tipo: e.target.value}))}
            className="campo-input" style={{marginTop:0,marginBottom:'14px'}}>
            <option value="">— Sin tipo —</option>
            {TIPOS_DISPONIBLES.map(t => <option key={t} value={t}>{t}</option>)}
          </select>
          <label className="campo-label">JEFE DE SECTOR — BUSCAR POR {modoTextoJ ? 'APELLIDO' : 'LEGAJO'} (opcional)</label>
          <div style={{display:'flex',gap:'8px',alignItems:'stretch'}}>
            <input ref={inpRef} type="text" autoComplete="off"
              inputMode={modoTextoJ ? 'text' : 'numeric'}
              autoCapitalize={modoTextoJ ? 'characters' : 'off'}
              placeholder={modoTextoJ ? 'Ej: GONZÁLEZ' : 'Ej: 21458'}
              value={lpBusca}
              onChange={e => buscarLp(modoTextoJ ? e.target.value : e.target.value.replace(/\D/g, ''))}
              className="campo-input" style={{marginTop:0,flex:1,minWidth:0}}/>
            <button onClick={alternarTecladoJ} title={modoTextoJ ? 'Teclado numérico (LP)' : 'Teclado de letras (apellido)'}
              style={{flexShrink:0,width:'52px',border:'1.5px solid #b9c6dd',borderRadius:'10px',
                background:'#eef4ff',color:'#12336a',fontWeight:'800',fontSize:'12px',cursor:'pointer'}}>
              {modoTextoJ ? '123' : 'ABC'}
            </button>
          </div>
          <div style={{fontSize:'10px',color:'#8a99b5',marginTop:'4px'}}>Solo jerarquías de Comisario a Oficial Mayor.</div>
          {avisoRango && (
            <div style={{marginTop:'6px',fontSize:'12px',color:'#b26a00',background:'#fff8e1',padding:'8px 10px',borderRadius:'8px'}}>
              ⚠️ {avisoRango}
            </div>
          )}
          {(resJefe.qth.length > 0 || resJefe.nom.length > 0) && (
            <div style={{marginTop:'6px',border:'1px solid #ccd3e0',borderRadius:'10px',overflow:'hidden',maxHeight:'230px',overflowY:'auto'}}>
              {resJefe.qth.length > 0 && (
                <div style={{background:'#12336a',color:'#ffd54f',fontSize:'9.5px',fontWeight:'800',letterSpacing:'.5px',padding:'4px 12px'}}>
                  ⭐ JEFES DE QTH — teléfonos vigentes
                </div>
              )}
              {resJefe.qth.map((j, i) => (
                <button key={'q' + i} onClick={() => aplicarDePadron(j)}
                  style={{display:'block',width:'100%',textAlign:'left',background:'#fbf7ea',border:'none',
                    borderBottom:'1px solid #efe8d2',padding:'9px 12px',cursor:'pointer'}}>
                  <span style={{fontWeight:'800',color:'#1a3a6b',fontSize:'13px'}}>{j.efectivo}</span>
                  <div style={{fontSize:'10.5px',color:'#777'}}>{j.jerarquia || '—'}{j.telefono ? ' · ' + j.telefono : ''}</div>
                </button>
              ))}
              {resJefe.nom.length > 0 && (
                <div style={{background:'#586c8f',color:'#e8eefb',fontSize:'9.5px',fontWeight:'800',letterSpacing:'.5px',padding:'4px 12px'}}>
                  NÓMINA GENERAL
                </div>
              )}
              {resJefe.nom.map(ef => (
                <button key={ef.lp} onClick={() => aplicarJefe(ef)}
                  style={{display:'block',width:'100%',textAlign:'left',background:'#fff',border:'none',
                    borderBottom:'1px solid #eef1f6',padding:'9px 12px',cursor:'pointer'}}>
                  <span style={{fontWeight:'800',color:'#1a3a6b',fontSize:'13px'}}>{ef.apellido}, {ef.nombre}</span>
                  <div style={{fontSize:'10.5px',color:'#777'}}>{ef.grado} · LP {ef.lp}{ef.tel ? ' · ' + ef.tel : ''}</div>
                </button>
              ))}
            </div>
          )}
          <label className="campo-label" style={{marginTop:'12px'}}>JERARQUÍA</label>
          <input type="text" value={datos.jefeRango} onChange={e => setDatos(d => ({...d, jefeRango: e.target.value}))} className="campo-input" style={{marginTop:0}}/>
          <label className="campo-label" style={{marginTop:'12px'}}>APELLIDO Y NOMBRE</label>
          <input type="text" value={datos.jefeNombre} onChange={e => setDatos(d => ({...d, jefeNombre: e.target.value}))} className="campo-input" style={{marginTop:0}}/>
          <label className="campo-label" style={{marginTop:'12px'}}>TELÉFONO</label>
          <input type="text" inputMode="tel" value={datos.jefeTel} onChange={e => setDatos(d => ({...d, jefeTel: e.target.value}))} className="campo-input" style={{marginTop:0}}/>
          <button className="campo-btn-main" disabled={guardando} onClick={guardar}>
            {guardando ? '⏳ Guardando...' : '✓ GUARDAR PUESTO'}
          </button>
