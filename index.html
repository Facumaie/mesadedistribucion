      <div className="card" style={{marginTop:'16px'}}>
        <div className="card-header"><span>📡 OPERATIVOS PUBLICADOS</span>
          <span className="counter-pill">{operativos.length}</span>
        </div>
        <div className="card-body">
          {operativos.length === 0 && <div className="empty-state">Sin operativos. Publicá uno desde "Distribución Previa".</div>}
          {operativos.map(o => (
            <div key={o.id} style={{display:'flex',alignItems:'center',gap:'10px',padding:'8px 4px',borderBottom:'1px solid #eef1f6',flexWrap:'wrap'}}>
              <div style={{flex:1,minWidth:'200px'}}>
                <b style={{color:'#1a3a6b'}}>{o.estadio}</b> · {o.partido || '—'} · {fmtFecha(o.fecha)}
                <div style={{fontSize:'11px',color:'#888'}}>
                  {(o.puestos||[]).length} puestos · {(o.puestos||[]).reduce((s,p)=>s+(p.celdas||0),0)} celdas
                  {o.creadoPor && <> · publicado por {o.creadoPor.nombre}</>}
                </div>
              </div>
              <span className="badge" style={{background: o.estado==='abierto' ? '#2e7d32' : '#9e9e9e', color:'#fff'}}>{o.estado === 'abierto' ? 'ABIERTO' : 'CERRADO'}</span>
              <button className="btn btn-sm btn-secondary" onClick={() => verLog(o)}>{logVer === o.id ? '📜 Ocultar' : '📜 Log'}</button>
              <button className="btn btn-sm btn-secondary" onClick={() => toggleOperativo(o)}>{o.estado === 'abierto' ? '⏸ Cerrar' : '▶ Reabrir'}</button>
              <button className="btn btn-sm btn-danger" onClick={() => borrarOperativo(o)}>🗑</button>
              {logVer === o.id && (
                <div style={{flexBasis:'100%',background:'#f7f9fc',border:'1px solid #e2e7f0',borderRadius:'10px',padding:'8px 12px',marginTop:'4px'}}>
                  <div style={{fontSize:'11px',fontWeight:'800',color:'#1a3a6b',marginBottom:'4px'}}>📜 CAMBIOS EN CAMPO (últimos {logItems.length})</div>
                  {logItems.length === 0 && <div style={{fontSize:'12px',color:'#888'}}>Sin cambios de estructura ni quitas registradas.</div>}
                  {logItems.map((l, i) => {
                    const ic = { 'celda+':'➕', 'celda-':'➖', 'puesto+':'🆕', 'puesto-':'🗑', 'quitar':'↩️', 'jefe':'👤' }[l.tipo] || '·';
                    return (
                      <div key={i} style={{fontSize:'12px',color:'#333',padding:'3px 0',borderBottom:'1px solid #eef1f6'}}>
                        {ic} {l.detalle}
                        <span style={{color:'#888'}}> — {l.por ? l.por.nombre + ' (' + l.por.legajo + ')' : '—'} · {l.ts ? new Date(l.ts).toLocaleString('es-AR', {day:'2-digit',month:'2-digit',hour:'2-digit',minute:'2-digit'}) : ''}</span>
                      </div>
                    );
                  })}
                </div>
              )}
            </div>
          ))}
        </div>
      </div>
    </div>
  );
}

function LoginModal({ onLogin }) {
  const [legajo,   setLegajo]   = React.useState('');
  const [password, setPassword] = React.useState('');
  const [step,     setStep]     = React.useState('legajo'); // 'legajo' | 'password'
  const [pendingUser, setPendingUser] = React.useState(null);
  const [error,    setError]    = React.useState('');
  const passRef = React.useRef(null);

  const [buscando, setBuscando] = React.useState(false);

  const handleLegajo = async () => {
    const clean = legajo.trim();
    if (!clean) { setError('Ingresá tu número de legajo.'); return; }
    setBuscando(true);
    let user = null;
    // 1) Firestore: fuente de verdad (permite editar/deshabilitar desde el panel Admin)
    try {
      const d = await Promise.race([
        window.firebaseUtils.db.collection(window.firebaseUtils.collections.usuarios).doc(clean).get(),
        new Promise((_, rej) => setTimeout(() => rej(new Error('TIMEOUT')), 6000)),
      ]);
      if (d.exists) { user = d.data(); cacheUsuarioLocal(user); }
    } catch(e) {
      // 2) Sin señal: cache local del teléfono (guardado en logins anteriores)
      user = leerUsuarioCache(clean);
    }
    // 3) Usuarios fijos del código, como respaldo
    if (!user) user = USUARIOS_AUTORIZADOS[clean] || null;
    setBuscando(false);
    if (!user) { setError('Legajo no autorizado.'); return; }
    if (user.activo === false) { setError('Usuario deshabilitado. Consultá al administrador.'); return; }
    const conRol = { ...user, rol: rolDeUsuario(user) };
    if (user.password) {
      setPendingUser(conRol);
      setStep('password');
      setError('');
      setTimeout(() => passRef.current && passRef.current.focus(), 50);
    } else {
      onLogin(conRol);
    }
  };

  const handlePassword = () => {
    if (!password) { setError('Ingresá tu contraseña.'); return; }
    if (password !== pendingUser.password) {
      setError('Contraseña incorrecta.');
      setPassword('');
      return;
    }
    onLogin(pendingUser);
  };

  const handleBack = () => {
    setStep('legajo');
    setPassword('');
    setPendingUser(null);
    setError('');
  };

  return (
    <div className="login-screen">
      <div className="login-card">
        <div className="login-escudo">
          <img src="escudo.png" alt="DPEM"
            onError={e => { e.target.style.display='none'; e.target.parentNode.textContent='DPEM'; }}/>
        </div>
        <div className="login-title">MESA DE DISTRIBUCIÓN</div>
        <div className="login-sub">DSED · DPEM · POLICÍA DE LA CIUDAD</div>
        <div className="login-gold"/>

        {step === 'legajo' ? (<>
          <label className="login-label">NÚMERO DE LEGAJO</label>
          <input
            type="text" inputMode="numeric" pattern="[0-9]*"
            placeholder="— — — — —" autoFocus autoComplete="off"
            className="login-input"
            value={legajo}
            onChange={e => { setLegajo(e.target.value.replace(/\D/g,'')); setError(''); }}
            onKeyDown={e => e.key === 'Enter' && handleLegajo()}
          />
        </>) : (<>
          <div className="login-chip">
            <div className="login-chip-av">{(pendingUser?.nombre || '?').charAt(0)}</div>
            <div style={{minWidth:0}}>
              <div style={{fontWeight:'800',fontSize:'13px',color:'#12336a',whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis'}}>
                {pendingUser?.jerarquia ? pendingUser.jerarquia + ' ' : ''}{pendingUser?.nombre}
              </div>
              <div style={{fontSize:'11px',color:'#7c93b8',fontWeight:'600'}}>LP {pendingUser?.legajo}</div>
            </div>
            <button className="login-chip-back" onClick={handleBack} title="Cambiar legajo">✕</button>
          </div>
          <label className="login-label">CONTRASEÑA</label>
          <input
            ref={passRef}
            type="password" placeholder="••••••"
            className="login-input"
            value={password}
            onChange={e => { setPassword(e.target.value); setError(''); }}
            onKeyDown={e => e.key === 'Enter' && handlePassword()}
          />
        </>)}

        {error && <div className="login-error">{error}</div>}

        <button className="login-btn" disabled={buscando}
          onClick={step === 'legajo' ? handleLegajo : handlePassword}>
          {step === 'legajo' ? (buscando ? '⏳ VERIFICANDO...' : 'CONTINUAR →') : 'INGRESAR'}
        </button>

        <div className="login-footer">Dirección Prevención en Eventos Masivos<br/>Depto. Seguridad en Eventos Deportivos</div>
      </div>
    </div>
  );
}

// ── APP ────────────────────────────────────────────────────────
function App() {
  // ── LOGIN ──
  const [usuario, setUsuario] = useState(() => {
    try {
      const saved = sessionStorage.getItem('mesa-dist-usuario');
      return saved ? JSON.parse(saved) : null;
    } catch(e) { return null; }
  });
  const handleLogin = (user) => {
    setUsuario(user);
    try { sessionStorage.setItem('mesa-dist-usuario', JSON.stringify(user)); } catch(e) {}
  };
  // Limpia las colecciones de sesión de Firestore (best-effort, no bloquea)
  const _limpiarColeccionesSesion = async () => {
    try {
      const {db,collections} = window.firebaseUtils;
      const sesionCols = [collections.qths, collections.motos, collections.infanteria, collections.refuerzo, collections.tercerAnillo];
      for (const col of sesionCols) {
        const snap = await db.collection(col).get();
        if (snap.empty) continue;
        const ops = snap.docs.map(d => ({ type:'delete', ref: db.collection(col).doc(d.id) }));
        await commitInBatches(ops);
      }
    } catch(e) { /* silent */ }
  };

  const handleLogout = async () => {
    await _limpiarColeccionesSesion();
    setUsuario(null);
    try { sessionStorage.removeItem('mesa-dist-usuario'); } catch(e) {}
  };

  // En celular la vista predeterminada es Carga Operativa; en escritorio, Distribución Previa
  const [tab,setTab]           = useState(() =>
    (typeof window !== 'undefined' && window.matchMedia && window.matchMedia('(max-width: 899px)').matches)
      ? 'campo' : 'distribucion');
  const [jefes,setJefes]       = useState([]);
  const [qths,setQths]         = useState([]);
  const [motos,setMotos]       = useState([]);
  const [infanteria,setInfanteria] = useState([]);
  const [refuerzo,setRefuerzo]   = useState([]);
  const [tercerAnillo,setTercerAnillo] = useState([]);
  const [historial,setHistorial]= useState([]);
  const [plantillas,setPlantillas]= useState([]);
  const [editingQTH,setEditingQTH] = useState(null);
  const [savingHist,setSavingHist] = useState(false);
  const [cargando,setCargando] = useState(false);
  const [viendoHist,setViendoHist] = useState(null);
  const [evento,setEvento] = useState({estadio:'',otroEstadio:'',fecha:todayISO(),localidad:''});
  const [lastActivity,setLastActivity] = useState(null);
  const lastActivityDismissed = useRef(null);
  const {toasts,toast,dismissToast} = useToast();

  // ── Activity tracker ──
  const _trackActivity = useCallback(async (accion) => {
    if (!usuario) return;
    try {
      const {db,collections} = window.firebaseUtils;
      await db.collection(collections.activity).doc('last').set({
        legajo: usuario.legajo,
        nombre: usuario.nombre,
        jerarquia: usuario.jerarquia,
        accion,
        timestamp: new Date().toISOString(),
      });
    } catch(e) { /* silent */ }
  }, [usuario]);

  useEffect(() => {
    const {db,collections} = window.firebaseUtils;
    const u1 = db.collection(collections.jefes).orderBy('efectivo')
      .onSnapshot(s=>setJefes(s.docs.map(d=>({id:d.id,...d.data()}))), err=>toast('Firebase jefes: '+err.message,'error'));
    const u2 = db.collection(collections.qths).orderBy('creadoEn')
      .onSnapshot(s=>setQths(s.docs.map(d=>({id:d.id,...d.data()}))), ()=>{});
    const u3 = db.collection(collections.historial).orderBy('guardadoEn','desc')
      .onSnapshot(s=>setHistorial(s.docs.map(d=>({id:d.id,...d.data()}))), ()=>{});
    const u4 = db.collection(collections.motos).orderBy('orden')
      .onSnapshot(s=>setMotos(s.docs.map(d=>({id:d.id,...d.data()}))), ()=>{});
    const u5 = db.collection(collections.infanteria).orderBy('orden')
      .onSnapshot(s=>setInfanteria(s.docs.map(d=>({id:d.id,...d.data()}))), ()=>{});
    const u6 = db.collection(collections.refuerzo).orderBy('orden')
      .onSnapshot(s=>setRefuerzo(s.docs.map(d=>({id:d.id,...d.data()}))), ()=>{});
    const u7 = db.collection(collections.tercerAnillo).orderBy('orden')
      .onSnapshot(s=>setTercerAnillo(s.docs.map(d=>({id:d.id,...d.data()}))), ()=>{});
    const u8 = db.collection(collections.plantillas)
      .onSnapshot(s=>setPlantillas(s.docs.map(d=>({id:d.id,...d.data()}))), ()=>{});
    const u9 = db.collection(collections.activity).doc('last')
      .onSnapshot(doc => {
        if (doc.exists) setLastActivity(doc.data());
      }, ()=>{});
    return () => { u1(); u2(); u3(); u4(); u5(); u6(); u7(); u8(); u9(); };
  }, []);

  // ── Protección al cerrar pestaña + limpieza de sesión ──
  useEffect(() => {
    // Al cerrar pestaña: limpiar colecciones de sesión en Firestore (best-effort)
    function handleUnload() {
      try {
        const {db,collections} = window.firebaseUtils;
        const sesionCols = [collections.qths, collections.motos, collections.infanteria, collections.refuerzo, collections.tercerAnillo];
        // Usamos sendBeacon / keepalive para asegurarnos que se ejecuta al cerrar
        // Como estamos en Firestore SDK, disparamos la limpieza sin await (best-effort)
        sesionCols.forEach(col => {
          db.collection(col).get().then(snap => {
            snap.docs.forEach(d => db.collection(col).doc(d.id).delete().catch(()=>{}));
          }).catch(()=>{});
        });
      } catch(e) {}
    }

    function handleBeforeUnload(e) {
      handleUnload();
      if (qths.length > 0 || motos.length > 0 || infanteria.length > 0 || refuerzo.length > 0 || tercerAnillo.length > 0) {
        e.preventDefault();
        e.returnValue = '';
      }
    }
    window.addEventListener('beforeunload', handleBeforeUnload);
    return () => window.removeEventListener('beforeunload', handleBeforeUnload);
  }, [qths.length, motos.length, infanteria.length, refuerzo.length, tercerAnillo.length]);

  const estadioNombre = evento.estadio==='__otro__' ? evento.otroEstadio : evento.estadio;
  const mostrarTercerAnillo = ESTADIOS_CON_ANILLO.has(evento.estadio);
  const totalItems = qths.length + motos.length + infanteria.length + refuerzo.length + tercerAnillo.length;
  const totalEfectivos = qths.reduce((s,q)=>s+(q.celdas||0),0)
    + infanteria.reduce((s,c)=>s+(c.celdas||0),0)
    + refuerzo.reduce((s,r)=>s+(r.celdas||0),0)
    + tercerAnillo.reduce((s,t)=>s+(t.celdas||0),0);

  const ultimoGuardado = estadioNombre
    ? historial.find(h => h.estadio === estadioNombre)
    : null;

  // ── CARGA EN CAMPO ────────────────────────────────────────
  const rol = rolDeUsuario(usuario);

  // Los operadores de campo aterrizan directo en la solapa Campo
  useEffect(() => {
    if (usuario && rolDeUsuario(usuario) === 'operador') setTab('campo');
  }, [usuario]);

  const [publicando, setPublicando] = useState(false);
  const [sbOpen, setSbOpen] = useState(false);
  const [darkMode, setDarkMode] = useState(() => { try { return localStorage.getItem('mesa-dist-dark') === '1'; } catch(e) { return false; } });
  useEffect(() => {
    document.body.classList.toggle('dark', darkMode);
    try { localStorage.setItem('mesa-dist-dark', darkMode ? '1' : '0'); } catch(e) {}
  }, [darkMode]);
  const handlePublicarCampo = async () => {
    if (!estadioNombre) { toast('Seleccioná el estadio antes de publicar.','error'); return; }
    if (!evento.fecha) { toast('Completá la fecha del evento.','error'); return; }
    if (totalItems === 0) { toast('No hay puestos para publicar.','error'); return; }
    const puestos = buildPuestosCampo(qths, motos, infanteria, refuerzo, tercerAnillo, ESTADIOS_RIVER.has(evento.estadio));
    const celdas = puestos.reduce((s,p)=>s+(p.celdas||0),0);
    if (!confirm(`¿Publicar "${estadioNombre}${evento.localidad ? ' · ' + evento.localidad : ''}" (${fmtFecha(evento.fecha)}) para carga en campo?\n\n${puestos.length} puestos · ${celdas} celdas.\n\nLos operadores van a poder cargar efectivos desde el celular.`)) return;
    setPublicando(true);
    try {
      const {db,collections} = window.firebaseUtils;
      const id = (estadioNombre||'op').replace(/[^\wÁÉÍÓÚÑáéíóúñ]+/g,'_') + '_' + (evento.fecha||todayISO()) + '_' + Date.now().toString(36);
      await db.collection(collections.operativos).doc(id).set({
        estadio: estadioNombre,
        partido: evento.localidad || '',
        fecha: evento.fecha,
        estado: 'abierto',
        puestos,
        creadoPor: { legajo: usuario.legajo, nombre: usuario.nombre },
        creadoEn: new Date().toISOString(),
      });
      _trackActivity(`publicó operativo de campo (${estadioNombre})`);
      toast('✓ Operativo publicado a Carga Operativa','success');
      setTab('campo');
    } catch(err) { toast('Error al publicar: '+err.message,'error'); }
    finally { setPublicando(false); }
  };

  // ── PLANTILLAS POR ESTADIO ────────────────────────────────
  const plantillaActual = estadioNombre
    ? plantillas.find(p => p.estadio === estadioNombre)
    : null;

  const handleGuardarPlantilla = async () => {
    if (!estadioNombre) { toast('Seleccioná un estadio','error'); return; }
    if (!qths.length) { toast('No hay QTHs para guardar como plantilla','error'); return; }
    const yaExiste = plantillaActual;
    if (yaExiste && !confirm(`Ya existe una plantilla para ${estadioNombre}. ¿Reemplazarla?`)) return;
    if (!yaExiste && !confirm(`¿Guardar la distribución actual como plantilla base para ${estadioNombre}?`)) return;
    try {
      const {db,collections} = window.firebaseUtils;
      const data = {
        estadio: estadioNombre,
        guardadoEn: new Date().toISOString(),
        qths: qths.map(q=>({nombre:q.nombre,descripcion:q.descripcion||'',celdas:q.celdas,tipo:q.tipo||null,jefeNombre:q.jefeNombre||null,jefeRango:q.jefeRango||null,jefeTel:q.jefeTel||null})),
        motos: motos.map(m=>({qth:m.qth||''})),
        infanteria: infanteria.map(c=>({nombre:c.nombre,descripcion:c.descripcion||'',celdas:c.celdas||2,tipo:c.tipo||null,sector:c.sector||null,jefeNombre:c.jefeNombre||null,jefeRango:c.jefeRango||null,jefeTel:c.jefeTel||null,jefeLegajo:c.jefeLegajo||null})),
        refuerzo: refuerzo.map(r=>({nombre:r.nombre,descripcion:r.descripcion||'',celdas:r.celdas||2,tipo:r.tipo||null,jefeNombre:r.jefeNombre||null,jefeRango:r.jefeRango||null,jefeTel:r.jefeTel||null})),
        tercerAnillo: tercerAnillo.map(t=>({nombre:t.nombre,descripcion:t.descripcion||'',celdas:t.celdas||2,tipo:t.tipo||null,jefeNombre:t.jefeNombre||null,jefeRango:t.jefeRango||null,jefeTel:t.jefeTel||null})),
      };
      if (yaExiste) {
        await db.collection(collections.plantillas).doc(yaExiste.id).update(data);
      } else {
        await db.collection(collections.plantillas).add(data);
      }
      toast(`✓ Plantilla de ${estadioNombre} guardada`,'success');
    } catch(err) { toast('Error: '+err.message,'error'); }
  };

  const handleCargarPlantilla = async () => {
    if (!plantillaActual) return;
    const yaHay = qths.length + motos.length + infanteria.length + refuerzo.length + tercerAnillo.length;
    if (yaHay > 0 && !confirm(`¿Cargar la plantilla de ${estadioNombre}? Esto reemplazará la distribución actual.`)) return;
    await _cargarSnapshot(plantillaActual);
  };

  const handleEliminarPlantilla = async () => {
    if (!plantillaActual) return;
    if (!confirm(`¿Eliminar la plantilla de ${estadioNombre}?`)) return;
    await window.firebaseUtils.db.collection(window.firebaseUtils.collections.plantillas).doc(plantillaActual.id).delete();
    toast('Plantilla eliminada','info');
  };

  // ── NUEVA DISTRIBUCIÓN ──────────────────────────────────────
  const handleNuevaDistribucion = async () => {
    if (totalItems === 0) return;
    if (!confirm('¿Limpiar la distribución actual y empezar de cero?\n\nEl historial NO se toca.')) return;
    setCargando(true);
    try {
      const {db,collections} = window.firebaseUtils;
      const ops = [];
      qths.forEach(q => ops.push({type:'delete', ref: db.collection(collections.qths).doc(q.id)}));
      motos.forEach(m => ops.push({type:'delete', ref: db.collection(collections.motos).doc(m.id)}));
      infanteria.forEach(c => ops.push({type:'delete', ref: db.collection(collections.infanteria).doc(c.id)}));
      refuerzo.forEach(r => ops.push({type:'delete', ref: db.collection(collections.refuerzo).doc(r.id)}));
      tercerAnillo.forEach(t => ops.push({type:'delete', ref: db.collection(collections.tercerAnillo).doc(t.id)}));
      await commitInBatches(ops);
      setEvento({ estadio:'', otroEstadio:'', fecha:todayISO(), localidad:'' });
      setEditingQTH(null);
      toast('✓ Distribución limpiada. Empezá de cero.','success');
      _trackActivity('limpió distribución');
    } catch(err) { toast('Error: '+err.message,'error'); }
    finally { setCargando(false); }
  };

  const handleCargarUltimo = async () => {
    if (!ultimoGuardado) return;
    if (qths.length > 0 && !confirm(`¿Reemplazar los ${qths.length} QTHs actuales con el último guardado de ${estadioNombre}?`)) return;
    await _cargarSnapshot(ultimoGuardado);
  };

  const handleCargarParaEditar = async (h) => {
    const yaHay = qths.length + motos.length + infanteria.length + refuerzo.length + tercerAnillo.length;
    if (yaHay > 0 && !confirm(`¿Cargar "${h.estadio}${h.localidad?' · '+h.localidad:''}" para editar? Esto reemplazará la distribución actual.`)) return;
    await _cargarSnapshot(h);
    setTab('distribucion');
  };

  const handleDuplicar = async (h) => {
    const yaHay = qths.length + motos.length + infanteria.length + refuerzo.length + tercerAnillo.length;
    if (yaHay > 0 && !confirm('¿Duplicar esta distribución? Esto reemplazará la distribución actual.')) return;
    await _cargarSnapshot({...h, fechaEvento: todayISO(), localidad: ''});
    setEvento(ev => ({...ev, fecha: todayISO(), localidad: ''}));
    setTab('distribucion');
    toast('✓ Distribución duplicada. Completá el evento y la fecha.','success');
  };

  const handleExportFromHist = async (h) => {
    const hQths = h.qths||[];
    const invalidos = hQths.filter(q => !q.nombre?.trim() || !q.celdas || q.celdas < 1);
    if (invalidos.length) { toast(`${invalidos.length} QTH(s) sin nombre o celdas.`,'error'); return; }
    try {
      toast('Generando Word...','info');
      const ev = { estadio: h.estadio, otroEstadio:'', fecha: h.fechaEvento, localidad: h.localidad };
      const {blob,nombre} = await buildWord(hQths, ev, h.guardadoEn, h.motos||[], h.infanteria||[], h.refuerzo||[], h.tercerAnillo||[]);
      downloadBlob(blob, `Historial_${nombre}_${(h.localidad||'').replace(/\s/g,'_')}_${h.fechaEvento||''}.docx`);
      toast('Word exportado ✓','success');
    } catch(err) { toast('Error: '+err.message,'error'); console.error(err); }
  };

  const _cargarSnapshot = async (h) => {
    setCargando(true);
    try {
      const {db,collections} = window.firebaseUtils;

      // Phase 1: Delete all current items
      const deleteOps = [];
      qths.forEach(q => deleteOps.push({type:'delete', ref: db.collection(collections.qths).doc(q.id)}));
      motos.forEach(m => deleteOps.push({type:'delete', ref: db.collection(collections.motos).doc(m.id)}));
      infanteria.forEach(c => deleteOps.push({type:'delete', ref: db.collection(collections.infanteria).doc(c.id)}));
      refuerzo.forEach(r => deleteOps.push({type:'delete', ref: db.collection(collections.refuerzo).doc(r.id)}));
      tercerAnillo.forEach(t => deleteOps.push({type:'delete', ref: db.collection(collections.tercerAnillo).doc(t.id)}));
      if (deleteOps.length) await commitInBatches(deleteOps);

      // Phase 2: Create new items from snapshot
      const createOps = [];
      (h.qths||[]).forEach((q,i) => {
        createOps.push({type:'set', ref: db.collection(collections.qths).doc(), data: {
          nombre: q.nombre, descripcion: q.descripcion||'', celdas: q.celdas, tipo: q.tipo||null,
          jefeId: null, jefeNombre: q.jefeNombre||null,
          jefeRango: q.jefeRango||null, jefeTel: q.jefeTel||null,
          creadoEn: new Date(Date.now()+i).toISOString(),
          actualizadoEn: new Date().toISOString(),
        }});
      });
      (h.motos||[]).forEach((m,i) => {
        createOps.push({type:'set', ref: db.collection(collections.motos).doc(), data: {
          qth: m.qth||'', orden: i, creadoEn: new Date(Date.now()+1000+i).toISOString()
        }});
      });
      (h.infanteria||[]).forEach((c,i) => {
        createOps.push({type:'set', ref: db.collection(collections.infanteria).doc(), data: {
          nombre: c.nombre||'', descripcion: c.descripcion||'', celdas: c.celdas||2,
          tipo: c.tipo||null, sector: c.sector||null, jefeId: null, jefeNombre: c.jefeNombre||null, jefeRango: c.jefeRango||null, jefeTel: c.jefeTel||null,
          jefeLegajo: c.jefeLegajo||null,
          orden: i, creadoEn: new Date(Date.now()+2000+i).toISOString()
        }});
      });
      // "Refuerzo de sector" se unificó con Sectores Principales: los históricos se cargan como QTHs
      (h.refuerzo||[]).forEach((r,i) => {
        createOps.push({type:'set', ref: db.collection(collections.qths).doc(), data: {
          nombre: r.nombre||'', descripcion: r.descripcion||'', celdas: r.celdas||2,
          tipo: r.tipo||null, jefeId: null, jefeNombre: r.jefeNombre||null, jefeRango: r.jefeRango||null, jefeTel: r.jefeTel||null,
          orden: i, creadoEn: new Date(Date.now()+3000+i).toISOString()
        }});
      });
      (h.tercerAnillo||[]).forEach((t,i) => {
        createOps.push({type:'set', ref: db.collection(collections.tercerAnillo).doc(), data: {
          nombre: t.nombre||'', descripcion: t.descripcion||'', celdas: t.celdas||2,
          tipo: t.tipo||null, jefeId: null, jefeNombre: t.jefeNombre||null, jefeRango: t.jefeRango||null, jefeTel: t.jefeTel||null,
          orden: i, creadoEn: new Date(Date.now()+4000+i).toISOString()
        }});
      });
      if (createOps.length) await commitInBatches(createOps);

      setEvento(ev=>({
        ...ev,
        estadio:    h.estadio || ev.estadio,
        localidad:  h.localidad||'',
        fecha:      h.fechaEvento||ev.fecha,
      }));
      const nQths  = (h.qths||[]).length;
      const nMotos = (h.motos||[]).length;
      const nInf   = (h.infanteria||[]).length;
      const nRef   = (h.refuerzo||[]).length;
      const n3er   = (h.tercerAnillo||[]).length;
      toast(`✓ ${nQths} QTHs${nMotos?` · ${nMotos} motos`:''}${n3er?` · ${n3er} 3er anillo`:''}${nInf?` · ${nInf} cortes`:''}${nRef?` · ${nRef} refuerzos (como sectores)`:''} cargados`,'success');
      // Track activity
      _trackActivity('cargó distribución');
    } catch(err) { toast('Error al cargar: '+err.message,'error'); }
    finally { setCargando(false); }
  };

  const handleGuardar = async () => {
    if (!evento.estadio) { toast('Seleccioná un estadio','error'); return; }
    if (!qths.length)    { toast('No hay QTHs para guardar','error'); return; }
    const invalidos = qths.filter(q => !q.nombre?.trim() || !q.celdas || q.celdas < 1);
    if (invalidos.length) { toast(`${invalidos.length} QTH(s) sin nombre o sin celdas. Corregílos antes de guardar.`,'error'); return; }

    // Warn about missing jefes
    const sinJefe = qths.filter(q => !q.jefeNombre);
    const sinJefeTotal = sinJefe.length
      + infanteria.filter(c=>!c.jefeNombre).length
      + refuerzo.filter(r=>!r.jefeNombre).length
      + tercerAnillo.filter(t=>!t.jefeNombre).length;

    // Check if same estadio + fecha + evento already exists
    const existente = historial.find(h =>
      h.estadio === estadioNombre &&
      h.fechaEvento === evento.fecha &&
      h.localidad === evento.localidad
    );

    let msg = existente
      ? `Ya existe un guardado para "${evento.localidad}" del ${fmtFecha(evento.fecha)} en ${estadioNombre}.\n¿Reemplazarlo con la distribución actual?`
      : '¿Guardar esta distribución en el historial?';

    if (sinJefeTotal > 0) {
      msg = `⚠ ${sinJefeTotal} puesto(s) sin jefe asignado.\n\n` + msg;
    }

    if (!confirm(msg)) return;
    setSavingHist(true);
    try {
      const {db,collections} = window.firebaseUtils;
      const data = {
        estadio:    estadioNombre,
        localidad:  evento.localidad,
        fechaEvento:evento.fecha,
        guardadoEn: new Date().toISOString(),
        guardadoPor: { legajo: usuario.legajo, nombre: usuario.nombre, jerarquia: usuario.jerarquia },
        qths: qths.map(q=>({nombre:q.nombre,descripcion:q.descripcion||'',celdas:q.celdas,tipo:q.tipo||null,jefeNombre:q.jefeNombre||null,jefeRango:q.jefeRango||null,jefeTel:q.jefeTel||null})),
        motos: motos.map(m=>({qth:m.qth||''})),
        infanteria: infanteria.map(c=>({nombre:c.nombre,descripcion:c.descripcion||'',celdas:c.celdas||2,tipo:c.tipo||null,sector:c.sector||null,jefeNombre:c.jefeNombre||null,jefeRango:c.jefeRango||null,jefeTel:c.jefeTel||null,jefeLegajo:c.jefeLegajo||null})),
        refuerzo: refuerzo.map(r=>({nombre:r.nombre,descripcion:r.descripcion||'',celdas:r.celdas||2,tipo:r.tipo||null,jefeNombre:r.jefeNombre||null,jefeRango:r.jefeRango||null,jefeTel:r.jefeTel||null})),
        tercerAnillo: tercerAnillo.map(t=>({nombre:t.nombre,descripcion:t.descripcion||'',celdas:t.celdas||2,tipo:t.tipo||null,jefeNombre:t.jefeNombre||null,jefeRango:t.jefeRango||null,jefeTel:t.jefeTel||null})),
      };
      if (existente) {
        await db.collection(collections.historial).doc(existente.id).update(data);
        toast('✓ Historial actualizado (mismo evento y fecha)','success');
      } else {
        await db.collection(collections.historial).add(data);
        toast('✓ Distribución guardada en historial','success');
      }
      setTab('historial');
      _trackActivity('guardó distribución: ' + estadioNombre);
    } catch(err) { toast('Error: '+err.message,'error'); }
    finally { setSavingHist(false); }
  };

  const handleEliminarHistorial = async id => {
    const registro = historial.find(h => h.id === id);
    if (!registro) return;
    try {
      await window.firebaseUtils.db.collection(window.firebaseUtils.collections.historial).doc(id).delete();
      toast('Registro eliminado', 'info', {
        label: '↩ Deshacer',
        onClick: async () => {
          try {
            const {db,collections} = window.firebaseUtils;
            const {id: _, ...data} = registro;
            await db.collection(collections.historial).add(data);
            toast('✓ Registro restaurado','success');
          } catch(err) { toast('Error al restaurar: '+err.message,'error'); }
        }
      });
    } catch(err) { toast('Error: '+err.message,'error'); }
  };

  // ── LOGIN GUARD ──
  // Concurrent activity detection
  const showActivityBanner = (() => {
    if (!lastActivity || !usuario) return false;
    if (lastActivity.legajo === usuario.legajo) return false;
    const age = Date.now() - new Date(lastActivity.timestamp).getTime();
    if (age > 5 * 60 * 1000) return false; // older than 5 min
    if (lastActivityDismissed.current === lastActivity.timestamp) return false;
    return true;
  })();

  const ActivityBanner = showActivityBanner ? (
    <div className="activity-banner">
      <span style={{fontSize:'16px'}}>⚠️</span>
      <span>
        <strong>{lastActivity.jerarquia} {lastActivity.nombre}</strong> (LP {lastActivity.legajo})
        {' '}{lastActivity.accion || 'modificó la distribución'}
        {' '}— hace {Math.max(1, Math.round((Date.now() - new Date(lastActivity.timestamp).getTime()) / 60000))} min
      </span>
      <button className="dismiss-btn" onClick={() => { lastActivityDismissed.current = lastActivity.timestamp; setLastActivity(a => ({...a})); }}>
        Entendido ✕
      </button>
    </div>
  ) : null;

  if (!usuario) return <LoginModal onLogin={handleLogin}/>;

  if (viendoHist) return (
    <div>
      <Header usuario={usuario} onLogout={handleLogout}/>
      <VistaHistorial h={viendoHist} onVolver={()=>setViendoHist(null)} toast={toast}/>
      <div className="toast-container">{toasts.map(t=><div key={t.id} className={`toast ${t.type}`}>{t.msg}{t.action&&<span className="toast-action" onClick={()=>{t.action.onClick();dismissToast(t.id);}}>{t.action.label}</span>}</div>)}</div>
    </div>
  );

  return (
    <div className="layout">
      <div className="topbar">
        <button className="topbar-burger" onClick={()=>setSbOpen(true)}>☰</button>
        <span className="topbar-title">MESA DE DISTRIBUCIÓN</span>
      </div>
      {sbOpen && <div className="sb-backdrop" onClick={()=>setSbOpen(false)}/>}
      <Sidebar usuario={usuario} rol={rol} tab={tab} onTab={setTab}
        historialCount={historial.length} onLogout={handleLogout}
        open={sbOpen} onClose={()=>setSbOpen(false)}
        dark={darkMode} onToggleDark={()=>setDarkMode(d=>!d)}/>
      <div className="main">
      {ActivityBanner}

      {tab==='distribucion' && rol!=='operador' &&<>
        <EventoBar evento={evento} onChange={setEvento} onGuardar={handleGuardar}
          onNueva={handleNuevaDistribucion} onGuardarPlantilla={handleGuardarPlantilla}
          qths={qths} saving={savingHist} totalItems={totalItems} totalEfectivos={totalEfectivos}
          infanteria={infanteria} refuerzo={refuerzo} tercerAnillo={tercerAnillo}/>

        {/* ── Banner publicar a campo ── */}
        {totalItems > 0 && (
          <div style={{
            background:'linear-gradient(90deg,#1b5e20,#2e7d32)',
            color:'#fff', padding:'8px 20px',
            display:'flex', alignItems:'center', gap:'12px', flexWrap:'wrap',
            fontSize:'12px',
          }}>
            <span style={{fontSize:'16px'}}>📱</span>
            <span>
              <strong>Carga Operativa:</strong> publicá esta distribución para que los operadores carguen efectivos desde el celular ({totalItems} puestos · {totalEfectivos + motos.length} celdas).
            </span>
            <button
              className="btn btn-sm"
              style={{background:'#66bb6a',color:'#0b2e0d',border:'none',marginLeft:'auto',flexShrink:0,fontWeight:'800'}}
              onClick={handlePublicarCampo}
              disabled={publicando}
            >
              {publicando ? '⏳ Publicando...' : '📡 Publicar a Carga Operativa'}
            </button>
          </div>
        )}

        {/* ── Banner último guardado ── */}
        {ultimoGuardado && (
          <div style={{
            background:'linear-gradient(90deg,#0d3349,#134a6e)',
            color:'#fff', padding:'8px 20px',
            display:'flex', alignItems:'center', gap:'12px', flexWrap:'wrap',
            fontSize:'12px',
          }}>
            <span style={{fontSize:'16px'}}>📋</span>
            <span>
              <strong>Último guardado para {estadioNombre}:</strong>
              {' '}{fmtFecha(ultimoGuardado.fechaEvento)}
              {ultimoGuardado.localidad && ` · ${ultimoGuardado.localidad}`}
              {' '}·{' '}<span style={{opacity:.8}}>{(ultimoGuardado.qths||[]).length} QTHs · {(ultimoGuardado.qths||[]).reduce((s,q)=>s+(q.celdas||0),0)} celdas{(ultimoGuardado.motos||[]).length>0&&` · ${ultimoGuardado.motos.length} motos`}{(ultimoGuardado.tercerAnillo||[]).length>0&&` · ${ultimoGuardado.tercerAnillo.length} 3er anillo`}</span>
            </span>
            <button
              className="btn btn-sm"
              style={{background:'#1e88e5',color:'#fff',border:'none',marginLeft:'auto',flexShrink:0}}
              onClick={handleCargarUltimo}
              disabled={cargando}
            >
              {cargando ? '⏳ Cargando...' : '✏️ Cargar para editar'}
            </button>
            <button
              className="btn btn-sm btn-secondary"
              style={{flexShrink:0}}
              onClick={()=>{ setViendoHist(ultimoGuardado); }}
            >Ver detalle</button>
          </div>
        )}

        {/* ── Banner plantilla disponible ── */}
        {plantillaActual && (
          <div style={{
            background:'linear-gradient(90deg,#311b92,#5e35b1)',
            color:'#fff', padding:'8px 20px',
            display:'flex', alignItems:'center', gap:'12px', flexWrap:'wrap',
            fontSize:'12px',
          }}>
            <span style={{fontSize:'16px'}}>📌</span>
            <span>
              <strong>Plantilla base para {estadioNombre}</strong>
              {' '}·{' '}<span style={{opacity:.8}}>{(plantillaActual.qths||[]).length} QTHs · {(plantillaActual.qths||[]).reduce((s,q)=>s+(q.celdas||0),0)} celdas{(plantillaActual.motos||[]).length>0&&` · ${plantillaActual.motos.length} motos`}</span>
              {' '}·{' '}<span style={{opacity:.6}}>Guardada: {fmtTs(plantillaActual.guardadoEn)}</span>
            </span>
            <button
              className="btn btn-sm"
              style={{background:'#7c4dff',color:'#fff',border:'none',marginLeft:'auto',flexShrink:0}}
              onClick={handleCargarPlantilla}
              disabled={cargando}
            >
              {cargando ? '⏳ Cargando...' : '📥 Cargar plantilla'}
            </button>
            <button
              className="btn btn-sm"
              style={{background:'rgba(255,255,255,.15)',color:'#fff',border:'1px solid rgba(255,255,255,.3)',flexShrink:0}}
              onClick={handleEliminarPlantilla}
            >🗑</button>
          </div>
        )}

        <div style={{maxWidth:'1100px',margin:'0 auto',padding:'14px'}}>
          <FormQTH jefes={jefes} editData={editingQTH} onCancelEdit={()=>setEditingQTH(null)} toast={toast}/>
          <ListaQTHs qths={qths} jefes={jefes} toast={toast} onEdit={q=>setEditingQTH(q)} evento={evento}
            motos={motos} infanteria={infanteria} refuerzo={refuerzo} tercerAnillo={tercerAnillo}/>

          <PanelSeccion
            items={infanteria} jefes={jefes} toast={toast}
            collectionName="infanteria"
            title="CORTES CON INFANTERÍA"
            icon="🚧"
            accentColor="#c62828"
            darkColor="#b71c1c"
            lightBg="#fff5f5"
            lightBorder="#ffcdd2"
            itemLabel="corte"
            addLabel="Agregar corte"
            isRiver={ESTADIOS_RIVER.has(evento.estadio)}
          />

          <PanelMotorizada motos={motos} toast={toast}/>

          {/* 3ER ANILLO — solo para estadios con anillo */}
          {mostrarTercerAnillo && (
            <PanelSeccion
              items={tercerAnillo} jefes={jefes} toast={toast}
              collectionName="tercerAnillo"
              title="3ER ANILLO"
              icon="🔵"
              accentColor="#283593"
              darkColor="#1a237e"
              lightBg="#e8eaf6"
              lightBorder="#c5cae9"
              itemLabel="puesto"
              addLabel="Agregar puesto de 3er Anillo"
            />
          )}
        </div>
      </>}

      {tab==='campo'&&(
        <CampoTab usuario={usuario} rol={rol} toast={toast}/>
      )}

      {tab==='jefes'&&rol!=='operador'&&(
        <div style={{maxWidth:'760px',margin:'0 auto',padding:'16px 14px'}}>
          <PanelJefes jefes={jefes} toast={toast}/>
        </div>
      )}

      {tab==='admin'&&rol==='admin'&&(
        <AdminTab usuario={usuario} toast={toast}/>
      )}

      {tab==='historial'&&rol!=='operador'&&(
        <HistorialTab
          historial={historial}
          estadioNombre={estadioNombre}
          onCargar={handleCargarParaEditar}
          onVer={setViendoHist}
          onEliminar={handleEliminarHistorial}
          onDuplicar={handleDuplicar}
          onExportWord={handleExportFromHist}
        />
      )}
      </div>

      <div className="toast-container">{toasts.map(t=><div key={t.id} className={`toast ${t.type}`}>{t.msg}{t.action&&<span className="toast-action" onClick={()=>{t.action.onClick();dismissToast(t.id);}}>{t.action.label}</span>}</div>)}</div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
