}

// ── EVENTO BAR ────────────────────────────────────────────────
function EventoBar({ evento, onChange, onGuardar, onNueva, onGuardarPlantilla, qths, saving, totalItems, totalEfectivos, infanteria, refuerzo, tercerAnillo }) {
  const total = qths.reduce((s,q)=>s+(q.celdas||0),0);
  const nombre = evento.estadio==='__otro__' ? evento.otroEstadio : evento.estadio;

  // Contadores por tipo — todas las secciones
  const allItems = [...qths, ...(infanteria||[]), ...(refuerzo||[]), ...(tercerAnillo||[])];
  const tipoCounts = {};
  TIPOS_DISPONIBLES.forEach(t => {
    const cnt = allItems.filter(x => x.tipo === t).reduce((s,x) => s + (x.celdas || 0), 0);
    if (cnt > 0) tipoCounts[t] = cnt;
  });
  const sinTipo = allItems.filter(x => !x.tipo).reduce((s,x) => s + (x.celdas || 0), 0);
  const hasTipos = Object.keys(tipoCounts).length > 0 || sinTipo > 0;

  return (
    <div className="evento-bar">
      <div>
        <label>ESTADIO / LUGAR</label>
        <select value={evento.estadio} onChange={e=>onChange({...evento,estadio:e.target.value})} style={{minWidth:'180px'}}>
          <option value="">— Seleccioná un estadio —</option>
          {ESTADIOS.map(e=><option key={e} value={e}>{e}</option>)}
          <option value="__otro__">Otro...</option>
        </select>
      </div>
      {evento.estadio==='__otro__' && (
        <div>
          <label>NOMBRE DEL LUGAR</label>
          <input placeholder="Escribí el nombre..." value={evento.otroEstadio}
            onChange={e=>onChange({...evento,otroEstadio:e.target.value.toUpperCase()})} style={{minWidth:'160px'}} />
        </div>
      )}
      <div>
        <label>FECHA DEL EVENTO</label>
        <input type="date" value={evento.fecha} onChange={e=>onChange({...evento,fecha:e.target.value})} />
      </div>
      <div>
        <label>EVENTO</label>
        <input
          placeholder="Ej: BOCA VS RIVER · CHAYANNE EN VÉLEZ"
          value={evento.localidad}
          onChange={e=>onChange({...evento,localidad:e.target.value.toUpperCase()})}
          style={{minWidth:'240px'}}
        />
      </div>
      <div style={{marginLeft:'auto',display:'flex',alignItems:'center',gap:'10px'}}>
        <div className="evento-status">
          <div style={{fontWeight:'700',fontSize:'13px'}}>{qths.length} QTHs · {total} celdas</div>
          {totalEfectivos > 0 && totalEfectivos !== total && (
            <div style={{fontWeight:'900',fontSize:'15px',color:'#ffd54f',marginTop:'2px'}}>
              TOTAL: {totalEfectivos} efectivos
            </div>
          )}
          {hasTipos && (
            <div className="tipo-pills" style={{marginTop:'4px'}}>
              {TIPOS_DISPONIBLES.map(t => tipoCounts[t] ? (
                <span key={t} className="tipo-pill" style={{background: tipoColor(t), color:'#fff'}}>
                  {t}: {tipoCounts[t]}
                </span>
              ) : null)}
              {sinTipo > 0 && (
                <span className="tipo-pill" style={{background:'rgba(255,255,255,.2)',color:'rgba(255,255,255,.7)',border:'1px solid rgba(255,255,255,.3)'}}>
                  S/T: {sinTipo}
                </span>
              )}
            </div>
          )}
          {nombre && <div style={{fontSize:'10px',opacity:.8,marginTop:'2px'}}>
            {nombre}{evento.localidad&&` · ${evento.localidad}`}{evento.fecha&&` · ${fmtFecha(evento.fecha)}`}
          </div>}
        </div>
        <button className="btn btn-success btn-sm" onClick={onGuardar}
          disabled={saving||!evento.estadio||qths.length===0} title="Guardar en historial">
          {saving?'⏳':'💾'} Guardar
        </button>
        <button className="btn btn-sm" onClick={onGuardarPlantilla}
          disabled={!evento.estadio||qths.length===0}
          style={{background:'#5e35b1',color:'#fff',border:'none'}}
          title="Guardar como plantilla base para este estadio">
          📌 Plantilla
        </button>
        <button className="btn btn-sm" onClick={onNueva}
          disabled={totalItems===0}
          style={{background:'#ff6f00',color:'#fff',border:'none'}}
          title="Limpiar distribución actual y empezar de cero">
          🔄 NUEVA DISTRIBUCIÓN
        </button>
      </div>
    </div>
  );
}

// ── PANEL JEFES ───────────────────────────────────────────────
function PanelJefes({ jefes, toast }) {
  const [open,    setOpen]    = useState(true);
  const [loading, setLoading] = useState(false);
  const [search,  setSearch]  = useState('');
  const [form,    setForm]    = useState({ jerarquia:'', efectivo:'', telefono:'' });
  const [saving,  setSaving]  = useState(false);
  const [editId,  setEditId]  = useState(null);
  const fileRef = useRef();

  const handleImport = async (e) => {
    const file = e.target.files[0]; if (!file) return;
    setLoading(true);
    try {
      const buf  = await file.arrayBuffer();
      const wb   = XLSX.read(buf,{type:'array'});
      const ws   = wb.Sheets[wb.SheetNames[0]];
      const rows = XLSX.utils.sheet_to_json(ws,{defval:''});
      const n = s => String(s).toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').trim();
      const parsed = rows.map(r => {
        const keys = Object.keys(r);
        const f = t => keys.find(k=>n(k)===n(t));
        return {
          jerarquia: String(r[f('jerarquia')||f('jerarquía')||'']||'').trim(),
          efectivo:  String(r[f('efectivo')||'']||'').trim(),
          telefono:  String(r[f('telefono')||f('teléfono')||'']||'').trim(),
        };
      }).filter(r=>r.efectivo);
      if (!parsed.length) { toast('Sin datos. Verificá columnas: Jerarquia · Efectivo · Telefono','error'); return; }
      const {db,collections} = window.firebaseUtils;
      const batch = db.batch();
      parsed.forEach(j => batch.set(db.collection(collections.jefes).doc(),{...j,importadoEn:new Date().toISOString()}));
      await batch.commit();
      toast(`✓ ${parsed.length} Jefes importados`,'success');
      setOpen(true);
    } catch(err) { toast('Error: '+err.message,'error'); }
    finally { setLoading(false); e.target.value=''; }
  };

  const handleAddManual = async () => {
    if (!form.efectivo.trim()) { toast('Ingresá el nombre del efectivo','error'); return; }
    setSaving(true);
    try {
      const {db,collections} = window.firebaseUtils;
      if (editId) {
        await db.collection(collections.jefes).doc(editId).update({
          jerarquia: form.jerarquia.trim(),
          efectivo:  form.efectivo.trim().toUpperCase(),
          telefono:  form.telefono.trim(),
        });
        toast('Jefe actualizado ✓','success');
        setEditId(null);
      } else {
        await db.collection(collections.jefes).add({
          jerarquia: form.jerarquia.trim(),
          efectivo:  form.efectivo.trim().toUpperCase(),
          telefono:  form.telefono.trim(),
          importadoEn: new Date().toISOString(),
        });
        toast('Jefe agregado ✓','success');
      }
      setForm({ jerarquia:'', efectivo:'', telefono:'' });
    } catch(err) { toast('Error: '+err.message,'error'); }
    finally { setSaving(false); }
  };

  const handleEditJefe = (j) => {
    setEditId(j.id);
    setForm({ jerarquia: j.jerarquia||'', efectivo: j.efectivo||'', telefono: j.telefono||'' });
    setOpen(true);
  };
  const cancelEdit = () => {
    setEditId(null);
    setForm({ jerarquia:'', efectivo:'', telefono:'' });
  };

  const del = async id => {
    if (!confirm('¿Eliminar este jefe?')) return;
    await window.firebaseUtils.db.collection(window.firebaseUtils.collections.jefes).doc(id).delete();
    toast('Jefe eliminado','info');
  };
  const delAll = async () => {
    if (!confirm(`¿Borrar los ${jefes.length} jefes?`)) return;
    const {db,collections} = window.firebaseUtils;
    const batch = db.batch();
    jefes.forEach(j => batch.delete(db.collection(collections.jefes).doc(j.id)));
    await batch.commit(); toast('Lista borrada','info');
  };

  const filtered = sortJefes(jefes.filter(j => !search ||
    j.efectivo.toLowerCase().includes(search.toLowerCase()) ||
    (j.jerarquia||'').toLowerCase().includes(search.toLowerCase())));

  return (
    <div className="card">
      <div className="card-header" style={{cursor:'pointer'}} onClick={()=>setOpen(o=>!o)}>
        <span>👮 JEFES DE QTH <span style={{opacity:.7,fontWeight:'400',fontSize:'10px',marginLeft:'4px'}}>{open?'▲':'▼'}</span></span>
        <span className="counter-pill">{jefes.length}</span>
      </div>

      {open && (
        <div className="card-body">
          <div style={{background:editId?'#fff8e1':'#f5f8ff',border:`1px solid ${editId?'#f9a825':'#d0d9f0'}`,borderRadius:'6px',padding:'10px',marginBottom:'10px'}}>
            <div style={{fontSize:'11px',fontWeight:'700',color:editId?'#f57c00':'#1a3a6b',marginBottom:'7px'}}>
              {editId ? '✏️ Editar jefe' : '➕ Agregar manualmente'}
            </div>
            <div style={{display:'grid',gridTemplateColumns:'1fr 2fr 1fr',gap:'6px',marginBottom:'6px'}}>
              <div>
                <label>Jerarquía</label>
                <select value={form.jerarquia} onChange={e=>setForm({...form,jerarquia:e.target.value})}>
                  <option value="">—</option>
                  {JERARQUIA_ORDEN.map(j=><option key={j} value={j}>{j}</option>)}
                </select>
              </div>
              <div>
                <label>Efectivo *</label>
                <input placeholder="Apellido, Nombre" value={form.efectivo}
                  onChange={e=>setForm({...form,efectivo:e.target.value})}
                  style={{textTransform:'uppercase'}}
                  onKeyDown={e=>e.key==='Enter'&&handleAddManual()}
                />
              </div>
              <div>
                <label>Teléfono</label>
                <input placeholder="11-xxxx-xxxx" value={form.telefono}
                  onChange={e=>setForm({...form,telefono:e.target.value})}
                  onKeyDown={e=>e.key==='Enter'&&handleAddManual()}
                />
              </div>
            </div>
            <div style={{display:'flex',gap:'6px'}}>
              <button className="btn btn-primary btn-sm btn-full" onClick={handleAddManual} disabled={saving}>
                {saving?'Guardando...': editId ? '💾 Actualizar' : '✓ Agregar'}
              </button>
              {editId && <button className="btn btn-secondary btn-sm" onClick={cancelEdit} style={{flexShrink:0}}>Cancelar</button>}
            </div>
          </div>

          <div className="import-zone" onClick={()=>fileRef.current.click()}>
            <input ref={fileRef} type="file" accept=".xlsx,.xls" onChange={handleImport}/>
            <div style={{fontSize:'18px'}}>📂</div>
            <div style={{fontWeight:'700',marginTop:'2px',fontSize:'12px'}}>{loading?'Importando...':'Importar desde Excel'}</div>
            <div style={{color:'#888',marginTop:'1px',fontSize:'11px'}}>Jerarquia · Efectivo · Telefono</div>
          </div>

          {jefes.length>0 && <>
            <hr className="divider"/>
            <div className="search-wrapper form-group">
              <input placeholder="Buscar..." value={search} onChange={e=>setSearch(e.target.value)}/>
              {search&&<span className="search-clear" onClick={()=>setSearch('')}>×</span>}
            </div>
            <div style={{maxHeight:'260px',overflowY:'auto'}}>
              <table className="tbl">
                <thead><tr><th>Jerarquía</th><th>Efectivo</th><th>Tel.</th><th></th></tr></thead>
                <tbody>
                  {filtered.map(j=>(
                    <tr key={j.id} style={editId===j.id?{background:'#fff8e1'}:{}}>
                      <td><span className="badge badge-blue" style={{fontSize:'10px'}}>{j.jerarquia||'—'}</span></td>
                      <td style={{fontWeight:'600',fontSize:'12px'}}>{j.efectivo}</td>
                      <td style={{fontFamily:'monospace',color:'#2e7d32',fontSize:'11px'}}>{j.telefono||'—'}</td>
                      <td style={{whiteSpace:'nowrap'}}>
                        <button className="btn btn-secondary btn-sm" onClick={()=>handleEditJefe(j)} title="Editar" style={{marginRight:'3px'}}>✏️</button>
                        <button className="btn btn-danger btn-sm" onClick={()=>del(j.id)} title="Eliminar">✕</button>
                      </td>
                    </tr>
                  ))}
                </tbody>
              </table>
            </div>
            <div style={{marginTop:'8px',textAlign:'right'}}>
              <button className="btn btn-danger btn-sm" onClick={delAll}>🗑 Borrar todos</button>
            </div>
          </>}

          {jefes.length===0&&!loading&&(
            <div className="empty-state" style={{padding:'14px'}}>Sin jefes. Importá un Excel o agregá manualmente.</div>
          )}
        </div>
      )}
    </div>
  );
}

// ── PANEL HISTORIAL ───────────────────────────────────────────
function PanelHistorial({ historial, estadioActual, onCargar, onVer, onEliminar, onDuplicar, onExportWord }) {
  const [search, setSearch]       = useState('');
  const [soloEstadio, setSoloEstadio] = useState(true);

  const base = (estadioActual && soloEstadio)
    ? historial.filter(h => h.estadio === estadioActual)
    : historial;

  const filtered = base.filter(h => !search ||
    (h.estadio||'').toLowerCase().includes(search.toLowerCase()) ||
    (h.localidad||'').toLowerCase().includes(search.toLowerCase()));

  // Agrupar por estadio para acortar la lista
  const [gruposAbiertos, setGruposAbiertos] = React.useState({});
  const grupos = [];
  filtered.forEach(h => {
    const key = h.estadio || 'SIN ESTADIO';
    let g = grupos.find(x => x.estadio === key);
    if (!g) { g = { estadio: key, items: [] }; grupos.push(g); }
    g.items.push(h);
  });

  return (
    <div className="card hist-sticky-panel" style={{display:'flex',flexDirection:'column',maxHeight:'calc(100vh - 130px)',position:'sticky',top:'74px'}}>
      <div className="card-header ch-amber">
        <span>📁 HISTORIAL</span>
        <span className="counter-pill">{filtered.length}{historial.length !== filtered.length && `/${historial.length}`}</span>
      </div>
      <div className="card-body" style={{display:'flex',flexDirection:'column',overflow:'hidden',flex:1,padding:'10px 12px'}}>
        {estadioActual && (
          <div style={{display:'flex',alignItems:'center',gap:'8px',marginBottom:'8px',fontSize:'11px'}}>
            <button
              className={`btn btn-sm ${soloEstadio?'btn-primary':'btn-secondary'}`}
              style={{fontSize:'10px',padding:'3px 10px'}}
              onClick={()=>setSoloEstadio(s=>!s)}
            >
              {soloEstadio ? `📍 ${estadioActual}` : '🌐 Todos los estadios'}
            </button>
            {soloEstadio && historial.filter(h=>h.estadio!==estadioActual).length > 0 && (
              <span style={{color:'#999'}}>
                +{historial.filter(h=>h.estadio!==estadioActual).length} de otros estadios
              </span>
            )}
          </div>
        )}

        {base.length>1&&(
          <div className="search-wrapper form-group" style={{marginBottom:'8px',flexShrink:0}}>
            <input placeholder="Buscar..." value={search} onChange={e=>setSearch(e.target.value)}/>
            {search&&<span className="search-clear" onClick={()=>setSearch('')}>×</span>}
          </div>
        )}
        {filtered.length===0&&<div className="empty-state">
          {estadioActual && soloEstadio ? `Sin distribuciones guardadas para ${estadioActual}.` : 'Sin distribuciones guardadas.'}
        </div>}
        <div className="hist-scroll" style={{flex:1,overflowY:'auto',paddingRight:'4px'}}>
          {grupos.map(g => {
            // Con búsqueda activa o un solo grupo, se muestran desplegados
            const abierto = grupos.length === 1 || !!search || !!gruposAbiertos[g.estadio];
            return (
            <div key={g.estadio} style={{marginBottom:'6px'}}>
              <div onClick={() => setGruposAbiertos(s => ({...s, [g.estadio]: !abierto}))}
                style={{display:'flex',alignItems:'center',gap:'7px',background:'linear-gradient(90deg,#12336a,#1a3a6b)',
                  color:'#fff',padding:'8px 11px',borderRadius:'9px',cursor:'pointer',userSelect:'none',
                  fontSize:'11px',fontWeight:'800',letterSpacing:'.4px'}}>
                <span>{abierto ? '▾' : '▸'}</span>
                <span style={{flex:1,minWidth:0,whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis'}}>🏟 {g.estadio}</span>
                <span style={{background:'rgba(255,255,255,.18)',padding:'1px 8px',borderRadius:'9px',fontSize:'10px',flexShrink:0}}>{g.items.length}</span>
                <span style={{opacity:.7,fontWeight:'600',fontSize:'10px',flexShrink:0}}>{fmtFecha(g.items[0].fechaEvento)}</span>
              </div>
              {abierto && g.items.map(h=>(
            <div key={h.id} className="hist-item" onClick={()=>onCargar(h)} title="Cargar para editar">
              <div style={{display:'flex',alignItems:'flex-start',gap:'8px'}}>
                <div style={{flex:1,minWidth:0}}>
                  <div style={{display:'flex',alignItems:'center',gap:'6px',flexWrap:'wrap',marginBottom:'4px'}}>
                    <span style={{fontSize:'10px',textTransform:'uppercase',letterSpacing:'.5px',color:'#888',fontWeight:'600',lineHeight:1}}>{h.estadio}</span>
                  </div>
                  <div style={{fontWeight:'700',fontSize:'13px',color:'#1a3a6b',lineHeight:1.3}}>
                    {h.localidad || '—'}
                  </div>
                </div>
                <div className="hist-actions" style={{display:'flex',gap:'3px',flexShrink:0,marginTop:'2px'}}>
                  <button className="btn btn-sm" style={{background:'#e8edf5',color:'#1a3a6b',border:'none',padding:'4px 7px',fontSize:'12px',lineHeight:1}}
                    onClick={e=>{e.stopPropagation();onVer(h);}} title="Ver detalle">👁</button>
                  <button className="btn btn-sm" style={{background:'#e8f5e9',color:'#2e7d32',border:'none',padding:'4px 7px',fontSize:'12px',lineHeight:1}}
                    onClick={e=>{e.stopPropagation();onDuplicar(h);}} title="Duplicar como nueva">📋</button>
                  <button className="btn btn-sm" style={{background:'#e3f2fd',color:'#1565c0',border:'none',padding:'4px 7px',fontSize:'12px',lineHeight:1}}
                    onClick={e=>{e.stopPropagation();onExportWord(h);}} title="Exportar Word">⬇</button>
                  <button className="btn btn-sm" style={{background:'#ffebee',color:'#d32f2f',border:'none',padding:'4px 7px',fontSize:'12px',lineHeight:1}}
                    onClick={e=>{e.stopPropagation();onEliminar(h.id);}} title="Eliminar">✕</button>
                </div>
              </div>
              <div style={{marginTop:'6px',fontSize:'11px',color:'#555',display:'flex',gap:'10px',flexWrap:'wrap'}}>
                <span>📅 {fmtFecha(h.fechaEvento)}</span>
                <span>📍 {(h.qths||[]).length} QTHs · {(h.qths||[]).reduce((s,q)=>s+(q.celdas||0),0)} celdas</span>
              </div>
              <div style={{marginTop:'4px',fontSize:'10px',color:'#aaa'}}>
                Guardado: {fmtTs(h.guardadoEn)}
                {h.guardadoPor && <span style={{marginLeft:'6px',color:'#1a3a6b',fontWeight:'600'}}> por {h.guardadoPor.jerarquia} {h.guardadoPor.nombre} (LP {h.guardadoPor.legajo})</span>}
              </div>
            </div>
              ))}
            </div>
            );
          })}
        </div>
      </div>
    </div>
  );
}

// ── SEARCHABLE JEFE SELECT ───────────────────────────────────
function SearchableJefeSelect({ jefes, value, onChange }) {
  const [search, setSearch] = React.useState('');
  const [open,   setOpen]   = React.useState(false);
  const ref = React.useRef(null);
  const selected = jefes.find(j => j.id === value);
  React.useEffect(() => {
    function handler(e) { if (ref.current && !ref.current.contains(e.target)) setOpen(false); }
    document.addEventListener('mousedown', handler);
    return () => document.removeEventListener('mousedown', handler);
  }, []);
  const filtered = jefes.filter(j =>
    !search ||
    (j.efectivo||'').toLowerCase().includes(search.toLowerCase()) ||
    (j.jerarquia||'').toLowerCase().includes(search.toLowerCase())
  );
  return (
    <div ref={ref} style={{position:'relative'}}>
      <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',
        border:'1px solid #ccc',borderRadius:'4px',padding:'6px 10px',
        background:'#fff',cursor:'pointer',minHeight:'34px',fontSize:'13px'}}
        onClick={() => { setOpen(o => !o); setSearch(''); }}>
        <span style={{color: selected ? '#111' : '#999'}}>
          {selected ? `${selected.jerarquia?'['+selected.jerarquia+'] ':''}${selected.efectivo}` : '— Sin jefe asignado —'}
        </span>
        <span style={{fontSize:'10px',color:'#999',marginLeft:'6px'}}>▼</span>
      </div>
      {open && (
        <div style={{position:'absolute',zIndex:999,top:'100%',left:0,right:0,
          background:'#fff',border:'1px solid #ccc',borderRadius:'4px',
          boxShadow:'0 4px 12px rgba(0,0,0,.15)',maxHeight:'220px',overflow:'hidden',
          display:'flex',flexDirection:'column'}}>
          <div style={{padding:'6px 8px',borderBottom:'1px solid #eee'}}>
            <input autoFocus placeholder="Buscar nombre o jerarquía..."
              value={search} onChange={e=>setSearch(e.target.value)}
              style={{width:'100%',fontSize:'12px',border:'1px solid #ddd',
                borderRadius:'3px',padding:'4px 8px',boxSizing:'border-box'}}
              onClick={e=>e.stopPropagation()}/>
          </div>
          <div style={{overflowY:'auto',flex:1}}>
            <div style={{padding:'7px 12px',cursor:'pointer',fontSize:'12px',
              color:'#999',borderBottom:'1px solid #f0f0f0'}}
              onClick={()=>{onChange('');setOpen(false);}}>— Sin jefe asignado —</div>
            {filtered.length===0&&<div style={{padding:'10px 12px',fontSize:'12px',color:'#aaa'}}>Sin resultados.</div>}
            {filtered.map(j=>(
              <div key={j.id}
                style={{padding:'7px 12px',cursor:'pointer',fontSize:'12px',
                  background:j.id===value?'#e8edf5':'#fff',borderBottom:'1px solid #f5f5f5'}}
                onMouseEnter={e=>e.currentTarget.style.background='#f0f4ff'}
                onMouseLeave={e=>e.currentTarget.style.background=j.id===value?'#e8edf5':'#fff'}
                onClick={()=>{onChange(j.id);setOpen(false);setSearch('');}}>
                {j.jerarquia&&<span style={{color:'#1a3a6b',fontWeight:'700',marginRight:'5px',fontSize:'11px'}}>[{j.jerarquia}]</span>}
                {j.efectivo}
                {j.telefono&&<span style={{color:'#999',fontSize:'10px',marginLeft:'6px'}}>📞 {j.telefono}</span>}
              </div>
            ))}
          </div>
        </div>
      )}
    </div>
  );
}

// ── PANEL GENÉRICO TIPO SECCIÓN (usado para Refuerzo, Infantería, 3er Anillo) ──
function PanelSeccion({ items, jefes, toast, collectionName, title, icon, accentColor, darkColor, lightBg, lightBorder, itemLabel, addLabel, isRiver }) {
  const emptyForm = { nombre:'', descripcion:'', celdas:'2', jefeId:'', tipo:'', sector:'' };
  const [form,   setForm]   = React.useState({...emptyForm});
  const [saving, setSaving] = React.useState(false);
  const [editId, setEditId] = React.useState(null);
  const [open,   setOpen]   = React.useState(true);
  const jefe = (jefes||[]).find(j=>j.id===form.jefeId)||null;

  // ── Sector Jefe state (para River) ──
  const [sectorJefeA, setSectorJefeA] = React.useState({ jefeId:'', nombre:'', rango:'', legajo:'', telefono:'' });
  const [sectorJefeB, setSectorJefeB] = React.useState({ jefeId:'', nombre:'', rango:'', legajo:'', telefono:'' });
  const [editingSectorJefe, setEditingSectorJefe] = React.useState(null); // 'A' or 'B' or null

  // Auto-detect sector jefe from existing items
  React.useEffect(() => {
    if (!isRiver) return;
    const itemsA = items.filter(s => s.sector === 'A');
    const itemsB = items.filter(s => s.sector === 'B');
    if (itemsA.length > 0 && itemsA[0].jefeNombre) {
      setSectorJefeA(prev => ({
        ...prev,
        nombre: itemsA[0].jefeNombre || '', rango: itemsA[0].jefeRango || '',
        legajo: itemsA[0].jefeLegajo || prev.legajo || '', telefono: itemsA[0].jefeTel || '',
        jefeId: itemsA[0].jefeId || '',
      }));
    }
    if (itemsB.length > 0 && itemsB[0].jefeNombre) {
      setSectorJefeB(prev => ({
        ...prev,
        nombre: itemsB[0].jefeNombre || '', rango: itemsB[0].jefeRango || '',
        legajo: itemsB[0].jefeLegajo || prev.legajo || '', telefono: itemsB[0].jefeTel || '',
        jefeId: itemsB[0].jefeId || '',
      }));
    }
  }, [isRiver, items.length]);

  const handleSave = async () => {
    if (!form.nombre.trim()) { toast(`Ingresá el nombre del ${itemLabel}`,'error'); return; }
    if (isRiver && !form.sector) { toast('Seleccioná un sector (A o B)','error'); return; }
    const celdas = parseInt(form.celdas)||2;
    setSaving(true);
    try {
      const {db,collections} = window.firebaseUtils;
      const col = collections[collectionName];
      const data = {
        nombre:form.nombre.trim().toUpperCase(), descripcion:form.descripcion.trim(), celdas,
        tipo: form.tipo||null,
        sector: isRiver ? (form.sector || 'A') : null,
        jefeId: form.jefeId||null,
        jefeNombre: jefe?jefe.efectivo:null, jefeRango: jefe?jefe.jerarquia:null, jefeTel: jefe?jefe.telefono:null,
        jefeLegajo: null,
        orden: editId ? (items.find(s=>s.id===editId)?.orden ?? items.length) : items.length,
      };
      if (editId) {
        await db.collection(col).doc(editId).update(data);
        toast(`${itemLabel} actualizado ✓`,'success'); setEditId(null);
      } else {
        await db.collection(col).add({...data, creadoEn: new Date().toISOString()});
        toast(`${itemLabel} agregado ✓`,'success');
      }
      setForm({...emptyForm, sector: isRiver ? form.sector : ''});
    } catch(err) { toast('Error: '+err.message,'error'); }
    finally { setSaving(false); }
  };
  const handleEdit = (s) => {
    setEditId(s.id);
    setForm({ nombre:s.nombre, descripcion:s.descripcion||'', celdas:String(s.celdas||2), jefeId:s.jefeId||'', tipo:s.tipo||'', sector:s.sector||'' });
  };
  const handleDel = async (id) => {
    if (!confirm(`¿Eliminar este ${itemLabel}?`)) return;
    const col = window.firebaseUtils.collections[collectionName];
    await window.firebaseUtils.db.collection(col).doc(id).delete();
    toast(`${itemLabel} eliminado`,'info');
  };
  const handleDelAll = async () => {
    if (!confirm(`¿Eliminar los ${items.length} ${itemLabel}s?`)) return;
    const {db,collections} = window.firebaseUtils;
    const col = collections[collectionName];
    const b = db.batch();
    items.forEach(s=>b.delete(db.collection(col).doc(s.id)));
    await b.commit(); toast(`${itemLabel}s borrados`,'info');
  };
  const cancelEdit = () => { setEditId(null); setForm({...emptyForm}); };
  const handleMove = async (idx, dir, list) => {
    const sortedList = list || items;
    const newIdx = idx + dir;
    if (newIdx < 0 || newIdx >= sortedList.length) return;
    const a = sortedList[idx], b = sortedList[newIdx];
    const {db,collections} = window.firebaseUtils;
    const col = collections[collectionName];
    const batch = db.batch();
    batch.update(db.collection(col).doc(a.id), { orden: b.orden ?? newIdx });
    batch.update(db.collection(col).doc(b.id), { orden: a.orden ?? idx });
    await batch.commit();
  };

  // ── Aplicar Jefe de Sector a todos los items del sector ──
  const handleAplicarJefeSector = async (sector) => {
    const sj = sector === 'A' ? sectorJefeA : sectorJefeB;
    if (!sj.nombre && !sj.jefeId) { toast('Completá los datos del jefe de sector','error'); return; }
    const sectorItems = items.filter(s => s.sector === sector);
    if (sectorItems.length === 0) { toast(`No hay ${itemLabel}s en el Sector ${sector}`,'error'); return; }
    const {db,collections} = window.firebaseUtils;
    const col = collections[collectionName];
    const batch = db.batch();
    sectorItems.forEach(s => {
      batch.update(db.collection(col).doc(s.id), {
        jefeId: sj.jefeId || null,
        jefeNombre: sj.nombre || null,
        jefeRango: sj.rango || null,
        jefeTel: sj.telefono || null,
        jefeLegajo: sj.legajo || null,
      });
    });
    await batch.commit();
    toast(`✓ Jefe aplicado a ${sectorItems.length} ${itemLabel}s del Sector ${sector}`,'success');
    setEditingSectorJefe(null);
  };

  // ── Select jefe from pool for sector ──
  const handleSelectJefeForSector = (sector, jefeId) => {
    const j = (jefes||[]).find(x=>x.id===jefeId);
    const setter = sector === 'A' ? setSectorJefeA : setSectorJefeB;
    if (j) {
      setter(prev => ({ ...prev, jefeId: j.id, nombre: j.efectivo, rango: j.jerarquia||'', telefono: j.telefono||'', legajo: j.legajo||'' }));
    } else {
      setter(prev => ({ ...prev, jefeId: '', nombre: '', rango: '', telefono: '', legajo: '' }));
    }
  };

  // ── Render sector jefe card ──
  const renderSectorJefeCard = (sector) => {
    const sj = sector === 'A' ? sectorJefeA : sectorJefeB;
    const setSj = sector === 'A' ? setSectorJefeA : setSectorJefeB;
    const isEditing = editingSectorJefe === sector;
    const sectorItems = items.filter(s => s.sector === sector);
    const sectorColor = sector === 'A' ? '#1565c0' : '#c62828';
    return (
      <div style={{background:isEditing?'#fff8e1':'#f5f8ff',border:`2px solid ${sectorColor}`,borderRadius:'8px',padding:'10px 12px',marginBottom:'10px'}}>
        <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:'8px'}}>
          <div style={{display:'flex',alignItems:'center',gap:'8px'}}>
            <span style={{background:sectorColor,color:'#fff',borderRadius:'6px',padding:'3px 10px',fontSize:'12px',fontWeight:'700'}}>
              SECTOR {sector}
            </span>
            <span style={{fontSize:'11px',color:'#666'}}>{sectorItems.length} {itemLabel}s</span>
          </div>
          <div style={{display:'flex',gap:'4px'}}>
            <button className="btn btn-sm" style={{background:sectorColor,color:'#fff',border:'none',fontSize:'10px'}}
              onClick={()=>setEditingSectorJefe(isEditing?null:sector)}>
              {isEditing ? '✕ Cerrar' : '✏️ Editar Jefe'}
            </button>
            {sj.nombre && <button className="btn btn-sm btn-success" style={{fontSize:'10px'}}
              onClick={()=>handleAplicarJefeSector(sector)}>
              📋 Aplicar a todos ({sectorItems.length})
            </button>}
          </div>
        </div>
        {/* Jefe info display */}
        {sj.nombre && !isEditing && (
          <div className="jefe-info" style={{borderLeftColor:sectorColor,marginTop:'0'}}>
            <div style={{display:'flex',alignItems:'center',gap:'8px',flexWrap:'wrap'}}>
              <div className="jn">{sj.rango && `${sj.rango} `}{sj.nombre}</div>
              {sj.legajo && <span style={{fontSize:'10px',color:'#667',fontFamily:'monospace'}}>LP {sj.legajo}</span>}
              {sj.telefono && <span className="jt" style={{marginTop:0}}>📞 {sj.telefono}</span>}
            </div>
          </div>
        )}
        {!sj.nombre && !isEditing && (
          <div style={{fontSize:'11px',color:'#999',fontStyle:'italic'}}>Sin jefe asignado. Presioná "Editar Jefe" para configurar.</div>
        )}
        {/* Editable sector jefe form */}
        {isEditing && (
          <div style={{marginTop:'6px'}}>
            {jefes && jefes.length > 0 && (
              <div style={{marginBottom:'6px'}}>
                <label style={{fontSize:'10px'}}>SELECCIONAR DEL POOL</label>
                <SearchableJefeSelect
                  jefes={sortJefes(jefes)}
                  value={sj.jefeId}
                  onChange={id=>handleSelectJefeForSector(sector, id)}
                />
              </div>
            )}
            <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr 1fr',gap:'6px',marginBottom:'6px'}}>
              <div>
                <label style={{fontSize:'10px'}}>JERARQUÍA</label>
                <input value={sj.rango} onChange={e=>setSj({...sj,rango:e.target.value})} placeholder="Ej: Inspector" style={{fontSize:'12px'}}/>
              </div>
              <div>
                <label style={{fontSize:'10px'}}>NOMBRE</label>
                <input value={sj.nombre} onChange={e=>setSj({...sj,nombre:e.target.value.toUpperCase()})} placeholder="APELLIDO, Nombre" style={{fontSize:'12px',textTransform:'uppercase'}}/>
              </div>
              <div>
                <label style={{fontSize:'10px'}}>LEGAJO</label>
                <input value={sj.legajo} onChange={e=>setSj({...sj,legajo:e.target.value.replace(/\D/g,'')})} placeholder="Ej: 12345" style={{fontSize:'12px',fontFamily:'monospace'}} inputMode="numeric"/>
              </div>
              <div>
                <label style={{fontSize:'10px'}}>TELÉFONO</label>
                <input value={sj.telefono} onChange={e=>setSj({...sj,telefono:e.target.value})} placeholder="11-xxxx-xxxx" style={{fontSize:'12px',fontFamily:'monospace'}}/>
              </div>
            </div>
            <div style={{display:'flex',gap:'6px'}}>
              <button className="btn btn-sm btn-success btn-full" onClick={()=>handleAplicarJefeSector(sector)}>
                📋 Aplicar a los {sectorItems.length} {itemLabel}s del Sector {sector}
              </button>
              <button className="btn btn-sm btn-secondary" onClick={()=>setEditingSectorJefe(null)} style={{flexShrink:0}}>Cancelar</button>
            </div>
          </div>
        )}
      </div>
    );
  };

  // ── Render item row ──
  const renderItemRow = (s, i, list) => (
    <div key={s.id} style={{border:`1px solid ${lightBorder}`,borderRadius:'5px',padding:'7px 10px',
      background:'#fff',display:'flex',alignItems:'center',gap:'8px'}}>
      <div style={{display:'flex',flexDirection:'column',gap:'1px',flexShrink:0}}>
        <button className="btn btn-secondary btn-sm" disabled={i===0}
          onClick={()=>handleMove(i,-1,list)}
          style={{padding:'1px 5px',fontSize:'9px',lineHeight:'1',minWidth:'20px'}}>▲</button>
        <button className="btn btn-secondary btn-sm" disabled={i===list.length-1}
          onClick={()=>handleMove(i,1,list)}
          style={{padding:'1px 5px',fontSize:'9px',lineHeight:'1',minWidth:'20px'}}>▼</button>
      </div>
      <span style={{color:darkColor,fontWeight:'700',fontSize:'11px',minWidth:'18px'}}>{i+1}</span>
      <div style={{flex:1}}>
        <div style={{fontWeight:'700',fontSize:'12px'}}>
          {s.nombre}
          {s.descripcion&&<span style={{fontWeight:'400',color:'#888',fontSize:'10px',marginLeft:'4px'}}>({s.descripcion})</span>}
          {s.tipo&&<span style={{marginLeft:'5px',padding:'1px 6px',borderRadius:'6px',fontSize:'9px',fontWeight:'700',
            background:tipoColor(s.tipo),color:'#fff'}}>{s.tipo}</span>}
          {isRiver && s.sector && <span style={{marginLeft:'5px',padding:'1px 6px',borderRadius:'6px',fontSize:'9px',fontWeight:'700',
            background:s.sector==='A'?'#1565c0':'#c62828',color:'#fff'}}>S-{s.sector}</span>}
        </div>
        {s.jefeNombre&&<div style={{fontSize:'10px',color:'#555',marginTop:'2px'}}>
          {s.jefeRango&&<span style={{color:'#1a3a6b',fontWeight:'600'}}>{s.jefeRango} </span>}
          {s.jefeNombre}
          {s.jefeLegajo&&<span style={{color:'#555',fontFamily:'monospace',marginLeft:'6px'}}>LP {s.jefeLegajo}</span>}
          {s.jefeTel&&<span style={{color:'#2e7d32',fontFamily:'monospace',marginLeft:'6px'}}>📞 {s.jefeTel}</span>}
        </div>}
      </div>
      <span style={{background:lightBg,color:darkColor,borderRadius:'8px',padding:'2px 8px',fontSize:'10px',fontWeight:'700',flexShrink:0}}>{s.celdas||2} filas</span>
      <button className="btn btn-sm btn-secondary" style={{flexShrink:0}} onClick={()=>handleEdit(s)}>✏️</button>
      <button className="btn btn-sm btn-danger" style={{flexShrink:0}} onClick={()=>handleDel(s.id)}>✕</button>
    </div>
  );

  const itemsA = isRiver ? items.filter(s => s.sector === 'A') : [];
  const itemsB = isRiver ? items.filter(s => s.sector === 'B') : [];
  const itemsSinSector = isRiver ? items.filter(s => !s.sector || (s.sector !== 'A' && s.sector !== 'B')) : [];

  return (
    <div className="card" style={{borderTop:`3px solid ${darkColor}`}}>
      <div className="card-header" style={{background:darkColor,cursor:'pointer'}} onClick={()=>setOpen(o=>!o)}>
        <span>{icon} {title} <span style={{opacity:.6,fontWeight:'400',fontSize:'10px',marginLeft:'4px'}}>{open?'▲':'▼'}</span></span>
        <div style={{display:'flex',gap:'7px',alignItems:'center'}}>
          {items.length>0&&<span className="counter-pill" style={{background:accentColor,color:'#fff'}}>{items.length} {itemLabel}s</span>}
          {isRiver && items.length>0 && <span className="counter-pill" style={{background:'#1565c0',color:'#fff',fontSize:'10px'}}>A:{itemsA.length}</span>}
          {isRiver && items.length>0 && <span className="counter-pill" style={{background:'#c62828',color:'#fff',fontSize:'10px'}}>B:{itemsB.length}</span>}
          {items.length>0&&<button className="btn btn-sm" style={{background:'#c62828',color:'#fff'}} onClick={e=>{e.stopPropagation();handleDelAll();}}>🗑</button>}
        </div>
      </div>
      {open && <div className="card-body">
        <div style={{background:editId?'#fff8e1':lightBg,border:`1px solid ${editId?'#f9a825':lightBorder}`,borderRadius:'6px',padding:'10px',marginBottom:'12px'}}>
          <div style={{fontSize:'11px',fontWeight:'700',color:editId?'#f57c00':darkColor,marginBottom:'7px'}}>
            {editId ? `✏️ Editar ${itemLabel}` : `➕ ${addLabel}`}
          </div>
          <div style={{display:'grid',gridTemplateColumns: isRiver ? '2fr 2fr 80px 80px' : '2fr 2fr 80px',gap:'6px',marginBottom:'6px'}}>
            <div><label>NOMBRE *</label>
              <input placeholder="Ej: PALOS Y ESPINOSA" value={form.nombre}
                onChange={e=>setForm({...form,nombre:e.target.value})} style={{textTransform:'uppercase'}}
                onKeyDown={e=>e.key==='Enter'&&handleSave()}/></div>
            <div><label>DESCRIPCIÓN (entre paréntesis)</label>
              <input placeholder="Ej: Refuerzo Platea Baja Sur" value={form.descripcion}
                onChange={e=>setForm({...form,descripcion:e.target.value})}
                onKeyDown={e=>e.key==='Enter'&&handleSave()}/></div>
            <div><label>FILAS</label>
              <input type="number" min="1" max="15" value={form.celdas}
                onChange={e=>setForm({...form,celdas:e.target.value})}/></div>
            {isRiver && (
              <div><label>SECTOR *</label>
                <select value={form.sector} onChange={e=>setForm({...form,sector:e.target.value})}
                  style={{fontWeight:'700',color:form.sector==='A'?'#1565c0':form.sector==='B'?'#c62828':'#666'}}>
                  <option value="">—</option>
                  <option value="A">SECTOR A</option>
                  <option value="B">SECTOR B</option>
                </select>
              </div>
            )}
          </div>
          {/* TIPO */}
          <div style={{marginBottom:'6px'}}>
            <label>TIPO</label>
            <div style={{display:'flex',gap:'6px'}}>
              {TIPOS_DISPONIBLES.map(t=>(
                <button key={t} type="button"
                  onClick={()=>setForm({...form,tipo:form.tipo===t?'':t})}
                  style={{
                    padding:'4px 14px', border:'2px solid', borderRadius:'5px',
                    fontFamily:'Arial,sans-serif', fontSize:'11px', fontWeight:'700',
                    cursor:'pointer', transition:'all .15s',
                    background: form.tipo===t ? (tipoColor(t)) : '#fff',
                    color:       form.tipo===t ? '#fff' : (tipoColor(t)),
                    borderColor: tipoColor(t),
                  }}
                >{t}</button>
              ))}
              {form.tipo && (
                <button type="button" onClick={()=>setForm({...form,tipo:''})}
                  style={{padding:'4px 8px',border:'1px solid #ccc',borderRadius:'5px',background:'#f5f5f5',fontSize:'10px',cursor:'pointer',color:'#666'}}>
                  ✕
                </button>
              )}
            </div>
          </div>
          {/* JEFE — solo si NO es River (en River se asigna por sector) */}
          {!isRiver && jefes && jefes.length > 0 && (
            <div style={{marginBottom:'6px'}}>
              <label>JEFE DE QTH</label>
              <SearchableJefeSelect
                jefes={sortJefes(jefes)}
                value={form.jefeId}
                onChange={id=>setForm({...form,jefeId:id})}
              />
              {jefe && (
                <div className="jefe-info" style={{borderLeftColor:darkColor}}>
                  <div className="jn">{jefe.efectivo}</div>
                  <div className="jr">{jefe.jerarquia}</div>
                  <div className="jt">📞 {jefe.telefono||'Sin teléfono'}</div>
                </div>
              )}
            </div>
          )}
          <div style={{display:'flex',gap:'6px'}}>
            <button className="btn btn-sm btn-full" style={{background:darkColor,color:'#fff'}}
              onClick={handleSave} disabled={saving}>{saving?'Guardando...':editId?'💾 Actualizar':`➕ Agregar`}</button>
            {editId&&<button className="btn btn-secondary btn-sm" onClick={cancelEdit} style={{flexShrink:0}}>Cancelar</button>}
          </div>
        </div>

        {/* ── RIVER: Sector Jefes + Items agrupados ── */}
        {isRiver && items.length > 0 && (
          <div>
            {renderSectorJefeCard('A')}
            {itemsA.length > 0 && (
              <div style={{display:'flex',flexDirection:'column',gap:'6px',marginBottom:'14px',paddingLeft:'6px',borderLeft:'3px solid #1565c0'}}>
                {itemsA.map((s,i)=>renderItemRow(s,i,itemsA))}
              </div>
            )}
            {renderSectorJefeCard('B')}
            {itemsB.length > 0 && (
              <div style={{display:'flex',flexDirection:'column',gap:'6px',marginBottom:'14px',paddingLeft:'6px',borderLeft:'3px solid #c62828'}}>
                {itemsB.map((s,i)=>renderItemRow(s,i,itemsB))}
              </div>
            )}
            {itemsSinSector.length > 0 && (
              <>
                <div style={{fontSize:'11px',fontWeight:'700',color:'#999',marginBottom:'6px',marginTop:'10px'}}>⚠ SIN SECTOR ASIGNADO</div>
                <div style={{display:'flex',flexDirection:'column',gap:'6px',marginBottom:'6px',paddingLeft:'6px',borderLeft:'3px solid #ccc'}}>
                  {itemsSinSector.map((s,i)=>renderItemRow(s,i,itemsSinSector))}
                </div>
              </>
            )}
          </div>
        )}

        {/* ── Normal (no River): lista flat ── */}
        {!isRiver && items.length>0&&(
          <div style={{display:'flex',flexDirection:'column',gap:'6px'}}>
            {items.map((s,i)=>renderItemRow(s,i,items))}
          </div>
        )}
        {items.length===0&&<div className="empty-state" style={{padding:'14px'}}>Sin {itemLabel}s configurados.</div>}
      </div>}
    </div>
  );
}

// ── FORM QTH ──────────────────────────────────────────────────
function FormQTH({ jefes, editData, onCancelEdit, toast }) {
  const empty = {nombre:'',descripcion:'',celdas:'',jefeId:'',tipo:''};
  const [form,setForm] = useState(empty);
  const [saving,setSaving] = useState(false);
  const [collapsed,setCollapsed] = useState(false);
  useEffect(()=>{
    setForm(editData ? {nombre:editData.nombre,descripcion:editData.descripcion||'',celdas:String(editData.celdas),jefeId:editData.jefeId||'',tipo:editData.tipo||''} : empty);
    if (editData) setCollapsed(false);
  },[editData]);
  const jefe = jefes.find(j=>j.id===form.jefeId)||null;
  const handleSubmit = async () => {
    if (!form.nombre.trim()) { toast('Ingresá el nombre del QTH','error'); return; }
    const celdas = parseInt(form.celdas);
    if (!celdas||celdas<1) { toast('Celdas inválidas','error'); return; }
    setSaving(true);
    try {
      const {db,collections} = window.firebaseUtils;
      const data = {
        nombre:form.nombre.trim().toUpperCase(), celdas,
        descripcion: form.descripcion.trim()||null,
        tipo: form.tipo||null,
        jefeId:form.jefeId||null,
        jefeNombre:jefe?jefe.efectivo:null, jefeRango:jefe?jefe.jerarquia:null, jefeTel:jefe?jefe.telefono:null,
        actualizadoEn:new Date().toISOString(),
      };
      if (editData) {
        await db.collection(collections.qths).doc(editData.id).update(data);
        toast('QTH actualizado ✓','success'); onCancelEdit();
      } else {
        await db.collection(collections.qths).add({...data,creadoEn:new Date().toISOString()});
        toast('QTH agregado ✓','success');
      }
      setForm(empty);
    } catch(err) { toast('Error: '+err.message,'error'); }
    finally { setSaving(false); }
  };
  return (
    <div className={`card ${editData?'edit-inline':''}`}>
      <div className={`card-header ${editData?'ch-blue':''}`} style={{cursor: editData ? 'default' : 'pointer'}}
        onClick={()=>{ if (!editData) setCollapsed(c=>!c); }}>
        <span>{editData?'✏️ EDITAR SECTOR PRINCIPAL':'➕ AGREGAR SECTOR PRINCIPAL (QTH)'} {!editData && <span style={{opacity:.6,fontWeight:'400',fontSize:'10px',marginLeft:'4px'}}>{collapsed?'▼':'▲'}</span>}</span>
      </div>
      {!collapsed && <div className="card-body">
        <div className="form-row">
          <div className="form-group">
            <label>NOMBRE DEL QTH *</label>
            <input placeholder="Ej: PALOS Y ESPINOSA" value={form.nombre}
              onChange={e=>setForm({...form,nombre:e.target.value})} style={{textTransform:'uppercase'}}/>
          </div>
          <div className="form-group">
            <label>CELDAS *</label>
            <input type="number" min="1" max="99" placeholder="Ej: 4"
              value={form.celdas} onChange={e=>setForm({...form,celdas:e.target.value})}/>
          </div>
        </div>

        <div className="form-group">
          <label>DESCRIPCIÓN (entre paréntesis en el Word)</label>
          <input placeholder="Ej: Ingreso visitante sector norte" value={form.descripcion}
            onChange={e=>setForm({...form,descripcion:e.target.value})}/>
        </div>

        <div className="form-group">
          <label>TIPO DE PUESTO</label>
          <div style={{display:'flex',gap:'6px'}}>
            {TIPOS_DISPONIBLES.map(t=>(
              <button key={t} type="button"
                onClick={()=>setForm({...form,tipo:form.tipo===t?'':t})}
                style={{
                  padding:'5px 16px', border:'2px solid', borderRadius:'5px',
                  fontFamily:'Arial,sans-serif', fontSize:'12px', fontWeight:'700',
                  cursor:'pointer', transition:'all .15s',
                  background: form.tipo===t ? (tipoColor(t)) : '#fff',
                  color:       form.tipo===t ? '#fff' : (tipoColor(t)),
                  borderColor: tipoColor(t),
                }}
              >{t}</button>
            ))}
            {form.tipo && (
              <button type="button" onClick={()=>setForm({...form,tipo:''})}
                style={{padding:'5px 10px',border:'1px solid #ccc',borderRadius:'5px',background:'#f5f5f5',fontSize:'11px',cursor:'pointer',color:'#666'}}>
                ✕ Sin tipo
              </button>
            )}
          </div>
        </div>

        <div className="form-group">
          <label>JEFE DE QTH</label>
          <SearchableJefeSelect
            jefes={sortJefes(jefes)}
            value={form.jefeId}
            onChange={id=>setForm({...form,jefeId:id})}
          />
          {jefe ? (
            <div className="jefe-info">
              <div className="jn">{jefe.efectivo}</div>
              <div className="jr">{jefe.jerarquia}</div>
              <div className="jt">📞 {jefe.telefono||'Sin teléfono'}</div>
            </div>
          ) : <div style={{marginTop:'4px',fontSize:'11px',color:'#999'}}>Importá jefes desde el panel izquierdo.</div>}
        </div>
        <div style={{display:'flex',gap:'8px'}}>
          <button className="btn btn-primary btn-full" onClick={handleSubmit} disabled={saving}>
            {saving?'Guardando...':editData?'💾 Actualizar QTH':'➕ Agregar QTH'}
          </button>
          {editData&&<button className="btn btn-secondary" onClick={onCancelEdit} style={{flexShrink:0}}>Cancelar</button>}
        </div>
      </div>}
    </div>
  );
}

// ── LISTA QTHs ────────────────────────────────────────────────
function ListaQTHs({ qths, jefes, toast, onEdit, evento, motos, infanteria, refuerzo, tercerAnillo }) {
  const [search,setSearch] = useState('');
  const [inlineEdit, setInlineEdit] = useState(null); // {id, field, value}
  const [dragIdx, setDragIdx] = useState(null);
  const [dragOverIdx, setDragOverIdx] = useState(null);
  const [dragOverHalf, setDragOverHalf] = useState(null); // 'top' | 'bottom'

  const handleInlineStart = (q, field) => {
    if (field === 'nombre') setInlineEdit({id:q.id, field, value: q.nombre||''});
    else if (field === 'celdas') setInlineEdit({id:q.id, field, value: String(q.celdas||'')});
    else if (field === 'descripcion') setInlineEdit({id:q.id, field, value: q.descripcion||''});
  };
  const handleInlineSave = async () => {
    if (!inlineEdit) return;
    const {id, field, value} = inlineEdit;
    try {
      const update = {};
      if (field === 'nombre') {
        const v = value.trim().toUpperCase();
        if (!v) { toast('El nombre no puede estar vacío','error'); return; }
        update.nombre = v;
      } else if (field === 'celdas') {
        const n = parseInt(value);
        if (!n || n < 1) { toast('Celdas inválidas','error'); return; }
        update.celdas = n;
      } else if (field === 'descripcion') {
        update.descripcion = value.trim() || null;
      }
      update.actualizadoEn = new Date().toISOString();
      await window.firebaseUtils.db.collection(window.firebaseUtils.collections.qths).doc(id).update(update);
    } catch(err) { toast('Error: '+err.message,'error'); }
    setInlineEdit(null);
  };
  const handleInlineKey = (e) => {
    if (e.key === 'Enter') handleInlineSave();
    if (e.key === 'Escape') setInlineEdit(null);
  };
  const handleInlineJefe = async (qthId, jefeId) => {
    const jefe = jefes.find(j=>j.id===jefeId)||null;
    try {
      await window.firebaseUtils.db.collection(window.firebaseUtils.collections.qths).doc(qthId).update({
        jefeId: jefeId||null,
        jefeNombre: jefe?jefe.efectivo:null,
        jefeRango: jefe?jefe.jerarquia:null,
        jefeTel: jefe?jefe.telefono:null,
        actualizadoEn: new Date().toISOString(),
      });
    } catch(err) { toast('Error: '+err.message,'error'); }
    setInlineEdit(null);
  };
  const handleToggleCheck = async (id, current) => {
    try {
      await window.firebaseUtils.db.collection(window.firebaseUtils.collections.qths)
        .doc(id).update({ jefeChecked: !current });
    } catch(err) { /* silent */ }
  };
  const del = async id => {
    if (!confirm('¿Eliminar?')) return;
    await window.firebaseUtils.db.collection(window.firebaseUtils.collections.qths).doc(id).delete();
    toast('QTH eliminado','info');
  };
  const delAll = async () => {
    if (!confirm(`¿Borrar los ${qths.length} QTHs?`)) return;
    const {db,collections} = window.firebaseUtils;
    const b = db.batch();
    qths.forEach(q=>b.delete(db.collection(collections.qths).doc(q.id)));
    await b.commit(); toast('QTHs borrados','info');
  };
  const handleExport = async () => {
    if (!qths.length) { toast('Sin QTHs para exportar','error'); return; }
    if (!evento.estadio) { toast('Seleccioná un estadio antes de exportar','error'); return; }
    if (!evento.fecha) { toast('Ingresá la fecha del evento antes de exportar','error'); return; }
    if (!evento.localidad?.trim()) { toast('Completá el nombre del evento (ej: BOCA VS RIVER) antes de exportar','error'); return; }
    const invalidos = qths.filter(q => !q.nombre?.trim() || !q.celdas || q.celdas < 1);
    if (invalidos.length) {
      toast(`${invalidos.length} QTH(s) sin nombre o sin celdas válidas. Corregí antes de exportar.`,'error');
      return;
    }
    try {
      toast('Generando Word...','info');
      const {blob,nombre} = await buildWord(qths, evento, null, motos, infanteria, refuerzo, tercerAnillo);
      downloadBlob(blob, `MesaDist_${nombre}_${(evento.localidad||'').replace(/\s/g,'_')}_${evento.fecha||todayISO()}.docx`);
      toast('Word exportado ✓','success');
    } catch(err) { toast('Error al generar Word: '+err.message,'error'); console.error(err); }
  };
  const handleMove = async (idx, dir) => {
    const newIdx = idx + dir;
    if (newIdx < 0 || newIdx >= qths.length) return;
    const a = qths[idx], b = qths[newIdx];
    const {db,collections} = window.firebaseUtils;
    const batch = db.batch();
    batch.update(db.collection(collections.qths).doc(a.id), { creadoEn: b.creadoEn });
    batch.update(db.collection(collections.qths).doc(b.id), { creadoEn: a.creadoEn });
    await batch.commit();
  };
  const handleDragMove = async (fromIdx, toIdx) => {
    if (fromIdx === toIdx || fromIdx < 0 || toIdx < 0 || fromIdx >= qths.length || toIdx >= qths.length) return;
    // Build new order array
    const ordered = [...qths];
    const [moved] = ordered.splice(fromIdx, 1);
    ordered.splice(toIdx, 0, moved);
    // Reassign creadoEn timestamps in order
    const {db,collections} = window.firebaseUtils;
    const batch = db.batch();
    const baseTime = Date.now();
    ordered.forEach((q, i) => {
      const newTs = new Date(baseTime + i).toISOString();
      batch.update(db.collection(collections.qths).doc(q.id), { creadoEn: newTs });
    });
    await batch.commit();
  };
  const onDragStart = (e, idx) => {
    if (!canReorder) return;
    setDragIdx(idx);
    e.dataTransfer.effectAllowed = 'move';
    e.dataTransfer.setData('text/plain', String(idx));
    // Slight delay to apply dragging class after browser captures ghost
    requestAnimationFrame(() => {
      const rows = document.querySelectorAll('.qth-table-body tr');
      if (rows[idx]) rows[idx].classList.add('dragging');
    });
  };
  const onDragEnd = () => {
    setDragIdx(null);
    setDragOverIdx(null);
    setDragOverHalf(null);
    document.querySelectorAll('.qth-table-body tr').forEach(r => {
      r.classList.remove('dragging','drag-over-top','drag-over-bottom');
    });
  };
  const onDragOver = (e, idx) => {
    if (dragIdx === null || dragIdx === idx || !canReorder) return;
    e.preventDefault();
    e.dataTransfer.dropEffect = 'move';
    const rect = e.currentTarget.getBoundingClientRect();
    const half = (e.clientY - rect.top) < rect.height / 2 ? 'top' : 'bottom';
    if (dragOverIdx !== idx || dragOverHalf !== half) {
      // Clean previous highlights
      document.querySelectorAll('.qth-table-body tr').forEach(r => {
        r.classList.remove('drag-over-top','drag-over-bottom');
      });
      e.currentTarget.classList.add(half === 'top' ? 'drag-over-top' : 'drag-over-bottom');
      setDragOverIdx(idx);
      setDragOverHalf(half);
    }
  };
  const onDrop = (e, idx) => {
    e.preventDefault();
    if (dragIdx === null || !canReorder) return;
    let toIdx = dragOverHalf === 'bottom' ? idx : idx;
    if (dragOverHalf === 'top' && idx > dragIdx) toIdx = idx - 1;
    else if (dragOverHalf === 'bottom' && idx < dragIdx) toIdx = idx + 1;
    else toIdx = idx;
    if (toIdx < 0) toIdx = 0;
    if (toIdx >= qths.length) toIdx = qths.length - 1;
    handleDragMove(dragIdx, toIdx);
    onDragEnd();
  };
  const filtered = qths.filter(q => !search ||
    q.nombre.toLowerCase().includes(search.toLowerCase()) ||
    (q.jefeNombre||'').toLowerCase().includes(search.toLowerCase()));
  const canReorder = !search; // solo reordena sin filtro activo
  const total = qths.reduce((s,q)=>s+(q.celdas||0),0);
  const checkedCount = qths.filter(q=>q.jefeChecked).length;
  return (
    <div className="card">
      <div className="card-header">
        <span>📋 SECTORES PRINCIPALES</span>
        <div style={{display:'flex',gap:'7px',alignItems:'center'}}>
          <span className="counter-pill">{qths.length} QTHs</span>
          <span className="counter-pill" style={{background:'#ffd54f',color:'#333'}}>{total} celdas</span>
          {qths.length>0&&<span className="counter-pill" style={{
            background: checkedCount===qths.length ? '#22863a' : '#fff3e0',
            color: checkedCount===qths.length ? '#fff' : '#e65100',
          }} title="Jefes verificados">✓ {checkedCount}/{qths.length}</span>}
          {qths.length>0&&<button className="btn btn-success" onClick={handleExport}
            style={{padding:'7px 18px',fontSize:'13px',animation:'pulse 2s infinite',boxShadow:'0 2px 8px rgba(34,134,58,0.4)'}}>
            📄 Exportar Word
          </button>}
        </div>
      </div>
      <div className="card-body">
        {qths.length>0&&(
          <div style={{display:'flex',gap:'8px',marginBottom:'10px',alignItems:'center'}}>
            <div className="search-wrapper" style={{flex:1}}>
              <input placeholder="Buscar QTH o jefe..." value={search} onChange={e=>setSearch(e.target.value)}/>
              {search&&<span className="search-clear" onClick={()=>setSearch('')}>×</span>}
            </div>
            <button className="btn btn-danger btn-sm" onClick={delAll}>🗑 Borrar todo</button>
          </div>
        )}
        {filtered.length===0&&(
          <div className="empty-state">
            {qths.length===0
              ?<><div style={{fontSize:'32px'}}>📍</div><div>No hay QTHs. Usá el formulario para agregar.</div></>
              :<div>Sin resultados para "{search}"</div>}
          </div>
        )}
        {filtered.length>0&&(
          <div style={{overflowX:'auto'}}>
            <table className="tbl">
              <thead><tr>
                {canReorder&&<th style={{width:'60px',textAlign:'center'}}>⇅</th>}
                <th style={{width:'28px'}}>#</th>
                <th>QTH / PUESTO</th>
                <th style={{width:'60px',textAlign:'center'}}>CELDAS</th>
                <th style={{width:'36px',textAlign:'center'}} title="Jefe verificado">✓</th>
                <th>JEFE DE QTH</th>
                <th style={{width:'130px'}}>TELÉFONO</th>
                <th style={{width:'76px',textAlign:'center'}}>ACCIONES</th>
              </tr></thead>
              <tbody className="qth-table-body">
                {filtered.map((q,i)=>{
                  const invalido = !q.nombre?.trim() || !q.celdas || q.celdas < 1;
                  const realIdx = canReorder ? i : -1;
                  return (
                  <tr key={q.id}
                    draggable={canReorder}
                    onDragStart={canReorder ? e => onDragStart(e, i) : undefined}
                    onDragEnd={canReorder ? onDragEnd : undefined}
                    onDragOver={canReorder ? e => onDragOver(e, i) : undefined}
                    onDrop={canReorder ? e => onDrop(e, i) : undefined}
                    style={invalido?{background:'#fff3f3'}:q.jefeChecked?{background:'#f1f8e9'}:{}}>
                    {canReorder&&<td style={{textAlign:'center',padding:'4px 2px'}}>
                      <div style={{display:'flex',alignItems:'center',gap:'3px',justifyContent:'center'}}>
                        <span className="drag-handle" title="Arrastrá para reordenar">⠿</span>
                        <div style={{display:'flex',flexDirection:'column',gap:'1px'}}>
                          <button className="btn btn-secondary btn-sm" disabled={i===0}
                            onClick={()=>handleMove(i,-1)}
                            style={{padding:'1px 5px',fontSize:'9px',lineHeight:'1',minWidth:'20px'}}>▲</button>
                          <button className="btn btn-secondary btn-sm" disabled={i===filtered.length-1}
                            onClick={()=>handleMove(i,1)}
                            style={{padding:'1px 5px',fontSize:'9px',lineHeight:'1',minWidth:'20px'}}>▼</button>
                        </div>
                      </div>
                    </td>}
                    <td style={{color:'#999',textAlign:'center'}}>{i+1}{invalido&&<span title="QTH incompleto" style={{color:'#e53935',marginLeft:'3px'}}>⚠</span>}</td>
                    <td className={inlineEdit?.id===q.id&&inlineEdit?.field==='nombre'?'cell-editing':'cell-editable'}
                      onClick={()=>{ if(!(inlineEdit?.id===q.id&&inlineEdit?.field==='nombre')) handleInlineStart(q,'nombre'); }}
                      style={{fontWeight:'700'}}>
                      {inlineEdit?.id===q.id&&inlineEdit?.field==='nombre'
                        ? <input autoFocus value={inlineEdit.value}
                            onChange={e=>setInlineEdit({...inlineEdit,value:e.target.value})}
                            onBlur={handleInlineSave} onKeyDown={handleInlineKey}
                            style={{textTransform:'uppercase',fontWeight:'700'}}/>
                        : <>
                          {q.nombre || <span style={{color:'#e53935',fontStyle:'italic',fontWeight:'400'}}>Sin nombre</span>}
                          {q.descripcion && (
                            <span style={{fontWeight:'400',color:'#667',fontSize:'11px',marginLeft:'5px'}}>({q.descripcion})</span>
                          )}
                          {q.tipo && (
                            <span style={{
                              marginLeft:'6px', padding:'1px 7px', borderRadius:'8px',
                              fontSize:'10px', fontWeight:'700', verticalAlign:'middle',
                              background: tipoColor(q.tipo), color:'#fff'
                            }}>{q.tipo}</span>
                          )}
                        </>}
                    </td>
                    <td className={inlineEdit?.id===q.id&&inlineEdit?.field==='celdas'?'cell-editing':'cell-editable'}
                      onClick={()=>{ if(!(inlineEdit?.id===q.id&&inlineEdit?.field==='celdas')) handleInlineStart(q,'celdas'); }}
                      style={{textAlign:'center'}}>
                      {inlineEdit?.id===q.id&&inlineEdit?.field==='celdas'
                        ? <input autoFocus type="number" min="1" max="99" value={inlineEdit.value}
                            onChange={e=>setInlineEdit({...inlineEdit,value:e.target.value})}
                            onBlur={handleInlineSave} onKeyDown={handleInlineKey}
                            style={{width:'60px',textAlign:'center',fontWeight:'700'}}/>
                        : <span className="badge badge-orange" style={{fontSize:'12px',padding:'3px 10px'}}>{q.celdas}</span>}
                    </td>
                    <td style={{textAlign:'center',cursor:'pointer',fontSize:'18px',padding:'4px'}}
                      onClick={()=>handleToggleCheck(q.id, q.jefeChecked)}
                      title={q.jefeChecked ? 'Jefe verificado – click para desmarcar' : 'Click para marcar jefe verificado'}>
                      {q.jefeChecked
                        ? <span style={{color:'#22863a'}}>☑</span>
                        : <span style={{color:'#ccc'}}>☐</span>}
                    </td>
                    <td className="cell-editable" onClick={()=>{ if(inlineEdit?.id!==q.id||inlineEdit?.field!=='jefe') setInlineEdit({id:q.id,field:'jefe',value:q.jefeId||''}); }}
                      style={{position:'relative',minWidth:'160px'}}>
                      {inlineEdit?.id===q.id&&inlineEdit?.field==='jefe'
                        ? <SearchableJefeSelect
                            jefes={sortJefes(jefes)}
                            value={q.jefeId||''}
                            onChange={id=>{handleInlineJefe(q.id,id);}}
                          />
                        : q.jefeNombre
                          ?<div><div style={{fontWeight:'600'}}>{q.jefeNombre}</div>{q.jefeRango&&<div style={{fontSize:'10px',color:'#667'}}>{q.jefeRango}</div>}</div>
                          :<span style={{color:'#d32f2f',fontStyle:'italic'}}>Sin asignar</span>}
                    </td>
                    <td>{q.jefeTel
                      ?<span style={{fontFamily:'monospace',fontWeight:'700',color:'#2e7d32'}}>📞 {q.jefeTel}</span>
                      :<span style={{color:'#bbb'}}>—</span>}
                    </td>
                    <td style={{textAlign:'center'}}>
                      <div style={{display:'flex',gap:'4px',justifyContent:'center'}}>
                        <button className="btn btn-secondary btn-sm" onClick={()=>onEdit(q)}>✏️</button>
                        <button className="btn btn-danger btn-sm" onClick={()=>del(q.id)}>✕</button>
                      </div>
                    </td>
                  </tr>
                  );
                })}
              </tbody>
            </table>
          </div>
        )}
      </div>
    </div>
  );
}

// ── VISTA DETALLE HISTORIAL ───────────────────────────────────
function VistaHistorial({ h, onVolver, toast }) {
  const qths = h.qths||[];
  const total = qths.reduce((s,q)=>s+(q.celdas||0),0);
  const evento = { estadio: h.estadio, otroEstadio:'', fecha: h.fechaEvento, localidad: h.localidad };
  const handleExport = async () => {
    const invalidos = qths.filter(q => !q.nombre?.trim() || !q.celdas || q.celdas < 1);
    if (invalidos.length) { toast(`${invalidos.length} QTH(s) sin nombre o celdas. Cargá para editar y corregí.`,'error'); return; }
    try {
      toast('Generando Word...','info');
      const {blob,nombre} = await buildWord(qths, evento, h.guardadoEn, h.motos||[], h.infanteria||[], h.refuerzo||[], h.tercerAnillo||[]);
      downloadBlob(blob, `Historial_${nombre}_${(h.localidad||'').replace(/\s/g,'_')}_${h.fechaEvento||''}.docx`);
      toast('Word exportado ✓','success');
    } catch(err) { toast('Error: '+err.message,'error'); console.error(err); }
  };
  return (
    <div style={{padding:'14px',maxWidth:'1400px',margin:'0 auto'}}>
      <div style={{background:'#fff',borderRadius:'8px',boxShadow:'0 1px 4px rgba(0,0,0,0.1)',padding:'14px 18px',marginBottom:'14px'}}>
        <div style={{display:'flex',gap:'10px',alignItems:'center',flexWrap:'wrap'}}>
          <button className="btn btn-secondary" onClick={onVolver}>← Volver</button>
          <div style={{flex:1,minWidth:0}}>
            <div style={{display:'flex',alignItems:'center',gap:'8px',flexWrap:'wrap'}}>
              <span style={{fontWeight:'700',fontSize:'16px'}}>{h.estadio}</span>
              {h.localidad&&<span style={{background:'#1565c0',color:'#fff',borderRadius:'5px',padding:'3px 10px',fontSize:'12px',fontWeight:'700'}}>{h.localidad}</span>}
              {h.fechaEvento&&<span className="badge badge-blue" style={{fontSize:'12px',padding:'4px 10px'}}>📅 {fmtFecha(h.fechaEvento)}</span>}
            </div>
            <div style={{fontSize:'11px',color:'#999',marginTop:'4px'}}>
              Guardado: {fmtTs(h.guardadoEn)}
              {h.guardadoPor && <span style={{color:'#1a3a6b',fontWeight:'600'}}> por {h.guardadoPor.jerarquia} {h.guardadoPor.nombre} (LP {h.guardadoPor.legajo})</span>}
            </div>
          </div>
          <span className="counter-pill" style={{background:'#e8edf5',color:'#1a3a6b'}}>{qths.length} QTHs · {total} celdas{(h.motos||[]).length>0&&` · ${h.motos.length} motos`}{(h.tercerAnillo||[]).length>0&&` · ${h.tercerAnillo.length} 3er anillo`}</span>
          <button className="btn btn-success" onClick={handleExport}>⬇ Exportar Word</button>
        </div>
      </div>
      <div className="card">
        <div className="card-header ch-amber">📋 DISTRIBUCIÓN GUARDADA</div>
        <div style={{overflowX:'auto'}}>
          <table className="tbl">
            <thead><tr>
              <th style={{width:'28px'}}>#</th><th>QTH / PUESTO</th>
              <th style={{width:'60px',textAlign:'center'}}>CELDAS</th>
              <th>JEFE DE QTH</th><th style={{width:'130px'}}>TELÉFONO</th>
            </tr></thead>
            <tbody>
              {qths.map((q,i)=>(
                <tr key={i}>
                  <td style={{color:'#999',textAlign:'center'}}>{i+1}</td>
                  <td style={{fontWeight:'700'}}>
                    {q.nombre}
                    {q.descripcion&&<span style={{fontWeight:'400',color:'#667',fontSize:'11px',marginLeft:'5px'}}>({q.descripcion})</span>}
                    {q.tipo&&<span style={{marginLeft:'6px',padding:'1px 7px',borderRadius:'8px',fontSize:'10px',fontWeight:'700',background:tipoColor(q.tipo),color:'#fff'}}>{q.tipo}</span>}

// ── PANEL MOTORIZADA ──────────────────────────────────────────
function PanelMotorizada({ motos, toast }) {
  const [cantidad, setCantidad] = useState('');
  const [saving,   setSaving]   = useState(false);
  const [open,     setOpen]     = useState(true);

  const handleSetCantidad = async () => {
    const n = parseInt(cantidad);
    if (!n || n < 1 || n > 30) { toast('Ingresá una cantidad entre 1 y 30','error'); return; }
    setSaving(true);
    try {
      const {db,collections} = window.firebaseUtils;
      const startOrden = motos.length;
      const b = db.batch();
      for (let i=0;i<n;i++) {
        b.set(db.collection(collections.motos).doc(), {
          qth: '', orden: startOrden + i, creadoEn: new Date(Date.now()+i).toISOString()
        });
      }
      await b.commit();
      setCantidad('');
      toast(`✓ ${n} motos agregadas (total: ${motos.length + n})`,'success');
    } catch(err) { toast('Error: '+err.message,'error'); }
    finally { setSaving(false); }
  };

  const handleQthChange = async (id, value) => {
    try {
      await window.firebaseUtils.db.collection(window.firebaseUtils.collections.motos)
        .doc(id).update({ qth: value });
    } catch(err) { /* silent */ }
  };

  const handleDelAll = async () => {
    if (!confirm(`¿Eliminar las ${motos.length} motos?`)) return;
    const {db,collections} = window.firebaseUtils;
    const b = db.batch();
    motos.forEach(m=>b.delete(db.collection(collections.motos).doc(m.id)));
    await b.commit();
    toast('Motorizada borrada','info');
  };

  const handleDelMoto = async (id) => {
    try {
      await window.firebaseUtils.db.collection(window.firebaseUtils.collections.motos).doc(id).delete();
      toast('Moto eliminada','info');
    } catch(err) { toast('Error: '+err.message,'error'); }
  };

  return (
    <div className="card">
      <div className="card-header" style={{background:'#37474f',cursor:'pointer'}} onClick={()=>setOpen(o=>!o)}>
        <span>🏍 MOTORIZADA <span style={{opacity:.6,fontWeight:'400',fontSize:'10px',marginLeft:'4px'}}>{open?'▲':'▼'}</span></span>
        <div style={{display:'flex',gap:'7px',alignItems:'center'}}>
          {motos.length>0&&<span className="counter-pill" style={{background:'#546e7a',color:'#fff'}}>{motos.length} motos</span>}
          {motos.length>0&&<button className="btn btn-danger btn-sm" onClick={e=>{e.stopPropagation();handleDelAll();}}>🗑</button>}
        </div>
      </div>
      {open && <div className="card-body">
        <div style={{display:'flex',gap:'8px',alignItems:'flex-end',marginBottom:'12px'}}>
          <div style={{flex:1}}>
            <label>AGREGAR MOTOS</label>
            <input type="number" min="1" max="30" placeholder="Cantidad a agregar"
              value={cantidad} onChange={e=>setCantidad(e.target.value)}
              onKeyDown={e=>e.key==='Enter'&&handleSetCantidad()}
            />
          </div>
          <button className="btn btn-sm" style={{background:'#455a64',color:'#fff',flexShrink:0}}
            onClick={handleSetCantidad} disabled={saving}>
            {saving?'...':'➕ Agregar'}
          </button>
        </div>

        {motos.length>0 && (
          <div style={{overflowX:'auto'}}>
            <table className="tbl">
              <thead><tr>
                <th style={{width:'70px',textAlign:'center',background:'#eceff1',color:'#37474f'}}>MOTO</th>
                <th style={{background:'#eceff1',color:'#37474f'}}>QTH / PUESTO</th>
                <th style={{width:'36px',background:'#eceff1'}}></th>
              </tr></thead>
              <tbody>
                {motos.map((m,i)=>(
                  <tr key={m.id}>
                    <td style={{textAlign:'center',fontWeight:'700',color:'#455a64',fontSize:'11px'}}>MOTO {i+1}</td>
                    <td>
                      <QthInput moto={m} onSave={handleQthChange}/>
                    </td>
                    <td style={{textAlign:'center',padding:'2px'}}>
                      <button className="btn btn-sm" style={{background:'#ffebee',color:'#d32f2f',border:'none',padding:'2px 6px',fontSize:'11px',lineHeight:1}}
                        onClick={()=>handleDelMoto(m.id)} title="Eliminar moto">✕</button>
                    </td>
                  </tr>
                ))}
              </tbody>
            </table>
          </div>
        )}

        {motos.length===0 && (
          <div className="empty-state" style={{padding:'14px'}}>
            Sin motos configuradas. Ingresá la cantidad y presioná Agregar.
          </div>
        )}
      </div>}
    </div>
  );
}

function QthInput({ moto, onSave }) {
  const [val, setVal] = useState(moto.qth||'');
  const timer = useRef(null);
  useEffect(()=>{ setVal(moto.qth||''); },[moto.qth]);
  const handleChange = e => {
    const v = e.target.value;
    setVal(v);
    clearTimeout(timer.current);
    timer.current = setTimeout(()=>onSave(moto.id, v), 800);
  };
  return (
    <input
      value={val}
      onChange={handleChange}
      placeholder="Indicar QTH de esta moto..."
      style={{border:'none',background:'transparent',width:'100%',fontFamily:'Arial,sans-serif',fontSize:'12px',padding:'3px 6px'}}
    />
  );
}
